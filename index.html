hris根本没有入睡，一直在写这封邮件。DM长吸了一口气，认真开始读这封要揭示谜底的邮件。\n\n看得出，Chris是在情急之中落笔，好像有很多头绪，又捋不清楚，DM不得不反反复复地读了好几遍，基本上才明白了Chris的大意：Chris的第一次婚姻曾经很美好，他和前妻有个共识，他们觉得人类繁殖得太多了，导致世界人口爆炸，他们决定从自身做起，不为这个世界增添人口，所以Chris选择了节育手术。\n后来前妻可能是有了外遇，或者失去热情，他并不完全明白就里，总之就是前妻对他很是厌恶，不愿意和他亲密，最终导致他们离婚。离婚后前妻很快结婚并且接连生了3个孩子，令他非常受打击。\n之后，或许是为了逃避离婚的打击，或许是对自己的一种释放，Chris开始笃信一种宗教，这种宗教的教义之一就是禁欲，因为肉体的愉悦是一种低级趣味，贪欢会给人类带来灾难。这封邮件的前一半是Chris对自己的解释，后一半是Chris对自己和DM的关系的分析。Chris对DM的溢美之词，DM已经在以前的邮件里读了很多并不算陌生。DM几乎没有怎么认真读那一长串的赞美，直接跳去最后的那段。\n \nChris说，DM的乐观，质朴，美丽，让他已经确认DM就是自己梦寐以求的另一半，他有心要和DM发展一段严肃的关系，最终能够携手进入结婚的殿堂。\n但是他在DM强烈的魅力面前，很是痛苦和矛盾，一方面他被DM强烈吸引，他无法抗拒；另一方面，他对自己的宗教也不能放弃。\nChris举例说他的一个教友，信了这个宗教以后，夫妻分房而居，两口子依然情深意长。Chris希望DM是一个能接受这种生活方式的伴侣，如果DM能和他一样接受禁欲，他别无所求。Chris也说，他理解DM是一个健康的女性，他很感激DM给了自己如此多的机会，让他受宠若惊。请DM不要误解，整个事情，完全没有DM的责任，Chris猜测DM可能会比较沮丧，再三强调自己绝对不是要否认DM的魅力，实在是自己有自己的信仰，无法违背。Chris还专门提到DM的儿子实在是一个难得的上帝的礼物，虽然自己没有孩子，如果DM肯与自己携手，Chris会尽到一个父亲和老师的责任，对孩子视如己出，Chris还提到说事实上过去几个月的接触，他自己已经证明了自己会是DM儿子的良师益友。最后Chris再三提到，希望DM不要一怒之下，断绝与自己联系。\n而是希望DM尝试着去体会自己的生活方式，试试看是不是能给彼此一个未来的机会。\n\n反反复复地，DM花了个把小时才总算把整个邮件看了个明白，把Chris和自己交往的整个过程仔细回想了一遍。\nDM又去互联网上把Chris笃信的那个宗教google了一遍。太阳高高升起的时候，DM终于累了。\n刚好儿子从朋友家来了电话说人家家还要盛情招待一顿晚饭不用DM去接了，DM关了手机，倒头睡去。太阳下山的时候，DM才睡醒，儿子被朋友的爸妈送回家来，自己忙乎着玩电脑去了。\nDM坐在阳台上，看着夕阳发了很久的呆。\n\n之后的几个月，DM和Chris依然有一搭无一搭地约会着。\n随着冬天的到来，户外活动已经不太现实，两个人大部分的周末时间泡在餐厅里，咖啡馆里天南海北。\nChris依然会表现得很想和DM亲密，DM依然享受两个人精神层面上的交流，\n也会拥抱Chris， 可是DM已经慢慢没有了亲近Chris的欲望。\n铁匠铺里的大火炉，一天天断了炭火，\nDM感觉到自己从一块烧得通红的铁料，已经变成了灰黑色的大铁块。\n \n十二月初，Chris对DM发出了盛情的邀请，邀请DM和儿子一起去Chris的父亲家参加家庭晚宴，Chris郑重说到，他是要向全家人正式介绍DM是自己的女朋友。恰巧在圣诞前的两周，DM生了一场很重的感冒。\n多年不遇的高烧，让DM在家里整整躺了三天。期间Chris每天几个电话打过来问候，短信更是不断，却只字未提自己可以过来帮DM做点什么或者探望一下。\n三天的烧退了以后，DM依旧很虚弱，在家静养，因为自己不能出去买菜，也没法给儿子做饭，里外都交给邻居打理，\nDM很想跟Chris说，你能不能来看看我？帮我买点东西过来，可是不知道为什么DM始终觉得跟Chris开不了这个口，毕竟他们没有那么亲密。DM病倒的第五天，Chris\n给DM发短信，说，你去看看邮件，相信你看了邮件，身体很快会好起来！DM气若游丝地打开电脑，看到Chris写来的一封邮件，里面是一首莎士比亚时代流行的十四行诗，DM看完第二行，就直接按了电脑的电源关机，爬回床上去躺着了。那个时刻，她宁肯那十四行诗，能变成一碗热乎乎的汤面，最好是汤多面少的那种，DM头晕目眩地倒在病床上想，那一大碗汤里，最好刚刚有十四根面条！千万不要多了！要是有点葱花就更妙......\n\n等DM恢复到可以上班的时候，距离圣诞节没有几天的时间。\nDM忙着赶自己生病落下的工作，没有回Chris的邮件。\nChris来过几次电话，想确认圣诞家庭聚会的安排，DM都推着说过后再说。\n终于到了不能再推的时候，DM给了自己一个下午的时间，用心给Chris写了一封邮件，主要表达了两点：第一，感谢过去一年里，Chris带给自己和儿子快乐轻松的时间，自己很享受这个过程，认识Chris很是幸运；\n第二，Chris建议的那种宗教教义下的生活方式，自己经过几个月的思考和考量，确定了无法接受。即便肌肤相亲算是低级趣味，自己也不打算升华到Chris的高级境界。DM很明确了自己不仅期待与未来的伴侣同床共枕，还必须共享鱼水之欢的愿望。最后，DM表示，在放下亲密关系的期待之后，愿意和Chris做最好的朋友。至于圣诞家宴，就只能暂时放弃了，日后愿意以好友的身份赴邀。\n\n邮件写好了，DM的鼠标按在SEND的按钮上很久下不了决心发出去。\nDM心里很明白，这个键按下去，Chris就会象每天过着的日子一样，一去无踪。过去9个月，有人牵挂，有人仰慕，有人送花，有人相伴的日子就一去不回头了。鼠标在SEND上纠结的时候，DM也想过，自己是不是应该跟Chris一样，放下屠刀，立地成佛，\n不对不对，应该是戒淫欲，事佛祖！毕竟自己已经满了40岁，这鱼水之欢也未必能行了几年，马上就更年期了，不如戒了，跟着Chris一路走下去，至少到了更年期的时候，身边至少还有个忠实的伴侣？！\n\nDM的手指点在鼠标上发呆的时候，想起《少林寺》里小和尚受戒之前，看着心爱的牧羊姑娘的表情，那个时候的李连杰的表情实在太嫩。而此时此刻，自己的心理才是五味杂陈，复杂到无以言表。DM摸了摸自己的脑袋，觉得要是让自己断了跟心仪的男人肌肤相亲的念想，一定比小和尚脑袋上烫出几个戒疤让人痛苦。\nDM无论如何也无法放下这个心结，虽然跟Chris比起来，自己实在显得太俗，贪恋红尘，可是肌肤相亲真的是生活中不可或缺的一个重要部分，如果这个男人不能跟自己亲密无间，那又怎么能相濡以沫直到人生的尽头？\n\nDM闭眼按下了SEND，邮件随着\"嗖\"的一声在屏幕上消失了。", "excerpt": "下一个\n\n原创:单身妈妈日记(北美)\n\n加拿大夏天的时候，漫天遍野都有一种野花，白色星点的小花形成一个\n莲蓬一样形状的花朵，在花朵的中间有一个黑色的小花。\n整个夏天，加拿大到处都是这样的花，普通又别具特色。从Chris那里，DM知道了这种花...", "category": "情感"}, {"id": 8, "title": "找个伴吧，过家家 （六） -网络征婚 之 \"莎士比亚再世\"", "date": "2012-11-05", "body": "下一个\n\n原创:单身妈妈日记(北美)\n\n\n\n离开咖啡馆，DM开到家也就10\n分钟的路程。而Chris的家，在离DM所在城市大概开车2个小时的地方。所以当手机的短信叮叮当当响起的时候，DM根本没往Chris那里想，以为是孩子有事找自己，急着就奔着家里冲去。到了家门口的停车场，打开手机一看，全是Chris的短信。Chris说，自己抑制不住心里的热情，愣是把车停在半路上的商场门口给DM发短信；遇到一个来自中国的女性，却对莎士比亚了如指掌，实属他的运气；希望有机会再到DM的城市来，希望有机会继续交往........\n\n\nDM\n轻轻笑了一下，慢慢下车，拿提包，锁车门。那个时刻，DM没有象平日里冲回家去查看孩子是否安好，而是慢慢地顺着小道去了附近的公园，坐在公园的长椅上，舒展了一下腰身。近处有青草刚刚舒展的味道，远远地有漫天星光，那些灿烂的小火花就在DM的心里跳跃着，如果有人那个时刻看到过DM，一定看得到她眼里也有闪烁的星星。\n\n接下来的日子，Chris每个周末都会拜访DM的城市。中间陪着DM和孩子去参加钓鱼节，去看飞行表演，摘草莓，过复活节。\nChris本人是个高中老师，教的课程是文学，同时还是个数学天才，对一种叫\"万智牌\"的桌上游戏精通到参加国际大赛的水平。\n恰巧DM的儿子那个时候正在着迷\"万智牌\"，聪明的\nChris跟孩子打交道绝对是专业级的一把好手，第一次见面就买了几套\"万智牌\"的极品送DM的宝贝儿子。\n再下来，博学的Chris丝毫不含糊地开始培训加挑战，几个周末下来，DM的儿子已经自己跟Chris打电话问：你这个周末什么时候来啊？\n\n到快放暑假的时候，Chris的周末拜访已经从一天发展到两天了，而DM的宝贝儿子对Chris的依恋超过了DM。\nDM和Chris根本没有时间去吃饭逛街搞对象了，\nDM不得不去跟孩子谈判，来解决Chris到底归属谁的问题。每每这个时候，Chris总是笑眯眯地站在旁边，看着母子两个，并不多话。\n\n\n儿子看来很接受Chris，而和Chris的交往也让DM一次次地确认，这个男人真的符合自己那两条相当苛刻的标准，\n和他在一起，真的很舒服。\nChris带着DM几乎走遍了这个城市所有看得上眼的餐厅，而且从不允许DM的小AA九九得逞。\nDM并非贪点饭钱上的小便宜，Chris身上带着的那种文雅又男人的味道，远比那几个饭钱让DM感觉到美好。\n\n\n可是，\n可是，DM的心里却有一种隐隐的不安在慢慢地漫延起来.......和Chris约会3个月，竟然Chris没有一丝亲密的举动，连拉手都未曾有过。DM在心里想，这个男人，是真干净！\n不过干净得， 有点.......不可理喻..........,\n这么约会下去，估计到猴年马月，才能有实质进展..........是不是Chris有什么生理障碍啊？？这么想的时候，DM觉得很罪过，跟干净的Chris比，自己有点象女流氓.............\n\n\n终于到了8月份，DM所在的湖滨城市最美丽的月份来了。沿着湖边的闹市区，八月整月的时间，干脆封了路，音乐节，啤酒节，加勒比海节，美食烤肉节，工艺品节......\n此起彼伏。\n\n\nChris放了暑假，来探望DM的机会更频繁。Chris早上开车来报到，DM上班的时候，Chris归了DM的儿子；\n中午饭，Chris带DM的儿子出去吃；下了班，Chris归DM，两个人徜徉在各种节日里，DM跟着Chris吃喝玩乐，直到晚上10点，Chris送DM回家，在楼下一个例行的拥抱，然后Chris驾车回家。\n\n\n终于有了一个周末，Chris跟DM说，自己每天开车有些累，这个周五的晚上过来就不回去了，要住两天。DM的心，动了一下，想，那你住哪里呢？\n我家？\n自己又没敢问，把话给咽回去了。发了一会呆，想象了一下可能要发生的状况，立刻DM在心里给了自己一巴掌，不可救药的老流氓！\n\n\n等见到Chris，DM真的觉得自己想多了。Chris在\nInn里定了间房，竟然还带了自己的床单和枕套去进住。 DM又确认了一遍，\n这个男人真干净，不过这次的确认，已经不是欣喜了，是有很多的疑虑。\n\n\n跟Chris一比，DM觉得自己有点不够纯洁，看看人家翩翩君子，绝对有绅士风度，绝对有耐心，可自己总是在心里思前想后，琢磨人家是不是有生理缺陷，抑或人家信什么邪教啦，每天小鸡肚肠地；另一边，DM又想，Chris哥哥要是真有生理缺陷，那可怎么办呢？\n自己是不是能接受呢？\n\n\n这各种思潮一涌而上，Chris第一次要过夜的那个晚饭，傻子都能看出来DM心不在焉。DM实在是觉得纠结，早早吃完饭，推脱有电话要打，跑回家。Chris也没有挽留，把DM送回家，在楼下抱了DM一下，说：那你明天过来，我们一起吃早饭吧？DM点点头，转身进了家门。\n\n\n第二天周六，DM告诫儿子，今天一天都不许纠缠Chris！自己找邻居小孩玩去！然后出了门。\n吃完早饭，两个人在湖边逛工艺品节的小帐篷，一个个逛过去。Chris对手工陶艺非常有见地，买了一个DM喜欢的大陶盘，送给DM。DM跑去农夫市场，买了一兜子颜色鲜艳的水果和蔬菜，两个人中午回家，DM给三个人做中餐，Chris一边随手把水果蔬菜摆上新买的大陶盘，一边还应付着DM宝贝儿子的各种古怪问题。\nDM有一刻，恍惚地觉得，这就是未来的日子吧，温馨又放松的每一天。\n\n\n那天的晚上，DM又和Chris去了湖边。DM和Chris之间，真的是有无穷的话题，因为Chris去过中国很多次，对中国文化情有独钟，无论聊什么，他都很能理解，也很能给DM从不同角度看问题的观点。Chris离过婚，没有孩子，比DM大6岁。Chris在两个小时外的城市里有个小小的房子，没有任何宠物。Chris在工作的高中教书30年，现任副校长。Chris的妈妈去世了，爸爸在Chris和弟弟成年的时候，跟比自己年轻20岁的女学生结婚，让Chris的妈妈饱受中年失婚的痛苦，郁郁寡欢一直到去世；Chris在妈妈刚去世的时候，很仇恨自己的爸爸；后来看着爸爸越发年迈，后妈对爸爸照顾有加，才慢慢释怀。这些就是DM知道的所有关于Chris的故事，Chris\n总是对DM说，我愿意回答你任何问题，只要你肯问。可是DM就是没问题，她不知道要问什么。\n\n\n约会4个月，Chris没有表达过爱意，没有亲密举动，却也没有任何放弃的迹象。离婚后一直空窗的DM听过不少网络青蛙王子见面就上床的故事，对再次接受一个男人虽然有所顾虑，却也没想过自己千挑万选的网络青蛙是这个品行。\nChris极其有礼貌，保持距离，却又坚决不放弃的风格，DM闻所未闻。\n\n\n一直都很淡定的DM， 真的有点扛不住了。", "excerpt": "下一个\n\n原创:单身妈妈日记(北美)\n\n\n\n离开咖啡馆，DM开到家也就10\n分钟的路程。而Chris的家，在离DM所在城市大概开车2个小时的地方。所以当手机的短信叮叮当当响起的时候，DM根本没往Chris那里想，以为是孩子有事找自己，急着就...", "category": "情感"}, {"id": 9, "title": "找个伴吧，过家家 （五） 网络征婚 之 \"莎士比亚再世\"", "date": "2012-11-05", "body": "下一个\n\n网络征婚 之 \"莎士比亚再世\" - 找个伴吧，过家家 （5） 2012-11-03 11:50:02\n原创:单身妈妈日记(北美)\nDM和Chris见面的那天，是个阳光明媚的四月天。地点定在DM所在的城市，湖边上一个历史悠久的咖啡馆里。DM先到咖啡馆，挑了壁炉边一个舒适的沙发坐下来要了杯绿茶。\n\nDM是不喝咖啡的人，在北美生活了这许多年，任别人手擎Tim Horton的Double\nDouble在自己面前晃，却从不动心。\nDM早年留学法国，在巴黎拿了硕士。人人都说巴黎是浪漫之都，DM初到的时候，就跟了一帮同学去一个邱吉尔二战前总去喝咖啡的小馆子，很风雅地要了一杯据说也是邱吉尔常点的Petit\nCoffee。\n结果，喝完之后，DM出了状况，整个人虚脱了，在巴黎香街的边上跟傻子似地坐了一个下午，没挪窝。害得几个同学也不敢走远，一直陪着脸色煞白，满脑袋虚汗的DM。。。。。\n\n坐在吧角的咖啡馆里，DM想起当年在巴黎的窘事，又想起早年台湾一部电视剧《昨夜星辰》里寇世雄当男主角说的话：\"喝茶的就是喝茶的，喝咖啡的就是喝咖啡的。\"。寇老伯在那部电视剧里是个土鳖，被一个海归大龄女看上了，可是寇老伯就不动心，并且说了上面这句话明志。DM听这话的时候才上高中，还不明白啥意思，觉得这话无比高深，就这么刻在心里。20多年的光阴过去了，现如今，自己坐在枫叶国的咖啡馆里，正在等待一个笃定喝咖啡的男人，这故事会如何演绎下去呢？透过巨大的玻璃窗看到湖边和马路上的人来人往，请清楚楚地看到Chris -\n应该是Chris的那个男人从一辆半旧的车上下来，往这边走来。\n\nChris和照片上一模一样，清瘦又高挑，穿着随意的布衬衣，一条半旧的牛仔裤，胡须刮得很干净。DM的第一眼，感觉非常舒服。这个岁数找伴的单身男女，各有各的要求和条件。DM对男人的要求就两个：第一，舒服；\n第二，干净。\n就这么貌似简单的两个标准，实在是为难了DM很久，因为这标准扎扎实实地太不简单。\nDM亲哥曾经说过DM，这老妹子满脑子是些不入流的想法，没救了。\n比如，对人，DM的概念里，人分两种，男人和女人；无论男人和女人，也只能分两种：干净的，和不干净的！！这干净和不干净的，还真不能从外表衣着和习惯来说，DM需要一本书来陈述自己的论点，又怕没人看，就简单地总结了一下：干净的男人是那样一种男人，即便眼里全是欲望，却能保持最单纯的一颗心灵！\n这样的男人DM遇到过，可惜缘分不够，彼此失之交臂了。DM的心理，就是要找一个干净的男人，符合DM标准的干净男人。看着Chris玉树临风地走进咖啡馆，DM想，\n看起来Chris是个 --- 干---净---的----男----人！\n\nChris走进咖啡馆，DM大方地从沙发上站起来，朝他招了招手。\nChris咧嘴笑了笑，几步走过来，伸出手，跟DM握了握。寒暄了两句，DM说自己已经点了喝的，让Chris去要点东西。\n很自然舒服的交流之后，Chris去点东西，DM又坐下来。\n看了看Chris握过的手，心里很愉悦。\n因为，Chris的手细长又白净，质地细嫩，正是DM心仪的那种，DM又一次确认，Chris应该\n是个---干---净-----的----男----人！\n\nChris端着杯子回到沙发上的时候，DM发现Chris竟然没有点咖啡，而是捧着一杯绿茶！\n不禁惊讶起来，问了Chris一句。 Chris答到：我不喝咖啡，只喝茶。\nChris轻轻的一句话，让DM怦然心动，有种电闪雷鸣的感觉在心底，千万里之外的国度，竟然有个男人跟自己一样不喝咖啡！！这是怎样的缘分啊........Chris瞟了DM的杯子一眼，说：你也不喝咖啡啊！\nDM乐起来，开始娓娓道来当年在巴黎的窘事，Chris竟然也去过那个咖啡馆.......\n\n.那个明媚的四月天，两个文学中年，在古老的咖啡馆里，伴着没有火苗的壁炉，侃侃而谈。\n虽然之前两个人也通过邮件和电话聊过不少，面对面地从咖啡到邱吉尔，从中国文学到欧洲历史，那感觉真的很亲近，很不同。\n不知不觉地天都被侃黑了，两个人就近找了餐馆继续侃。第一次见面，在一顿愉快又简单的晚餐中结束了。\nChris买了单，DM心里感觉不错，但是还装模作样地要AA一下，Chris笑着说：你忘了？\n我去过中国的，我知道这是男人该做的。\nDM很开心地笑了，就没有再坚持。在Chris的车边分别的时候，Chris张开双臂，调皮地说：可以吗？DM很大方地迎上去，轻轻抱了一下Chris，脸颊轻轻地碰了一下Chris有胡茬的脸。DM等感觉到Chris的双臂很温暖，在略略有些凉意的早春的夜晚，Chris身上有股淡淡的男性的味道让DM又一次有些眩晕的感觉。\n\n驾车回家的路上，DM有种强烈的直觉，Chris很快会跟自己联系。在这个干净的男人眼里，DM确认已经看到小小的火花，那些灿烂的小东西，在他们的每一个话题里闪烁，那个时刻，DM的心里也有很多小小的火花在撞来撞去，这种感觉DM曾经以为永远不会再有了。这么多年，沉重的日子，象一块巨石挡住阳光，DM象一株小草在巨石的阴影里蜷缩着，Chris的出现，仿佛一道俊朗的阳光，拐着弯绕过巨石，洒在DM的身上。DM觉得温暖又舒服，小草的心里有一株小小的雏菊一样的花，慢慢地要开起来......\nDM 充满了期待.........", "excerpt": "下一个\n\n网络征婚 之 \"莎士比亚再世\" - 找个伴吧，过家家 （5） 2012-11-03 11:50:02\n原创:单身妈妈日记(北美)\nDM和Chris见面的那天，是个阳光明媚的四月天。地点定在DM所在的城市，湖边上一个历史悠久的咖啡馆...", "category": "情感"}, {"id": 10, "title": "找个伴吧，过家家 （四) 网络征婚 之 \"莎士比亚再世\"", "date": "2012-11-05", "body": "下一个\n\n网络征婚 之 \"莎士比亚再世\" - 找个伴吧，过家家 （4) 2012-10-10\n《找个伴吧，过家家》系列\n\n从2008年起笔，转眼过去四年了，期间的故事多多，足够写本字典的。码字的主偏偏太忙，工作忙，孩子忙，钓鱼忙，当鱼饵也忙，忙得找不到北，码字的事一放就两年。\n好在，这个系列里的故事，十有八九都是真的，所以码起字来也不难。\n\nDM改头换面重投\"鱼池\"开始，网上鱼儿不断，自个也当了几回鱼。\n无论是当鱼，还是当饵，DM都很谨慎，最初的2个月都只是在网上写写邮件，玩玩文字，连通电话的阶段都没到，很多就没了下文。最初的新鲜劲过去了，DM查邮箱的次数少下来，回信的长度就不用提了，超过2段的都很少见。\n\nNancy教练跟DM说，这是初级阶段，就跟上一年级的小孩，数学要做无数次才能算清楚1+1。Nancy透露的数据，说她的第五个老公是在见了将近五十个候选人之后才开始小荷才露尖尖角的，在见面之前的邮件发的那就不计其数啦。这个阶段一定要淡定，淡定，再淡定。对于初级阶段，Nancy教主给了DM一个海选三原则：1）\n教育程度必须Bachelor以上。\nNancy注释：绝无歧视，只是为了有共同话题2）档案里的照片是正经拍的。正经拍的就是衣着整洁，有点点摄影水平的东西。用Nancy的话，露膀子、拿着手机玩自拍，或者在浴室对着镜子的主，根本不要浪费时间去读他的自述。道理很简单，正经拍的人最起码尊重自己，另一个方面，能给自己拍正经照片的人也有点料吧，从一个侧面反映了这个男人的圈子好歹有个正经人的影子；其他那些露的，浴室自拍的主，细节就透露了他们生活龌龊，圈子里没啥正经人，还有从根本上都是来找F\nPartner的。3）自我介绍里起码有三段，而且读起来有个头尾，有点逻辑。Nancy教主的原话：征婚档案都写不好的男人，床上功夫一定不怎么好。\n（这个结论DM没有完全理解，Nancy教主也懒得多解释，不知道别人信不信，DM反正是信了。）DM按照这个标准，点点鼠标就\"杀死\"了很多\"鱼儿\"。\n\n就在DM\"杀\"鱼不眨眼，\n变得对网络征婚越来越淡定的时候，突然有条鱼华丽丽地撞了进来。.这条华丽的鱼，有个好听的名字叫Chris。\nChris发来的第一封邮件用词读起来优美，每句话都透着流畅和真诚，同邮件发过来的还有几张黑白照片，里面的男人看起来斯文俊朗，学者风范十足。\nDM禁不住去鱼池里查一查他的资料，这一查不禁在心里狠狠地动了一下：\nChris在自己的描述里引用了一首英国著名湖畔诗人，华兹华斯的诗。这首诗，恰恰是大学主修英国文学的DM最喜欢的那首\n《I wandered lonely as a\ncloud》！看完档案，DM当下给Chris回了封邮件，和了华兹华斯的另一首著名的短诗。。。。。。。。（此处省略几万字）\n\n在真实的世界里，DM被很多人认为是个粗线条的女人，乐观爽朗坚强；只有DM自己最清楚，线条原本是怎样的纤细，又是怎么被像大砂轮一样的生活给打造成了今天粗旷的样子。无论在别人眼里是粗旷，还是纤细，DM的内心都有一块最柔软的地方，在那里保存着美好和温暖，敏感和多情，只不过，第一次婚姻的失败让DM措手不及，单身妈妈的生活实在是太严峻了，DM只能让那些柔软，美好的东西在自己的心里冬眠着。Chris带来的一首小诗，如同春天的一缕暖风，唤醒了DM冬眠着的美好。在通过不知道多少次邮件，电话之后，\nChris和DM见面了。（待续）", "excerpt": "下一个\n\n网络征婚 之 \"莎士比亚再世\" - 找个伴吧，过家家 （4) 2012-10-10\n《找个伴吧，过家家》系列\n\n从2008年起笔，转眼过去四年了，期间的故事多多，足够写本字典的。码字的主偏偏太忙，工作忙，孩子忙，钓鱼忙，当鱼饵也忙...", "category": "情感"}, {"id": 11, "title": "找个伴，过家家 （三） 网络征婚之＂术业有专攻＂", "date": "2012-11-05", "body": "下一个\n\n网络征婚之后＂术业有专攻＂ - 找个伴，过家家 （3） 2012-10-07 20:31:29\n（备注，此文为本博原创，首次发表在单身妈妈之家公共博客。此处仅为留档文件。）\n\nDM 在 \" 鱼池 \" （ POF.com)\n里注册之后，很是上心，每天好几次去信箱里查信。 第一周 DM\n就很失望，因为几乎没有什么人关注自己的广告。门可罗雀啊？！ DM\n心里有些不爽。就算自己不是完人，也未必行情就差到这个地步！因为自己登广告的事情，没瞒着儿子，所以儿子也很关注老妈的行情，这天看着\nDM 有些小沮丧地坐在电脑跟前，儿子说话了： \" 老妈，玩 Facebook 会不？\n或者国内的人人网？ \" DM 摇摇头，儿子很不屑地说， \"\n你连这个都不玩，还想玩网上征婚？你先去学习学习大家都玩什么，再说吧。 \"\nDM 听了儿子的话，上了 Facebook, 找到了一堆同事，同学， MSN\n联系人，大家加一起乐了一阵子；然后又上人人网。\n\n不上还好，上了人人网以后， DM 迷上了一个游戏叫 \" 偷菜 \"\n，网络菜地，人人一块，大家互相偷。 DM\n这辈子没对游戏这么上心过，玩疯的时候半夜上了闹钟起来去偷老同学地里种的发财果，手机提醒里全是谁家的啥果子到了偷的时候了，每周部门例会里在手机上偷偷地偷菜\n......这么折腾了几个星期， DM 把 \" 鱼池 \"\n那点事全忘了，一天半夜被起夜的儿子抓住 DM\n在网上偷菜，儿子半梦半醒地点拨了一顿， \"\n老妈，我让你学我们小屁孩怎么玩，又不是让你真玩，你怎么这么上瘾？还教育我不务正业？老妈，你的正业是\n\" 钓鱼 \" ，不是偷菜！ \" DM\n当下羞愧难当，早上赶忙给儿子弄了一桌子好吃的表达自己对不务正业的内疚。\n \n玩了一阵子网络，算是弄明白了儿子这代人的现代小屁孩网络生活，可是在鱼池里还是不得要领。网上躺着的都是些怪怪的鱼，要么挂着光上身的照片，要么就是自我介绍语句都不通的主，总之没有一条鱼让\nDM 有兴趣回复。眼看着快过去 2 个月了， DM\n决定还是去跟热心督促自己注册的同事们请教。\n这一请教才知道，原来部门里几个曾经单身的白人女同事有几位就是在 \" 鱼池 \"\n找到的伴侣。\n\nDM 的个性开朗，同事关系本来就不错， 加上 DM\n整日里拿手的吃食经常带来给同事们分享，男女同事对厨艺如此之高的 DM\n一直单身的事实感到不解和惋惜， DM\n这一张口，立马得到了热烈的响应，摩拳擦掌地上阵了。\n某个周一的例会，老板缺席，这一屋子的同事聊完了正事，就把例会变成了 DM 的\n\" 钓鱼 \" 培训辅导课。 DM\n的征婚启事被放在屏幕上供同事们点评，七嘴八舌地一顿， DM\n原来的东西就全被抹杀了，有两位直接挽起袖子说，我们给你写！爱好摄影的印度男同事当致电老婆领导要求贡献自家珍贵的高档相机和宝贵时间给\nDM 拍摄全套写真，印度同事学景观设计的老婆也跟着参合要给 DM 设计发型， DM\n受宠若惊地摸着自己的脑袋，眼前浮现出各种奇石绿蔓攀岩在头顶的样子，\n@@$#%% ...... @ ￥ @$%&%&* ( 注：不是乱码，是不知道该说啥）\n\n七嘴八舌当中，始终有双似笑非笑的眼睛，意味深长又含而不露地从厚厚的眼镜片后面，看着\nDM 和大家。眼睛的主人叫 Nancy ， 50\n多岁，一头杂乱的棕发，略显丰满，戴着近视镜。在 DM 的心中， Nancy\n跟国色天香毫不沾边，却是女人味最浓的一位，因为和 Nancy 共事将近 8\n年的时间，她换了四次 Last Name ，每次都跟婚姻有关。 DM\n从不主动打听人私事，只不过 Nancy 的 Last Name\n换得频率实在有点高。不知道别人怎么看，反正 DM 的逻辑特别简单，换 Last\nName\n这么勤，就是换男人换得勤，换男人那是因为有桃花运，桃花运这么壮的女人，不是女人味浓，还能是啥呢？不知道桃花运这事老外信不信，\n反正跟老外解释不清楚桃花到底是啥玩意， DM\n就从来没跟同事们探讨过这个问题。（ Nancy 的故事， DM\n会在《办公室》系列里慢慢道来）\n\nDM 读懂了 Nancy 镜片后的深意，某天中午的午饭时间， DM 假装无意溜达到\nNancy 的办公室门口，顺嘴问了句 \" 要不要一起去吃午饭啊 ? \"\n正在电脑上忙着的 Nancy 看着 DM 会心一笑，拿起包就跟着 DM 出了门。 DM 和\nNancy 在自助寿司馆几乎呆了一个下午，把工作全忘到九霄云外去了。 这期间，\nNancy 毫无保留地分享了自己 4 次婚姻的经历，和正在进行中的第 5\n次恋爱到订婚的过程。\n\nDM 看着 Nancy 无名指上大得晃眼的订婚钻戒，一直晕，一直晕。尤其是 Nancy\n跟自己说，除了第一个老公之外，其他的 4 个丈夫 / 未婚夫都是在不同的 \"\n鱼池 \" 里钓来的时候，期间 Nancy\n还抚养大了三个孩子，孩子们各个身心健康，独立成熟，（ DM 很熟悉 Nancy\n的三个娃们，个个都性格开朗，大方得体）， DM\n觉得自己如见天人，换成是古代，绝对长袖一拱，俯身叩拜。 平日里 DM\n经常取笑去自助寿司馆吃饭的人，说去那吃饭的一定要到一定的境界才能去：扶着墙进去（为了那顿饿了\nN 天），还得扶着墙出来（撑的）！ 那天 DM\n走出寿司馆的时候，自己也是摇摇晃晃扶着墙出来的，那境界高得不是一般，因为世界被\nNancy 颠覆得太彻底，不扶墙是站不住了！\n\n开车回家的路上， DM 信心满满地跟自己说， 像 Nancy\n这样貌不出众，人老珠黄的三个娃的妈妈都能嫁得出去，自己就没有嫁不出去的道理啊！\n数据上来讲， Nancy 有三个娃， DM 才一个，成功比例上升 67% ； Nancy\n戴着个啤酒瓶子底那么厚的近视眼镜，网上有数据说，戴眼镜的女性比不戴眼镜对男人的吸引力下降\n50% 呢， DM 自己就不带眼镜啊，这比例不是又上升了 100% ？呵呵呵， DM\n暗地里想，咱没有那在 8\n年里换四个姓的野心，只不过想找个踏实过日子的蓝人，按照 Nancy\n那一下午的启迪，就算只有 20% 的成功机会， DM 也没有失败的道理。 请 Nancy\n一顿寿司的钱，第二天给 DM 带来了火花乱蹦的一顿惊喜。\n\n早上一上班， DM 的信箱里躺着一封来自 Nancy 的邮件， Nancy\n用了一个晚上，给 DM 制定了类似文学城博客的模板，文采飞扬地给 DM\n写了不同风格的征婚表述， DM 一个个看过去，大体有\n智慧火花文曲星版，性感妖冶东方诱惑版，青春靓丽幽默调皮版。 Nancy\n在邮件里还提醒 DM\n，一定必须绝对地要在征婚启事里挂一张或者几张照片，而且照片一定要和自我描述的风格相当吻合，否则别说\n\" 钓鱼 \" ，连烂水草都钓不上！ DM\n对贴自己的照片心有余悸，在这巴掌大的地方，好歹自己也被几百号人认识，弄得邻里街坊朋友客户全都知道自己猴急地在征婚，怕是不太好。把这个疑虑跟\nNancy 回邮件说了一下， Nancy 不到 5 分钟又甩回来一封邮件， \"\n有没有跟你长得有点像的中国女人的照片？挂上去，让人看不出是你，见了又觉得好像可能是你。\n\" DM 心领神会地笑了起来，那不难，还真有的。 同一天的下午， Nancy\n又扔过来一封邮件，给了 DM 一个很启迪的命题：\n在池里，你即鱼饵，也是鱼儿！ 自己想去，怎么当鱼，怎么当饵？ 接着， Nancy\n教练又总结了网络海选的几个要点， DM 一边看，一边频频点头，不得不佩服\nNancy 姐姐的睿智机敏聪慧实干。。。。。（此处隐去天下所有能找出来的好词）\n噼里啪啦地， DM 按照 Nancy 的指导，换了身行头一脑袋重新跃入 \" 鱼池 \"\n。同时严格认真地开始了一三五当鱼，二四六当饵的历程。\n\n那一周， DM 的征婚信箱里收到了 200 多份邮件，按照 Nancy\n的海选标准，最起码有 20 多个入了 DM 的法眼。 过了些日子，参加完 Nancy\n婚礼回家的路上， DM 想起古人说的一句话， \" 闻道有先后，术业有专攻 \"\n，术业专攻的 Nancy 已然走进了第五次婚姻，寒冬里加拿大白雪茫茫的原野，在\nDM 眼里都满是桃花盛开的烂漫 ...", "excerpt": "下一个\n\n网络征婚之后＂术业有专攻＂ - 找个伴，过家家 （3） 2012-10-07 20:31:29\n（备注，此文为本博原创，首次发表在单身妈妈之家公共博客。此处仅为留档文件。）\n\nDM 在 \" 鱼池 \" （ POF.com)\n里注册之...", "category": "情感"}, {"id": 14, "title": "孩子，这个世界不完美", "date": "2012-01-14", "body": "下一个\n\n那个小小的，依偎在身边的儿子，仿佛在日出日落之间长大了。个子高过我快一头，声音嗡嗡地。\n几次朋友打电话过来，他接起来，都让人家日后来打听，你是不是有男朋友啦？搞得我一头雾水。\n\n脑袋上的青春痘一日日蓬勃着，饭量大到我惊叹养不起。可是心眼却一点也没有。\n\n儿子善良，善良到有点傻。最近被一个白人男孩子骗得郁闷到不得了的地步，让我这个当妈的又心痛，又无奈。\n\n这个白人男孩子叫D，是俄罗斯后裔，妈妈也是单身妈妈，找了我们小镇上的一个单身爸爸同居。单身爸爸有2个女儿，一大家子住在一起，妈妈就不工作，在家做饭伺候一家人。我了解他们的情况是因为他们想把房子租出去，曾经找过我帮忙；而我出差的一段时间，付钱给他们家人，让儿子住在他们家。\n\n从去年年初到现在，总共发生了3起大大小小的事件，儿子经过了这一年的学习人生，到今天终于明白了什么叫江湖。\n\n去年年初，D第一次转学到儿子的学校，没有一个朋友。儿子的善良，让他想到自己当初刚来的时候没有朋友的尴尬，就主动接近D，帮他认识了一些同学，可是D跟很多人合不来，最后别人不跟D玩，只有儿子搭理他。儿子带着D玩了一种战略游戏叫Magic\nCard，D就发狂地爱上了这个游戏，最后发展到每个周末要来我家跟我儿子玩，我这边就好吃好喝伺候着，让他们在我们家疯。\n\n转眼到了夏天，D来过我们家几次以后，我儿子突然不让他来了。儿子告诉我说，D可能从我们家的牌夹里偷了儿子的牌，并且还卖掉了，儿子没有证据，但是自己的卡是肯定不见了，而自己又看见过D去牌店里卖过同样的卡。\n\n一日我回家吃午饭，看见D站在我家的DriveWay上掉眼泪，停好车我就问他怎么了。他说，我儿子邀请了好几个同学来我们家玩，可是不带他，他跟过来了，我儿子不让他进门。我儿子跟他说\"我的牌丢了，我妈说了，任何玩这个牌的人都不许进我们家门！\"，D觉得自己很委屈。我想这是个好机会，就让D坐进我的车里，问他具体的情况，D跟我承认，他确实拿了我儿子的牌，而拿的原因，是他觉得我儿子跟他换的牌价值不对等，他觉得吃亏了，所以他拿了牌去卖了。\n\n我跟D说，那你拿他的牌，他不会不知道的，所以他不肯再让你进我们家也是可以理解的。现在你要怎么样呢？\nD说，我还想跟他做朋友，我可以把牌还给他，卖了的我把钱给他。我说，那这样吧，你全当我不知道，你自己去跟他说吧，然后你们自己解决好问题，再决定是不是当朋友吧。\n\n当天晚上，我给D的继父和妈妈发了邮件，请他们喝咖啡。喝咖啡的时候，我把情况告诉了两个人，继父的态度非常明确，拿别人东西，不跟别人说，无论什么理由，都属于偷，一定不能继续发展；亲妈的态度，就很暧昧，一直在强调，她知道情况，她儿子不是偷，是因为不公平才这么做的，是别无办法的情况下才做的。\n两人为了这个原则问题，几乎在我面前直接吵起来。最后还是我说，我认为家长们最好都不要介入，我们只是了解了情况，互相私下通气，但是事情让孩子们自己去解决吧。\n\nD给我儿子道了歉，还了一些还在的卡，又把已经卖了卡折钱还给我儿子。儿子竟然就高高兴兴原谅了他，两个人还是一起玩。只是我从他妈妈的态度里有了很多疑虑，坚持不允许在我不在的时候，让D来我们家，同时也不允许D单独在我们家的任何一个屋子里呆着。儿子还算配合，没有太多异议。\n\n2011年12月份的时候，儿子要做一个Project，因为班上没有人愿意和D一个组，最后儿子又选择了D，他觉得D很可怜，就拒绝了其他同学的邀请，和D单独成了一个组。因为要做Presentation，很多小组都买了糖果来奖励参与他们活动的同学，\n儿子跟我说，他也想这么做，我从Costco花60刀买了一大盒Chocola\nBar，告诉儿子说，你可以用一部分，儿子觉得自己的糖果恐怕是最诱人的，很有信心地准备他的功课去了。D告诉儿子，说他愿意承担一部分糖果的费用，儿子当然也愿意。Presentation的那一天，D跟儿子跑回我们家，把一大盒Bar搬去学校，用了大部分，然后D把剩下的Bar分两份，他拿一份，儿子拿一份回来。我很吃惊那么多的Bar会在一堂课上全部用光，不过既然是两个孩子的决定，也就没有说什么。过来一周，儿子拿回来13刀，说D说的，他只能承担13刀的费用，因为买Chocola\nBar不是他的决定，他妈妈不肯给那么多钱。我看着那13刀，哭笑不得，儿子觉得不公平，可是也没有办法。我想总不至于为了这么点钱，再去跟他妈妈说一顿吧。然后就想，她和孩子在同居男友的家里寄居，又没有工作，也不容易，就算自己赞助了，自己心里平衡了，也就过去了。\n\n从去年5月份开始，儿子一直在玩一种网络游戏，好在游戏也没有太影响他的学习，年终的成绩很不错，进步很大，当老妈的就帮他在网络游戏上花了70刀，买了些Credit.\n那个时候儿子跟我说过，那个帐号，是D的，只是D不玩了，去年5月份给了儿子，儿子已经玩到最高级别了，买了点数以后，儿子如虎添翼地又提高了不少自己的地位。\n\n上周，儿子突然黑着脸回来告诉我，因为D知道儿子在账户里有钱，而且还是最高级别了，突然跟儿子宣布，那个帐号，D从来没有给过儿子，只是借给我儿子玩的。\n并且在说完这个话之后，登录帐户，把密码改了，让我儿子失去了登录游戏的机会。这个情况出现的如此迅捷，儿子连反击的机会都没有，眼睁睁，看着自己将近一年的时间和成就就这么被D掠夺走了。\n\n上周五，我终于忍不住，给D的继父和妈妈又发了一封邮件，并且很快接到了D妈妈的电话。在电话里D的妈妈声嘶力竭跟我大喊，说我儿子是骗子，他儿子从来不会骗人。然后提到了糖果的事情，说她就是不认为她儿子应该承担任何糖果的费用，她后来给了15刀是仁至义尽；她儿子的游戏帐号，从来都是她儿子的，我儿子自己要付钱，那是活该！\n我当时听的都愣了，终于明白，D的世界真的是错的，但是不是D的错，他妈妈就没有正确过；而现在孩子们之间的问题，哪里是孩子们的问题啊，整个就是两个母亲完全不能统一的价值观的问题，这是两个母亲之间的较量！\n\n我手里拿着电话，听着D妈妈的嘶叫，几次听到15刀，15刀，可是我儿子只给我13刀啊？\n终于等她喘气的时候，我问了一句，请问，你给了多少刀来分担那个糖果的费用？\n她斩钉截铁地说，15刀！我说，我儿子只拿回来了13刀，她马上哈哈大笑，说：看！我说了吧，你儿子是骗子！\n听的我热血直冲脑门，我说，你儿子在那么？ 你可以问问他吗？\n她说：不用问！我儿子从来不撒谎！\n我坚持到：我要知道，我必须知道，如果我儿子撒谎了，我肯定会让他付出代价的！\n电话里听到她问D：你给了XX多少钱？ D说： 13 刀。 \nD妈妈的嗓门一下子小了，为什么？  D 说：我花了2刀！\nD妈妈停顿了一下，又开始嘶叫：我告诉你了，我儿子不是骗子，他花了2刀，他会给你儿子的！\n我说：那请问，你儿子跟我儿子说了，他还会给我儿子2刀吗？\nD的妈妈说：那个不重要！反正我儿子不是骗子！\n\n这个时候，我已经真的是无语了，撂下电话前我说了一句：I don't care if\nyour son is a liar or not, I am so proud that my son is not. \nD妈妈的嘶叫就被我挂断了。\n\n这个安静的下午，禁不住写几个字，把儿子和妈妈最近的这些郁闷记录一下。儿子的游戏帐号已然是进不去了，儿子也接受了这个事实，妈妈能对他说的就是，自己当初轻信别人的话，现在自己就担当吧。儿子也很坦然地说了，自己错了，自己承担。那个游戏以后就不玩了，省了自己伤心。\n\n只是想跟儿子说，妈妈很骄傲，你继承了妈妈的善良，和信任别人的心，你同样也继承了妈妈的大度和敢于担当，\n但是这个世界真的不完美。妈妈现在能做的，就是陪着你付出代价，陪着学习，就像小鸟的妈妈要把小鸟推出窝去练习飞翔一样，妈妈也必须把你推出去，让你领教这个世界的残酷。", "excerpt": "下一个\n\n那个小小的，依偎在身边的儿子，仿佛在日出日落之间长大了。个子高过我快一头，声音嗡嗡地。\n几次朋友打电话过来，他接起来，都让人家日后来打听，你是不是有男朋友啦？搞得我一头雾水。\n\n脑袋上的青春痘一日日蓬勃着，饭量大到我惊叹养不起。可...", "category": "亲情"}, {"id": 15, "title": "写杂，杂写", "date": "2012-01-01", "body": "下一个\n\n自从有了微博，写字的时候就没有了章法。博客慢慢被忽视了，就是因为博客的东西还得写的有头有尾，有修辞，有对仗，太繁琐。比较起来，微博只需要发泄一些情绪，哪怕是两个字，也就是记忆的缩写，留待以后去补充。微博的出现，特别适合爱吃快餐的人们。\n\n我不爱吃快餐，但是饿了也会吃一顿。今天不知道怎么了，一直惦记着在博客里写点什么，把自己的心思放点在博客里，也让自己多少有些困惑的情绪稍微稳定一些。\n\n年底年初的时候，总喜欢总结和展望。可能就是这种情绪吧。\n\n2011年，得到自己向往已久的工作，终于开始让不安分的灵魂有了一个更加无法安分的理由，在分离和相聚中，在游走与滞留中，给自己很多勇气。\n\n2011年，让一段心动，在还没有出生落地之前，就云消雾散了，甚至于连伤痛的感觉都没有。\n\n2011年的最后一天，与5年来的挚友出游，被她一席话说的茅塞顿开，原来生命没有必要这么Boring，可以有更多的精彩与靓丽。\n\n2012年，无论世界是不是末日来了，我都要去实现一下自己的梦想，带着儿子去游走世界，走它几个月，为此安排好了儿子的网络课堂，并且做好了所有的计划。\n\n2012年的1月1日，就在当下，就在手中了，要让每天都过得精彩，绝不错过。", "excerpt": "下一个\n\n自从有了微博，写字的时候就没有了章法。博客慢慢被忽视了，就是因为博客的东西还得写的有头有尾，有修辞，有对仗，太繁琐。比较起来，微博只需要发泄一些情绪，哪怕是两个字，也就是记忆的缩写，留待以后去补充。微博的出现，特别适合爱吃快餐的人...", "category": "生活随笔"}, {"id": 16, "title": "十年生死两茫茫", "date": "2011-12-23", "body": "下一个\n\n岁末，奔波之后的疲惫，期待之后的静寂，在岁末的时候很容易爬上心头和眉梢。\n当微博像快餐一样成为主流的时候，码字都觉得是种负担。只不过，回头来看当年写的这些字，还是有一种美好的感觉，毕竟慢工细活做出来的饭，会比快餐可口更多些。\n2001年到2011年，10年间的经历，在岁末的时候都涌出来。禁不住自己摸摸自己的脑门，感叹了一句，不容易，真的不容易。\n每年都像过山车一样，命运把你摔到这边，然后又有惯性把你重重地扔到另一边，没有选择，没有准备，当年有多很多怨气，有过些眼泪，到了今天，最多骂一句，TMD，连抱怨都短寿到了可以忽略的地步。\n当年酷爱宋词的时候，是喜欢里面淡淡的忧伤，十年生死两茫茫念起来，那么苍凉。只不过，那时少年的苍凉，在今天看起来，那么淡，那么轻；茫茫的不是生与死，是活着的时候，却已经知道死过的滋味。\n时间不会消失，消失的只是你我。", "excerpt": "下一个\n\n岁末，奔波之后的疲惫，期待之后的静寂，在岁末的时候很容易爬上心头和眉梢。\n当微博像快餐一样成为主流的时候，码字都觉得是种负担。只不过，回头来看当年写的这些字，还是有一种美好的感觉，毕竟慢工细活做出来的饭，会比快餐可口更多些。\n20...", "category": "随笔"}, {"id": 17, "title": "爱情鉴别", "date": "2011-04-02", "body": "下一个\n\n最近，有个富二代，娶了个台湾的女星，婚礼搞得沸沸扬扬。搜狐的张朝阳也被卷进去，然后嘴仗打得满天飞。\n今天听到张朝阳说了一句话，在那两个人的婚礼上，他\"见证了爱情\"。估计，这话出来，他跟那对名人就前嫌尽弃了，名人围脖上调情，媒体上热恋，欲擒故纵地结婚，无非想跟世人证明，他们那叫爱情，可惜世人不看好的居多。张搜狐这么一见证，世人一琢磨，人家连狐都搜的人，都鉴定了，那就真的是爱情了。搞得张搜狐，很像是鉴宝节目里的专家一样。\n\n想想爱情这东西，也真够惨的，存在都好几千年了，还得要人去鉴定真伪。", "excerpt": "下一个\n\n最近，有个富二代，娶了个台湾的女星，婚礼搞得沸沸扬扬。搜狐的张朝阳也被卷进去，然后嘴仗打得满天飞。\n今天听到张朝阳说了一句话，在那两个人的婚礼上，他\"见证了爱情\"。估计，这话出来，他跟那对名人就前嫌尽弃了，名人围脖上调情，媒体上热...", "category": "情感"}, {"id": 18, "title": "天使宝贝", "date": "2011-02-17", "body": "下一个\n\n在北京的一个好友，有一个和我儿子差不多岁数的男孩，但是她一直有个梦想，想要有个可爱的小姑娘。\n\n终于，在去年的秋天，她四十三岁的时候如愿以偿，一个漂亮健康的女儿来到了这个世界。每天我都会在网络上看到她和闺女的照片分享，悄悄地关注着她，分享着她的快乐。默默地祝福着她，体会着中年抚育婴儿的辛劳。\n\n突然这一天，她的博客一片黑暗，满是泪痕。才知道，可爱的小姑娘，在大年三十的晚上，在睡梦里，悄悄地安静地去了天堂。\n她的生活彻底乱了，乱得找不到方向，小哥哥从学校回来，对着妈妈大哭，始终不相信妹妹已经永远离开了，他坚信是妈妈和爸爸开了个玩笑！\n\n不知道对她说什么，把2年多前的一篇关于死亡的随想，发给她， 只写了2个字，\n抱抱！\n\n那个从未谋面的天使宝贝，此刻在天堂里温暖地飞着，飞着............", "excerpt": "下一个\n\n在北京的一个好友，有一个和我儿子差不多岁数的男孩，但是她一直有个梦想，想要有个可爱的小姑娘。\n\n终于，在去年的秋天，她四十三岁的时候如愿以偿，一个漂亮健康的女儿来到了这个世界。每天我都会在网络上看到她和闺女的照片分享，悄悄地关注着...", "category": "生活随笔"}, {"id": 19, "title": "恍惚", "date": "2011-02-07", "body": "下一个\n\n晚饭后，钻进地下室。挑战乒乓球，直打到浑身汗水湿透。\n\n然后又打开机器，唱了2个小时的OK。\n\n按照文学城里的推荐，减肥需要消耗的卡路里绝对已经消耗完毕。\n\n唱k 的时候，能唱的无非都是些老歌。\n不少10年20年前的MTV，不知怎么当年的情景就浮现出来。那些青葱岁月，自己扎着小辫在舞台上蹦蹦跳跳的样子；一边唱着《牵手》，一边被自己纯洁又崇高的爱情感动得痛哭流涕的日子，\n仿佛就在昨天。。。。。。\n\n恍恍惚惚地，又从未有过的真切，感觉自己已然不是自己，歌声袅袅里，是自己的眼睛在观望着自己，\n一切都变的有些混沌。。。。。。。。。。", "excerpt": "下一个\n\n晚饭后，钻进地下室。挑战乒乓球，直打到浑身汗水湿透。\n\n然后又打开机器，唱了2个小时的OK。\n\n按照文学城里的推荐，减肥需要消耗的卡路里绝对已经消耗完毕。\n\n唱k 的时候，能唱的无非都是些老歌。\n不少10年20年前的MTV，不知怎...", "category": "生活随笔"}, {"id": 20, "title": "零下3度的夏天", "date": "2011-01-28", "body": "下一个\n\n几个月没有落笔，回来看看，2年多的日子豁然回到眼前。\n\n又经历了些变故，中间起起伏伏，恩恩怨怨，过去了，就淡然了。有些感叹，无论人生怎样的颠沛，日子就这么像流水一样安静地在你身边溜走，在你焦头烂额应对的时候，岁月的脚步也从来没有停下来过。\n\n前几天，温度一直在零下30度徘徊。只穿一条牛仔裤在门口一站，凛冽到以为自己一丝不挂。 穿得象棉猴一样到外面扫了5分钟的雪，脸被冻得发僵，用手一摁，竟然发出巧克力冰棍被咬碎才会发出来的\"喀嚓\"声，三步并作两步，奔到镜子前，担心自己的脸会跟破了的镜子一样，已然裂成几块了....... 仔细瞧瞧，还好还好，只是有些僵硬而已。 \n\n今天一早起来上班，不但没有感到凛冽，虽然四面白雪皑皑，还有丝丝温暖扑面而来。定睛一看，零下3度！ \n\n因为零下3度，一天的精神头都是高的。 大马路上的雪被市政扫得干净，笨重的雪裤可以暂时收起，没有戴帽子耳朵也不疼。 这么多美好的事情，就在零下3度的时候，发生了，嘻嘻嘻嘻！\n\n零下3度，简直就是夏天啊！！！！\n\n不是吗？  20多度的温差，夏天也不过如此，不同的是，一个在0度之上，一个在之下！\n\n为什么40度是夏天，零下3度就不是了呢？", "excerpt": "下一个\n\n几个月没有落笔，回来看看，2年多的日子豁然回到眼前。\n\n又经历了些变故，中间起起伏伏，恩恩怨怨，过去了，就淡然了。有些感叹，无论人生怎样的颠沛，日子就这么像流水一样安静地在你身边溜走，在你焦头烂额应对的时候，岁月的脚步也从来没有停...", "category": "生活随笔"}, {"id": 21, "title": "合着，我残疾了？", "date": "2010-09-15", "body": "下一个\n\n最近右腿的胯骨，只要一上楼就疼。就好象那里有两个搭勾没有搭好，嘎啦嘎啦响不说，而且稍微哪个位置不对，就疼。被同事推荐去看了一个\nChrioprator, 中文呢该怎么叫呢？ 脊椎医生？\n反正就是正脊椎的医生。拍了片子，然后被医生命令弯腰，侧背，仰卧俯卧，然后还拍了整个脊椎的X光片。虽然明天才能看到X光片，但是医生已经告诉我，右肩膀变形，颈椎弯曲，右胯股比左胯高出3个厘米，右腿比左腿还要短几个厘米。最厉害的是，我的左腿比右腿承担身体的重量要整整多出5公斤。这一切都是因为我的腰椎最后2节僵直，不能侧弯导致身体承重变化，身体其他的骨骼也变化，需要进行治疗矫正。\n出了医生的诊所，我几乎不会走路了？ 合着40多年来，我一直是个跛子？", "excerpt": "下一个\n\n最近右腿的胯骨，只要一上楼就疼。就好象那里有两个搭勾没有搭好，嘎啦嘎啦响不说，而且稍微哪个位置不对，就疼。被同事推荐去看了一个\nChrioprator, 中文呢该怎么叫呢？ 脊椎医生？\n反正就是正脊椎的医生。拍了片子，然后被医生命...", "category": "生活随笔"}, {"id": 12, "title": "找个伴吧，过家家 （二）", "date": "2010-06-14", "body": "下一个\n\n找伴这个事情，DM从一开始就做好了充分的思想准备。这个项目，在目标上很难把握。要找的是个伴；这个伴，得是个男人；这个男人，得是个和自己能有些共同语言&生活习惯的男人；这个男人，还得在经济上跟自己匹配。。。。。。\n\nDM有天在办公室发挥她极其丰富的想象力，要是找伴这个目标能像洋葱一样一层一层拨开来，呵呵，那这个洋葱得比篮球大一倍，洋葱的芯里蹲着一个男人，这画面就跟当年哪咤出生的场景一样！莲花慢慢绽开，里面躺这个莲藕般鲜嫩的莲花宝宝！DM跟自己说，可惜这个洋葱不会像花一样绽开，得靠自己忍着刺眼的味道一层层剥开，剥到最后能出来个皱纹不要太深老头就很不错了。\n\nDM没有想到，找伴项目启动后第一个约见的男人，并不是来自那些征婚网站。\n\nDM在小城里认识一个跟自己年纪差不多的中国女朋友C，C有一个白人男朋友。C和白人男友一直吵吵闹闹地，相处了2年竟然分手了。每次两个人一吵架，C跑去跟DM诉说，所以DM虽然没有见过这个人，却了解他不少。这个哥哥，\n年方48,\n未婚，在一个工厂里当生产线的领班，收入还行，另外这个哥哥投资了5套房。按理说，C跟这个王老五哥哥条件挺匹配，无奈这个王老五哥哥不喜欢婚姻的束缚，而C是个不折不扣的结婚狂，还想赶末班车生个孩子。两个人在原则问题上怎么都调和不了，最终分手。\n\nDM\n看着C分手以后茶饭不思的可怜样，留她在家住了几天，给她做了些中国饭吃。也不知道过了多久，有一天在超市里，突然有个中等个子的白人跟自己搭讪，还冒出两句中文。\nDM挺有礼貌地应付了一下，这个男人突然说：你是不是叫XX？\n在XX公司工作？见DM一愣，这个男人赶忙自己介绍说：我是C的前男友！\nDM恍然大悟。这个男人一直跟着DM到了停车场，然后追着要DM的电话。\nDM很是不悦，撩了一句：我不用电话！\n\n晚上，DM接到了C的电话，C说想把自己的前男友介绍给DM。DM跟C说，妹妹啊，你是不是疯了！你姐姐缺个男人，可好歹也没到了饥不择食的地步啊！你都咬过的苹果了，怎么想起来给我？！C坚持不懈地说：啊呀，他缠着我给他介绍中国女朋友啊！他就想找个中国女朋友，我觉得你挺合适，你又不想结婚，也有自己的孩子，他跟你最合适！\n\n这么纠缠了几个星期，C最后都快求DM了，说：好歹你给个面子，哪怕见一面之后回绝掉都成啊，这小镇上，除了你是个单身我找不到其他的中国女人了，你不见他一面，我就被烦死了！DM被纠缠地是在烦了，答应去跟这个王老五苹果哥哥见面。  \n\n王老五苹果哥哥跟DM见面的一个小时，\n完全成了对他的折磨。  无数次他想尝试着找话题,\n都被DM带着甜甜的笑用一个关闭式的答案噎到半死。\"你的工作不错啊！\"\"是啊，谢谢！\"；\"你的腿真长，真好看！\"\"是啊，我也这么认为！谢谢！\" \"你的英语真棒啊！\"\"是吗？谢谢！\"，说这些话的时候，DM始终直视着男人的眼睛，男人最后被看得不好意思了，低下了头。一直没有办法开启的话题，让这个男人很无奈，最后他说：你跟我认识的中国女人太不一样了,\n太不一样了！  DM知道他想等问：是吗？哪里不一样? 为什么? \n以便展开一个好话题， DM还是笑着说: 谢谢您的恭维!　但是，DM 就是不问他。\n王老五苹果哥哥已经谢顶的脑袋上慢慢冒出了细密的汗珠，看着他手足无措地上了N次厕所之后，DM微笑着说：对不起，我得去接孩子了。然后，飘然而去。\n\n从那以后，C再也没有给DM打过电话。\n\n \n\n其实，苹果哥哥卖相还不错，经济条件也不差，DM也没有因为单身变得乖张到要故意让苹果哥哥难堪，DM只是觉得这场面有些古怪。中年男女,\n谁要是没有过情和爱的经历？\n人生要是个苹果，到了这个岁数，想找到一个没有过经历的老苹果，这要求高得有些古怪。打比方说，在一个阴森城堡的橱柜角落里发现了一只老皱又完整的苹果，是初级古怪；看见那样的苹果，捡起来，是中级古怪；捡起来看见那苹果被人咬过一口，古怪得也还算正常，　但是，　这之后，自己也去咬一口，　那就古怪得有些森人了。　\n\nDM觉得，自己也是只老苹果，这次的经历，就好象两只古堡的皱苹果相遇,\n自己这个老苹果满身是疤； 另一只，被人咬过的创面，满是斑驳......", "excerpt": "下一个\n\n找伴这个事情，DM从一开始就做好了充分的思想准备。这个项目，在目标上很难把握。要找的是个伴；这个伴，得是个男人；这个男人，得是个和自己能有些共同语言&生活习惯的男人；这个男人，还得在经济上跟自己匹配。。。。。。\n\nDM有天在办公室...", "category": "生活随笔"}, {"id": 22, "title": "专业词汇", "date": "2009-12-22", "body": "下一个\n\n单妈爱笑，圈子里是出了名了。\n\n当年在北京的各路朋友，虽然单妈不在身边也经常聚会，会后常常给单妈一个简单报告，谁谁谁干了吗吗吗，最后一定来一句，我们都想念你的笑声。\n\n年内，单妈两次因为出差回北京，和老朋友们相聚一堂，各路人马一起开心，笑到酒店的包房的吊灯暴掉大家一起赔钱。\n后来在一个朋友的博客里，看人家写了一段纪实，里面提到自己。原话是这样的\"小野鸟（圈内人给单妈的昵称）从加拿大回来的时候，是我们的节日。这个颠覆美女\"笑莫露齿\"传统美德的女人，是唯一一个可以笑得露出嗓子眼，你还觉得她很美的另类。跟她一起笑到满脸长折子，也无怨无悔。\"\n\n单妈留言：姐姐！任何描述都需要准确严谨！请注意，露出来的是扁桃体，不叫嗓子眼！专业，专业，一定要专业哪！\n\n结果是导致一圈人又到博客里一起露着扁桃体大笑了几天。", "excerpt": "下一个\n\n单妈爱笑，圈子里是出了名了。\n\n当年在北京的各路朋友，虽然单妈不在身边也经常聚会，会后常常给单妈一个简单报告，谁谁谁干了吗吗吗，最后一定来一句，我们都想念你的笑声。\n\n年内，单妈两次因为出差回北京，和老朋友们相聚一堂，各路人马一起...", "category": "生活随笔"}, {"id": 23, "title": "时光飞逝", "date": "2009-10-14", "body": "下一个\n\n时光飞逝啊。\n今天心血来潮，登录这片久违了的自留地，竟然想不起密码。\n费尽周折，让密码重置，才得以进入这个空间。  然后看到 \"这是您第 224\n次登录，上次登录：2009-02-03 \" \n的提示，才发现自己已经有8个半月没有光顾过，实在惭愧。\n8个多月发生了太多的事情，直接导致目前的生活有了天翻地覆的变化，一切都太忙碌太神奇。\n既然重新回到这片自留地里，就开始续写人生的故事，无论悲喜，都要记录。", "excerpt": "下一个\n\n时光飞逝啊。\n今天心血来潮，登录这片久违了的自留地，竟然想不起密码。\n费尽周折，让密码重置，才得以进入这个空间。  然后看到 \"这是您第 224\n次登录，上次登录：2009-02-03 \" \n的提示，才发现自己已经有8个半月没有光...", "category": "生活随笔"}, {"id": 13, "title": "找个伴吧，过家家 （一）", "date": "2009-01-22", "body": "下一个\n\n经历了3年的单身生活，不知道什么时候，DM的个人问题又成为了一个靶子。每次打电话回中国都会被父母兄长严肃敦促，\"奔四的人了，该好好考虑以后的生活了！\"；昔日的好友也开始嘘寒问暖\"怎么样了？有什么新动态吗？\"，办公室的单身同事一个个开始积极介绍约会\"钓鱼\"经验，把各种\"鱼池\"信息发进了DM的信箱。\n\n面对诱惑和压力，DM还是抵挡了一阵子。其实18岁上就恋上自己的大学老师，大学毕业就结婚生子，DM觉得自己缺了单身这一门必修课。虽说30多岁单身和20岁单身大有不同，DM自己过得挺滋润，工作轻松，经济不宽裕却也不拮据；加上性格开朗，每每遇到难事，DM也都能挺过去；DM有一双孩子一样单纯的眼睛，对这个世界充满了好奇和热情，从和儿子一起打球到参加各种俱乐部去旅行，DM的日子过得充实满足纯净安宁。日子这么过着，结交的朋友也不少，期间也有些异性对DM频频示好，DM都没有接招，一味继续带着孩子满世界逍遥，并不觉得有什么压力。\n\n一日，DM买了件时尚的新裙子，试衣的时候有店员服侍从后面拉上拉链。等回到家，DM想再臭美一把，竟然自己把手腕快窝断了也没有成功，恰恰那个时候儿子去别人家过夜还没有回来。DM颓然坐在椅子上发了一会愣。 《欲望都市》里的情节顿时跳了出来，萨满沙情人众多，自己病倒的时候，却没有一个人端茶倒水的凄惨情景让打了DM一个寒颤。连游戏人生的萨满沙最后都会需要一个归宿，何况一个一直洁身自好的女人呢？那一天，DM开始认真考虑父母兄长密友同事的建议。\n\n认真考虑了2个星期，DM准备和儿子也探讨一下这个问题。没有想到，自己还没有说完，家里那个12岁的小男人很成熟地拍拍DM的肩膀说，\"妈妈，你看楼下那个Jade的妈妈，那么胖，都有男朋友了。 他还经常带J妈妈还有J 一起看电影呢！ 妈妈，你比她漂亮多了，你早就该有男朋友了，这样，我们出去玩就多个伴，多好呀！再说，你不喜欢玩电脑游戏，要是你找个男朋友喜欢玩就更好了，这样我就有人一起玩啦！\"DM准备好的一套说辞，根本就没有机会说出来。儿子的一番话，让DM心里欣慰之余，又多出很多感慨。原来自己以为满意的生活，其实还有很多缺憾，比如儿子慢慢长大的过程，一个成熟男人的榜样作用还是不可缺少。儿子虽然还不明白这些，言语里透出来的无奈和孤单，让DM感到找个\"伴\"的紧迫性和必要性。\n\n多年职场打拼，DM一直是资深的项目经理，曾经被老板特别在年终表彰以\"行动巨人\"的称谓。对于\"找个伴\" 这个模糊的命题，DM习惯性地按照项目管理的方式进行了项目评估，项目预算，时间表预估，阶段性目标设定等一系列工作，然后把同事好友推荐的中外文征婚交友网站全部浏览了一番，写好了自己的征友广告。在把广告正式发布的那个时刻，DM心里一阵紧张，不知道怎么就想起来小时候听中央电台的少儿节目里那个\"小朋友，小喇叭开始广播啦！嗒嘀嗒，嗒嘀嗒，嗒嘀嗒，嘀、嗒！鸡蛋壳小帽白光光/桔子皮做我的红衣裳/绿～辣椒做我的灯笼裤/蚕豆皮鞋，咔咔响/你要问我是哪一个/我是小木偶/名字就、叫、小叮当/我是小叮当/工作特别忙/小朋友来信我全管/我给小、喇、叭，开信箱！\"， 脑子里响着， 手上这么一点一点再一点，DM的\"找伴\"项目正式启动。", "excerpt": "下一个\n\n经历了3年的单身生活，不知道什么时候，DM的个人问题又成为了一个靶子。每次打电话回中国都会被父母兄长严肃敦促，\"奔四的人了，该好好考虑以后的生活了！\"；昔日的好友也开始嘘寒问暖\"怎么样了？有什么新动态吗？\"，办公室的单身同事一个个...", "category": "生活随笔"}, {"id": 24, "title": "跟儿子谈性 （一）", "date": "2008-06-05", "body": "下一个\n\n儿子到年底就12岁了，性的问题，\n虽然知道迟早一天会面对，但是没有想到这么快。\n\n今天儿子一个人对付作业，是一些查词汇的作业。\n小家伙一放学就给我电话，说自己的作业。我没有在意，告诉他自己去电脑上的金山词霸上查。\n\n过了一会，他又给我电话，说词查出来了，还是不知道是什么意思，需要我回来帮他。我想小家伙估计是偷懒，还是没有在意。\n\n到了晚上，他把作业拿到我跟前，我一看，暗自就惊了一下，所有的词汇都是跟男女性别有关的，有激素名称，有性器官名称，有一些分泌物，和男性功能的专业词汇。\n\n我突然意识到，那个我早就知道迟早要面对的时候到了。学校开始了针对即将进入青春期的少年的性教育，老师曾经提到过，希望家长也配合。\n\n面对儿子，我丝毫不能露出惊讶，只能镇定以对。于是把20多个词汇一个个查出来，跟他解释。小家伙开始可能还觉得有些尴尬，但是我镇定的态度，还有平静的语气，慢慢让他放松，他的问题也多起来。\n\n作业里有一个词，\n是梦遗。我跟他解释了。他问我精液如果流出来会不会象尿床，我说不会那么多，回比较粘，冰凉的。他说那象什么？我说象清鼻涕吧！小家伙就开始干呕。\n然后我解释说，那不恶心，因为那些液体是为了保护精子的水分很营养，不然精子就死了，精子可都是你的儿子呀！\n他点头说：虽然想着有点恶心，可那既然都是我儿子，就不想那么恶心的事了。\n然后他又问，那你估计我多大岁数会梦遗？ 我说14岁以后吧，\n他满脸那种期待又怕脏的表情，呵呵，很逗。\n\n到了女孩子的词汇部分，他理解得很快，可能是因为奶奶做妇科医生的缘故，小的时候，他曾经把妇科图解的医学书全看过了，没有任何问题就过了关。\n\n作业里的另一个词，是勃起。他问我那是不是早上憋尿的时候小鸡鸡站着的样子，我说对。他又问，那除了憋尿，还能干吗？\n我说，等你长大了，会喜欢女孩子，和女孩子的身体就会让你有些冲动，小鸡鸡就会站起来，然后努力把精子送到女孩子的肚子里去跟那里的卵子结合，然后生孩子。\n他似懂非懂地问，我一定会对女孩子感兴趣吗？要是我就是不冲动，小鸡鸡不站起来呢？\n（妈呀！）虽然我心里已经出汗了，这个时候我还得镇静！我说，宝贝，你要好好吃饭，好好锻炼，鸡鸡都会站起来的！\n（蛙哑哑！ 这都什么呀！）\n\n终于作业作完了，还算顺利，我们关于性的话题刚刚拉开序幕。让当妈的给一个男孩子讲解这些，实在是不容易，我都开始佩服自己了。\n\n一边做作业，我也一边套儿子的信息。儿子跟我说，老师开始讲解男孩和女孩的不同了，从现在到月底放暑假前估计都是这个话题，青春期，性别差异还有怎么应对。老师还说了，明天会看录像，\n讲解更详细的知识。\n看来我的判断没有错，学校有意识地在孩子们进入13岁的时候开始了系列的生理教育。而学校采用的方式灵活，老师也很开放，我很欣赏。\n\n儿子上床前，还夸我，妈妈，你不愧是医生的女儿，懂得真多！我就顺势问了一句：你们老师讲这些的时候男生女生在一起吗？\n你有没有害羞呀？\n儿子竟然反问我一句：当然是男女生在一起上课啦，不然怎么知道那些知识是女孩相关的，哪些是男孩相关的？我没有害羞呀。\n我被问的没有问题了，赶快闭嘴。\n\n谁知道，过了一会，儿子竟然从床上爬起来，穷追不舍：你为什么要问我害羞？难道我该害羞吗？\n为什么我要害羞呢？\n我赶快说，当然你没有必要害羞呀！孩子这才放心地回去睡觉了。\n\n \n\n这儿子看来是彻底回不去我的故土了，他不为性害羞，我这当妈的，可不是这么长大的。今天跟他谈完了性，他可以安心睡觉，他哪里知道他老娘已经开始琢磨着迎接他第二场提问了！", "excerpt": "下一个\n\n儿子到年底就12岁了，性的问题，\n虽然知道迟早一天会面对，但是没有想到这么快。\n\n今天儿子一个人对付作业，是一些查词汇的作业。\n小家伙一放学就给我电话，说自己的作业。我没有在意，告诉他自己去电脑上的金山词霸上查。\n\n过了一会，他又...", "category": "亲情"}, {"id": 25, "title": "蜻蜓 - 死亡随想", "date": "2008-05-05", "body": "下一个\n\n在一个绿色的池塘里，住着很多水虫。他们彼此都认识，每天早上太阳出来的时候，就在一起快乐地嬉戏，夜晚到来的时候，他们就安静地回到水草里休息。\n\n \n\n每天的生活都是那么安静，和快乐。\n只是，没有多久，随着新的水虫的诞生，总有一些年纪大些的水虫慢慢升起到水面上去，然后他们就消失了，从此没有再回来。\n\n \n\n生活在水底的水虫们经常会想起来他们的伙伴，那些消失了的朋友，不知道他们去了哪里，也不知道他们生活的怎样。\n\n \n\n有一只小水虫就对自己说，等我有一天也升到了水面上去，我一定要回来告诉我们的朋友们，那里是怎样的。\n\n \n\n那一天终于来了，小水虫被一种神奇的力量吸引着，升上水面，\n然后跃然跳出了水塘。 她的身上长出了薄薄的羽翼，\n身体变得修长而轻盈，她慢慢挥动翅膀，她竟然飞起来了！\n小水虫看到了和水下完全不同的世界，清新，透亮，色彩斑斓，温暖干爽，\n她突然明白了， 那些早年浮出水面的朋友们为什么都没有再回去看望他们，\n原来水面上的世界是如此地不同。 她在辽阔的天际飞啊， 飞啊 ，\n睁着好奇的眼睛到处张望，\n偶尔她也会想起水面下自己的伙伴，阳光好的时候，她甚至都看见了他们在水下的身影！ \n好多次，她尝试着去水底告诉他们外面的世界是怎样的，但是水面总是静静地阻止她的努力，\n她总是失败。\n\n \n\n终于有一天，她明白了，原来那没有厚度的水面，就是一种善意的安排，\n让每一个在水底生活的小虫子无法预知自己的归宿，\n只有当他们冲破水面的时候，才能凭借自己身体的每一寸肌肤，去了解这个世界的美妙。\n\n \n\n小水虫，\n不！一只美丽的小蜻蜓，终于放弃了飞回水底的尝试，安静又快乐地在水面上生活下来，\n那里就是      -------     天堂！ 她每天都在等待着，\n自己在水面下的那些朋友有一天会冲破水面，在天堂里和自己一起自由地飞翔......\n\n \n\n宗教，让人们相信自己可以战胜死亡的恐惧。\n天堂，是宗教给每一个人美好的愿望，我们都希望有一天象小水虫一样生活在天堂里，\n和自己的亲人好友相聚一堂。 在我们的今生，我们永远无法预知天堂里的景象，\n但是至少有一种信仰，\n让我们知道原来死亡不过是要冲破水面那一瞬间的恐惧和痛苦，而等着自己的是温暖的天堂。\n\n \n\n我愿意相信，那个蜻蜓住着的地方，我爱着的亲人们有一天会和我在那里相聚，然后我们快乐地生活永远不分开。", "excerpt": "下一个\n\n在一个绿色的池塘里，住着很多水虫。他们彼此都认识，每天早上太阳出来的时候，就在一起快乐地嬉戏，夜晚到来的时候，他们就安静地回到水草里休息。\n\n \n\n每天的生活都是那么安静，和快乐。\n只是，没有多久，随着新的水虫的诞生，总有一些年纪...", "category": "生活随笔"}, {"id": 26, "title": "放弃 VS 解脱", "date": "2007-08-31", "body": "下一个\n\n看到一篇文章， 是关于 \" 放弃 \" 和 \" 解脱 \" 的。 \n\n通篇看去，是在说放弃了就解脱了， 人生充满了遗憾，有时候遗憾也是一种美丽。 明白的人懂得放弃，真情的人懂得牺牲，幸福的人懂得超脱。 \n\n放弃了就真的能解脱吗？ 还有就是什么是放弃？ 什么是解脱？ 放弃什么？ 又解脱什么？ \n\n上个周日，去了久违的教堂，不为别的， 就是去送那位西人牧师和他的家人。 在我最无助的时候，他和他的太太，给了我和孩子最无私的支持 。 在大雪纷飞的夜里，他和太太带着我奔波在这个城市里，帮我和孩子找一个栖身之处；又在圣诞快乐的气氛里，为孩子准备了特别的礼物让我们惊喜 ...... 他们默默做的事情从来没有要我给过任何回报。 在教堂发表最后一次演讲的时候，牧师说，因为传教的原因一生搬过很多次家，所以他的人生都是由\"\nBYE \"和\" HELLO\n\"构成的，不知道为什么他的一句话，突然让我的眼睛蒙上一层泪水，其实谁的人生不是这样呢？ \n\n一个相熟的女友，离异的单身妈妈。人长得漂亮，学问也做得出色，她早年移民加国，被派回北京工作，和某领域的权威人士有过一段刻骨铭心的恋情。那男人有一个当高官的强人太太，虽然不是自由身，分居却已多年，婚姻如同虚设。 \n\n5 年的时间，两个中年人爱得热烈又醇厚，每次相见，男的意气风发，女的柔情似水，那份默契和挚烈写在脸上，让我们这些做朋友的羡慕无比。那个男人对她说，让我们放弃繁华，去一个山清水秀的地方过隐居般的生活。为了这个梦想，他们驱车千里考察过一个美丽的海滨城市，当地知名的学府甚至为他们提供了待遇优厚的工作。女友把孩子从加国接回，在那个小城市里找好了学校。 \n\n女友了断北京的工作，放弃即将到手的移民身份，甜蜜地准备行囊和爱人去过梦想的田园生活，男人却突然变卦。男人说：损失太大了，我承担不起，房子，父母，孩子，前途，仕途 ...... 男人向她一项一项列举残酷的现实的时候，女友听到了心一点点破碎的声音。 \n\n后来女友切断了和男人的联系，独自带着孩子又回到加国，从最底层开始重新找工作，其中的艰难令人唏嘘。我曾经小心翼翼地提起那个男人，女友沉默了良久，淡淡地说：不怪他，是我太天真了！以为我可以放弃的东西，他也可以放弃 ......\n\n再回北京的时候，看见那个男人频频出现在媒体，也辗转知道他已经离异，独自生活。也可能是错觉，我见他的眼里不再有夕日热烈的光芒，整个人也灰暗了很多， 不知道放弃了那个至爱的女人，他是不是就得到了不断追逐的一切 ......\n\n生命有多少可以放弃？ 生养自己的父母，魂萦梦绕的故土，青梅竹马的婚姻，白手创业的家产，刻骨铭心的感情， 习惯了的生活 ...... 生命又有多少次机会，让人在放弃了之后能真正的解脱？", "excerpt": "下一个\n\n看到一篇文章， 是关于 \" 放弃 \" 和 \" 解脱 \" 的。 \n\n通篇看去，是在说放弃了就解脱了， 人生充满了遗憾，有时候遗憾也是一种美丽。 明白的人懂得放弃，真情的人懂得牺牲，幸福的人懂得超脱。 \n\n放弃了就真的能解脱吗？ 还有...", "category": "生活随笔"}, {"id": 27, "title": "中国通PAUL - 稳定是无价的财富", "date": "2007-07-13", "body": "下一个\n\nPAUL是个白人老头，大概有60岁，满头白发，高大挺拔，脸上最帅的零件要算他的鼻子。他的鼻子比大山高很多，中间有个凹，象极了我年少时的偶像阿兰德隆。\n\nPAUL自己开过旧车行，当过老板，事业经历过波折，10年前提前退休的时候他是这个镇上数一数二的富人。退休以后他觉得无聊想去外面转转，就自愿到我们公司当了个只拿佣金的职员。PAUL在我们办公室负责中国市场开发，工作的缘故，他和太太每年有大概4个月的时间在中国，也顺便去日本和韩国转转做点搂草打兔子的生意。因为去中国的次数多了，慢慢他就变成了我们这小地方著名的中国通，镇长搞点中加贸易会找他咨询一把，图书馆里也时不时挂出\"中国专家PAUL先生跟小朋友们讲中国\"的横幅。\n\nPAUL经常会提起10年前第一次去中国的经历。他和太太买了机票飞上海，到了以后才知道那天是中国的大年三十，所有他想见的客户都把开会的时间推迟到了3周以后，他想着，那上海不行就去北京吧，谁知道北京的客户更厉害干脆说春节是我们的大事，任什么生意都一个月以后再谈吧。可怜的PAUL和太太原本计划2周的行程，最后愣是在中国呆了2个月才见完了他要见的人。不过功夫不负有心人，客户们看他如此有诚意地在中国等待，生意基本也都给他了，让他那一年的业绩成为全公司学习的榜样。\n\nPAUL在中国的经历用他的话说可以写一部传奇。最传奇的是他被客户灌醉的那一段。他被北京的客户拉去喝酒，55度的茅台，客户回回干杯，为了表示尊重他也跟着干，最后客户们倒了，他也倒了。回酒店以后，太太出门去送人，5分钟之后回来发现PAUL仅穿了一条内裤站在大堂里高唱加拿大国歌，周围引了一圈各国游客观看鼓掌。据他太太讲，PAUL那天几乎半裸着唱完了他一辈子会唱的所有曲子，每唱完一曲还对鼓掌的人行光腿屈膝礼，任太太和保安怎么劝怎么拉，他都不愿意走，最后大家只好等着他唱得彻底累倒躺在地下酣睡的时候才找了个担架把他抬回房。第二天早餐的时候，半个餐厅的人都来跟他打招呼，夸他歌唱的好，他太太一脸尴尬，他却一脸茫然，问太太：这说谁呢？\n你昨天晚上唱歌了?\nPAUL从那次以后就怕了中国的酒宴，每每出席就带着医生证明去。那证明让我大开眼界，英语写得密密麻麻倒不打紧，不知道哪个要命的用红色中文正楷写着：大人！饶命！我有高血压，高血脂，医生说再喝就该去见马克思了！\n \nPAUL的父母在我们这个小镇上住了一辈子，PAUL和太太跟他们一样从生下来就生活在这里。不过PAUL的2个儿子都漂泊到海外去了，老大在欧洲混了很多年娶了个法国老婆回来然后跟着老婆去了QUEBEC，自打那闹独立，他儿子已经不算加拿大人；PAUL的小儿子离婚以后被PAUL介绍到上海工作，据说被美女包围着乐不思蜀。用PAUL的话说，他的2个儿子是新世纪的新移民，不过跟大部分的人方向相反。\n\n我喜欢跟PAUL聊天，在我眼里，他是办公室里经历最单纯又最丰富的一个。单纯是因为他一生住在这个小镇上+和太太婚姻和美；丰富是因为他做过老板打过工，经历过失败和成功，阅人无数+游历列国。\n我把这个\"最单纯又最丰富\"的帽子扣在他头上的那次，他特别开心，给我一个大熊抱：啊呀，这辈子夸我的人多了，你夸得是最舒服的一个！\n\nPAUL\n对人生有很多感悟。有一次跟他开车去开会，路上瞎聊，我问他：你一辈子生活在这里，不觉得无聊吗？\n有没有想过要去别的地方？一辈子就结了一次婚，没有觉得枯燥？\n这一问，打开了他的话匣子。 他说：我怎么会没有想过？\n年轻的时候血气方刚的，觉得世界上哪里都比自己的家乡好；事业低谷的时候，婚姻也遭遇过波折，我甚至想过离开我太太去追求点别的刺激；今天看来当初无论是什么原因把我留在这里，留在婚姻中都让我感到无比幸运。看我还想探究的样子，他指着公路上画的各种线说：你看这路上的线，我就是那条实线，因为没有移往他乡，没有打碎自己的婚姻，得以无间断地延续下去，才可以经历过失败后仍然有成功的事业并且逐渐积累财富，到今天都要退休的时候我由衷地感到稳定是一笔无价的财富......\n\nPAUL说这番话的时候，我看着路上时不时出现的虚线，不禁感慨。相对于稳定而富足的PAUL，我们这些了断过去的生活，抛弃生养自己的故土，在异乡蹰蹰独行的灵魂，不知道有没有机会把那些已经中断的人生再联接起来。", "excerpt": "下一个\n\nPAUL是个白人老头，大概有60岁，满头白发，高大挺拔，脸上最帅的零件要算他的鼻子。他的鼻子比大山高很多，中间有个凹，象极了我年少时的偶像阿兰德隆。\n\nPAUL自己开过旧车行，当过老板，事业经历过波折，10年前提前退休的时候他是这...", "category": "生活随笔"}, {"id": 28, "title": "单翼飞翔", "date": "2007-07-10", "body": "下一个\n\n我不是生物学家, 但是知道的生物好象大部分都是对称的.\n左口鱼应该算是我见过的另类了, 两个眼睛长在一边. 记得第一次看见左口鱼,\n我就认定这鱼在水里游泳的时候总也走不了直道.\n\n \n\n网络上充满了缠绵的爱情故事,今天又在移民的论坛了读到一篇.\n一个丈夫为了在国内的事业, 把妻子独自留在加拿大,\n但是他又为了妻子操心不安. 这位丈夫文笔细腻, 感人,\n愣是写得让几百个人跟他的帖子,陪他一起掉眼泪.看到夫妻两个初到加拿大那种互相依偎度过寒冬的描写,\n不禁感慨：原来两个翅膀一起飞会如此温暖！\n\n \n\n 经历过加拿大的寒冬,\n我知道那种冷是从骨子里森出来的.那些阴霾的日子,让人感觉没有尽头，甚至会去怀疑天空中是否真的有个太阳。 \nWINTER BLUES 就会在不知不觉中慢慢在心里滋生, 在那样的冬天,\n有一个无论你走到哪里都会跟着你的伴侣, 和他一起度过,\n就象阴霾中的一缕阳光。 在很多完整的家庭里,\n这样的陪伴可能不足以让人有任何感触, 但是对于独自在路上行走的女人,\n那份简单的温暖却是最奢侈的享受.\n\n \n\n \n\n我只有一支翅膀, 但是我必须飞翔......", "excerpt": "下一个\n\n我不是生物学家, 但是知道的生物好象大部分都是对称的.\n左口鱼应该算是我见过的另类了, 两个眼睛长在一边. 记得第一次看见左口鱼,\n我就认定这鱼在水里游泳的时候总也走不了直道.\n\n \n\n网络上充满了缠绵的爱情故事,今天又在移民的论...", "category": "生活随笔"}, {"id": 29, "title": "儿子的初吻", "date": "2007-06-14", "body": "下一个\n\n去学校接孩子， 早到了，坐在学校外面的长椅上等。\n一个西人妈妈，把车停下，直冲着我走过来，大声问到：请问，你是 Aiden\n的妈妈吗？ 我心中一喜， Aiden 有这么 Popular? 连老妈都跟着沾光，\n再一转念，整个学校就这么一张亚洲脸，不用问我就知道是他妈了，呵呵，顿时有点失落。\n\n那个妈妈热情得把手伸过来：你好啊！我叫 BEA ，我的女儿 EMMA 是 Aiden\n的同学。 她每天回家都跟我讲 Aiden 的事情， 说 Aiden\n很聪明啊，他画的画很棒啊，还会讲很多故事， Emma\n把他的画帖在卧室里呢。我就说一定要认识一下 Aiden\n的妈妈啊，今天真高兴认识你 .......\n\n面对这么热情的妈妈，我也很高兴，于是等孩子的时间不再无聊。 Emma\n跑过来的时候，很有礼貌地跟我打招呼，一个孱弱的金发小姑娘，脸上满是雀斑，眼神里透着羞涩，很招人喜欢的样子，让我那颗一直想要个闺女的心又突地动了一下。\n\n晚餐的时候，不经意地问 Aiden ：\"你们班那个叫 Emma 的女孩子很有礼貌啊。\"\n\nAiden 吃着面条，闷声闷气咕噜着：\"哦，是啊，她学习可好啦 ...... \"\n\n我说：\"今天见她妈妈了，她妈妈说很喜欢你的画。\"\n\nAiden ：\"哦， 我画了好多画给她，我们俩还一起种花来着。\"\n\n\"嗯？ 你们两一起种花？\"\n\n\"是啊， Emma 从家里拿了一个花种子，然后我们两去学校花园里种了， Emma\n说那花是我们两个人的花，不让别人知道，我们两每天还会去给花浇水呢。\"\n\n听到这，我突然意识到这个 Emma 很不简单，虽然不相信 5\n年级的孩子能做出什么出格的事情，我还是敏感地意识到他们之间有些事情估计正在发生。为了不吓到儿子，我故作镇静，换了话题，没有继续追问下去。\n\n吃完晚饭，去小公园打篮球，毕竟打过系篮球队的中锋，对付儿子是小菜一碟。\n\n趁儿子放松警惕，我边运球边问：\" Emma\n长得挺漂亮的哈，就是脸上有点小雀斑\"。\n\n儿子满不在乎地说：\" 那怎么样？ Emma\n问她妈妈了，她妈妈说长大了就没有了！\"\n\n我天！ 连这他都知道，看来我的感觉没有错，精神立刻紧张起来。\n\n坐在场边休息的时候，继续刨根问底：\"你们种的花长出来吗？\"\n\n儿子：\"长出来啦，已经好高啦！ Emma 说很快就会开花了。\"\n\n\"那你们除了种花，还有你送给她画什么的，还干吗啦？\n你可以邀请她来我们家玩嘛！\" 当妈的甩出一个钩。\n\n\" 真的？妈妈，那我可以邀请她来和我玩游戏吗？ 嗯，\n我要是跟你说点事，你不要生气哈 ........ \" 呵呵， 儿子上钩了。\n\n\"什么事啊？ 妈妈保证不生气？\"\n\n\"妈妈， Emma 和我去花园看花的时候，她亲了我 ... \"\n儿子害羞起来，小脸蛋竟然有了一抹红。\n\n我强压着心里的惊讶，故作镇静：\"是吗？ 她亲了你？ 她亲了你哪？\"\n\n\"嗯， 这， 还有 ... 这 .... \" 儿子傻傻地指了指左右脸蛋。\n\n\" 除了这还有这， 还有哪啊？\" 我尽量把声调压住， 不让自己的不安暴露出来。\n\n\"嗯 ... 还有，还有 .... 这 ..... \" 儿子用手指了指自己的嘴唇。\n\n天哪！ 我在心里惊叫， 脸上还要保持平静：\"她是怎么亲你的嘴的呢？\"\n\n\"她就用嘴唇碰了我的嘴唇一下 ...... \"\n\n\"那你呢，你做什么了呢？\"\n\n\"我觉得那样不好，就把嘴巴擦了一下，跑了 ...... 妈妈，你答应我不生气的呀\n..... \" 儿子还是听出来我声音里的紧张，开始搓着自己的手，紧张地看着我。\n\n我赶忙拍了拍儿子的头，\n说：\"妈妈不是生气，只要你跟妈妈说了，妈妈就不生气。 那后来呢， Emma\n没有来找你吗？\"\n\n儿子松了口气，\"她还找我一起去看我们的花，我们一起浇水啊，她跟我说，她喜欢我，要我做她的好朋友，我答应了。\"\n\n这什么世道啊，才 5 年级的小女孩子，已经开始\"私定终身\"啦！ 难怪 Emma\n的妈妈对我那么热情，八成是和闺女串通好了，早早夺走了我儿子的初吻 !  \n这么单纯的儿子， 糊里糊涂就让个满脸雀斑的小女生把\"初吻\"给给给夺走了？！\n我在心里愤愤着，还得尽最大的努力掩饰着自己。 \n\n回家的路上，儿子小心翼翼地问我：\"妈妈， 你说， Emma\n要是下次还亲我，我该怎么办啊？\"\n\n我蹲下来，扶着儿子的肩膀，盯着他的眼睛，一字一顿地大声说：\"儿子！下次，无论是哪个女孩子，只要她亲你，听妈的话，你不要跑掉，你就给我\n亲 - 回-去！ 如果她亲你脸蛋一次， 你就亲她脸蛋三次！ 如果她敢亲你嘴唇，\n你就把她脑袋抱住，把两个脸蛋各亲五次！ \" \n\n看儿子似懂非懂却又坚定地点头， 我心想：\n儿子，妈这么教你也是没辙了！妈可是冒着一不留神教育出个\"小色狼\"的风险让你这么做的，\n你总不能没出息到让女孩子追着满世界逃跑吧！ \n如果我做错了，请上帝原谅我！也求上帝保佑我， 我虽然让你去亲人家，\n可千万不要让你16岁就给我抱个孙子回来呀！", "excerpt": "下一个\n\n去学校接孩子， 早到了，坐在学校外面的长椅上等。\n一个西人妈妈，把车停下，直冲着我走过来，大声问到：请问，你是 Aiden\n的妈妈吗？ 我心中一喜， Aiden 有这么 Popular? 连老妈都跟着沾光，\n再一转念，整个学校就这...", "category": "亲情"}, {"id": 30, "title": "全是韭菜惹的祸", "date": "2007-06-12", "body": "下一个\n\n儿子爱吃韭菜，无论是韭菜饺子，包子，馅饼，还是韭菜花，韭菜炒鸡蛋，只要沾上韭菜，他号称自己会越吃越饿！\n\n 我这个当妈的，曾经对做饭一窍不通，因为在国内工时候，父母帮着带孩子，自己不是常常出差就是下馆子，家里几乎不开火。登陆加国以后，只要去别人家蹭饭，儿子都幸福得象要冒泡，横扫别人家饭桌不说，还要把人家的饭菜打包带回去；而对着我的饭桌则是一脸英勇就义的表情，虽然为了填饱肚子也会勉强表扬两句，我还是被他的表情深深刺痛了，痛下决心要苦练做饭基本功。\n\n 在浪费了N袋面粉，被热油烫伤胳膊，烟雾弄响整楼报警器之后，我终于迎来了具有历史意义的一天  ---  儿子说：妈妈，你是我知道的最伟大的厨师，我再也不想去别人家吃饭啦！\n\n 随着厨艺的增长，带去办公室的午饭盒一开盖，就会把同事们引得鼻子一耸一耸地流口水。这一天，把韭菜鸡蛋馅饼放在微波炉里转着，我跑到LINDA的办公室里观摩新娘像册。回来的时候，馅饼已经被切开摆在桌上，旁边围着老板和其他的同事，每个人都很小心地捧着一小块正在咂嘴。看我回来，大家有点不好意思，老板说：实在是太香啦，我就做主给切啦！  我们尝四分之一，你不会介意吧？  老板都精确到分数了， 我还能介意吗？ 再加上自己的厨艺得到赞赏，整个人顿时飘了起来，大嘴说到：我怎么会介意呢？ 喜欢吗？ 你们要是喜欢，我明天给你们每个人做一个带来当午饭吧。 没成想，每个人都点头说，好好好，明天我们都等你啦! 老板竟然对我说，你可以不可以带2个大一点的，我想带回去给我闺女吃啊？\n\n第二天，办公室里从11点开始就弥漫着一股香喷喷的韭菜味，弄得每个路过门口的人都会探头张望一下，以为我们改行开食堂了。毕竟同事们没有见过韭菜的模样，而辞典上只有LEEK，让人能想起来的是大葱一样的东西。最后同事们干脆给这个好吃的中国菜起名叫\"中国草\"。韭菜馅饼下到每个人的肚子里以后，大家还意犹未尽，聚在一起喝咖啡，一边讨论怎么样让我给他们做更多的\"中国草\"吃。我得意洋洋地给他们解释：这种\"中国草\"是有药用功效的，可以\"通气\"！这个通气，一时在英语里又找不到合适的词，我只好说能让你们打嗝和放\"气\"，有助于你们的身体健康，为了避免大家尴尬，我给每个人发了口香糖。一听这个，大家都吃了一惊，老板很学究的问我：这个\"气\"大概需要多长时间会产生呢？ 你估计是我下班前，还是要到下班以后呢？ 也就是说， 我会让你们大家闻到呢？还是回家去臭我太太呢？   还有同事问，那这气要是就不出来，在身体里会不会产生其他作用呢？你知道那大概是什么成分吗？ .......\n\n韭菜吃了30多年，还是第一次面对这样的问题，真不知道怎么回答，只好说：因人而异！因人而异！一贯严谨的老板还不依不饶，追着我问：那你，你自己，大概多长时间会产生\"气\"？ 天哪！ 我只好敷衍着：大概10个小时以后！ 老板听了，这才放心转身离开，嘴里还在嘟囔：10个小时？ 那刚好是上床睡觉的时候啊，还好还好，那个时候不要紧......\n\n 这一天，小小韭菜改变了我们办公室的\"文化\"，大家见面不再问：hi, how are\nyou?     而是小声问一句： 你的\"气\"开始了吗？  哦，还没有？ 那再等等看.......\n\n有厉害的主， 从卫生间昂首回来，很得意地凑过来，悄悄对我说： 我......开始了， 很爽！ 然后得意地打一个很大的韭菜嗝给我听， 再顺便捏走一颗口香糖......", "excerpt": "下一个\n\n儿子爱吃韭菜，无论是韭菜饺子，包子，馅饼，还是韭菜花，韭菜炒鸡蛋，只要沾上韭菜，他号称自己会越吃越饿！\n\n 我这个当妈的，曾经对做饭一窍不通，因为在国内工时候，父母帮着带孩子，自己不是常常出差就是下馆子，家里几乎不开火。登陆加国以...", "category": "生活随笔"}, {"id": 31, "title": "妈妈， 我伤心", "date": "2007-06-08", "body": "下一个\n\n夏日眼光灿烂的午后，带儿子去散步。儿子身前身后跑着， 欢快地象一头小鹿。\n\n 溜达着来到小公园，儿子遇到了一群同学。十几个孩子爬上游戏架，上窜下跳，感染得我也不安分起来，爬上了公园里一棵歪脖树，找了个树叉坐上去。\n\n 远处湖光山色，蓝天白云，把双腿耷拉在树上的感觉很惬意。恍惚间，又回到了童年和妈妈一起在田间游荡的日子，那时候我也会爬上歪脖树。和妈妈在一起日子是快乐的，但是在4岁小女孩心里很深的地方，却藏着一些无法表达的恐惧。每次妈妈去医院急诊室值夜班的时候，会把我和姐姐留在家里，村里麦场上抗日电影看多了，我最怕的事情就跟日本鬼子挂上了勾。天一黑，妈妈不在家，我就会缩在床上，想象着日本鬼子半夜进村烧房子，越想越怕，最后累得在恐惧中昏睡过去。曾经尝试着问过姐姐日本鬼子会不会来烧房子，姐姐大笑了一顿，说如果我不听话他们就会来。她这一句骗人的话，却被我当真了，从此对姐姐言听计从，夜晚还要拼命回想自己是不是今天行为不当会招惹鬼子来烧房子，恐惧就愈发严重起来。直到有一天，无形的恐惧终于让我抱住刚下夜班的妈妈大哭......\n\n 生活在异国他乡，见到一些家长乐此不疲地带孩子看各种心理顾问，儿童行为顾问，ANGER\nMANAGEMENT顾问，再回想一下自己的童年，要是按照现在的标准估计我早就被送去看顾问了。 哪里有我今天坐在树上精神健康的日子？再看看儿子， 壮实的象头牛，开心的象个咧嘴的大石榴，分明那些家长是多此一举嘛！\n\n 正美滋滋在心理批判现在的家长神经质的时候， 天慢慢黑下来，孩子们的游戏结束了，儿子爬上树，坐在另一个树叉上。晚风细细地穿过树叶吹过来，母子俩坐在树上开始了一段对话：\n\n 妈妈： 臭小子，开心吗？\n\n儿子： 很开心！ 妈妈，你看我们两个像不像猴子？\n\n妈妈：  哈哈， 很像，我希望现在我们坐在香蕉树上！\n\n妈妈和儿子：  哈哈哈哈....\n\n 妈妈： 臭小子，妈妈看你这些天都玩疯了，一定是开心的，但是妈妈还是想知道，你会不会有些事情让你有些，怎么说呢？ 不确定？ 不踏实？不开心的？\n\n儿子： 唔....... 妈妈， 你怎么知道呢？\n\n妈妈：  我当然知道了，因为我当过小孩啊。\n\n儿子：  妈妈，其实，我每天都有一些时候很伤心。\n\n 妈妈在心里着实一惊：是吗？ 为什么呢？\n儿子： 我上课的时候害怕，怕我放学了以后你没有来接我，有人来说你出车祸了， 我就永远见不到你了...... 然后我就想，如果你没有了，我就成孤儿了， 就象HARRY\nPORTER一样， 我就越想越伤心， 有一天课间的时候我给你打电话来着，你没有接手机，我就担心了一个下午......好几次，我都想跑出去再给你打电话， 我想大喊，妈妈， 我特别想听你的声音！  我我，我还哭了........妈妈， 我现在就在哭呢......\n\n 儿子爬过来坐在我的树叉上，爬进我怀里，不让我看见他的眼泪......\n\n妈妈： 你为什么这么想呢？\n\n儿子： 我有一天看电视，一个8岁的小女孩她妈妈出车祸了，她好可怜啊。那个时候我就开始害怕了。\n\n妈妈： 儿子，妈妈不会的，妈妈开车很小心，你知道的。再说，如果真的妈妈有什么意外，你也不会是孤儿啊，还有爸爸，还有大姨妈和舅舅，还有爷爷奶奶啊，他们都爱你，不会送你去孤儿院的.......\n\n儿子： 妈妈，可是我觉得，他们都不会象你这么爱我，对我这么好啊......\n\n 小家伙说到伤心处，竟然呜呜哭出声来， 弄得我也眼泪汪汪。\n\n 搂着儿子，仿佛看见我抱着妈妈大哭的那一刻，原来在每个孩子小小的心里都有着莫名的恐惧。 对于儿子来说，在异国他乡，妈妈是他唯一的依靠，无论看起来他有多么快乐和强壮，在他心底总有一片柔弱的地方，那里存放他小小的担心，小小的恐惧，小小的依赖和思念。 \n\n 回家的路上，儿子已经恢复了情绪，又一次欢快得象头小鹿跳跃在绿草和鲜花之间。看着他的身影， 心里有一个声音悄悄地说： 孩子！妈妈知道你很快会长大，也知道有一天你会要撒开妈妈的手象小鸟一样自己飞翔。 妈妈答应你，会好好保护自己，陪着你到你长大的那一天！", "excerpt": "下一个\n\n夏日眼光灿烂的午后，带儿子去散步。儿子身前身后跑着， 欢快地象一头小鹿。\n\n 溜达着来到小公园，儿子遇到了一群同学。十几个孩子爬上游戏架，上窜下跳，感染得我也不安分起来，爬上了公园里一棵歪脖树，找了个树叉坐上去。\n\n 远处湖光山色...", "category": "生活随笔"}, {"id": 32, "title": "Linda 的婚礼", "date": "2007-06-04", "body": "下一个\n\n上回说到，Linda 获得了CASINO\nRAMA的免费婚礼，价值5万刀。时间定在公元2007年6月3日。\n\n 从Linda获奖开始，办公室里就难见到她的身影。接到她的群发邮件更加频繁，今天要大家参加一个SHOWER， 明天又是一个SHOWER，然后还有THE\nBAY和SEARS, CANADIAN\nTIRE的网络礼品单通知，所有的礼品都没有低过100个刀啊。所谓的SHOWER就是找个主题，大家聚聚，有钱的送大礼，没有钱的送小礼。Linda大小搞了4个SHOWER，主题从厨具到家具，搞得大家都囊中羞涩起来。原先我还抱着体会CANADIAN婚礼的想法，各个SHOWER都想去，去了两个之后，被财大气粗的主着实吓到了，翻了翻钱包，只好把后面的两个推掉。到了最后确认婚礼晚宴的时候，Linda干脆把话说得更直白，晚宴每个人标准是90刀，至于随礼的标准你们自己看吧， 其实就是告诉你，怎么也不能低过200个刀吧。土生加国的女同事B，婚场经验丰富，她悄悄跟我说，你以为被邀请参加婚礼是很有意思的事情哈？那除非你是开银行的，要不然你就是抢银行的。我的银行不光是被Linda抢了一把，还被我自己抢了一把，因为我还得买一件参加婚礼的礼服。\n\n闹哄哄过了一个月，终于迎来了6月3日。除了我和女同事B以外，别人不是带太太、老公，就是找个异性DATE，反正都成双成对的，我孤家寡人的只好找B就伴。走在CASINO\nRAMA豪华的宴会厅里，看一对对男女挽手排队进入大厅，只有我和B两个女人裙裾飘飘站在一起，B开玩笑：不如我们也挽了手吧!  看着B头发乱飞的样子，我说：你！去换套男礼服来，我就跟你挽！ 不弄则以，弄了咱就要让Linda她家人看看，她的同事还有断背的呢！ 结果B大笑起来，踩了自己的礼服摔了一跤。 \n\n第一次见识加国的婚礼，过程和电影上的没有什么不同，伴娘伴郎先结对出场，然后两家长辈出场，最后新娘的爸爸挽着新娘上台，和新郎互相发誓换戒指签结婚证书。只不过CASINO里主持婚礼的不是牧师，而是一位幽默的女士。在教堂没少听牧师反对赌博的教导， 估计没有牧师愿意在赌场里主持婚礼。好在那位女士看来经验丰富，妙语连珠，把枯燥的誓言也弄得笑声不断。\n\n 伴着婚礼进行曲，Linda身着长裙，依偎着父亲，娇艳若花地走进婚礼大厅的时候，我突然眼眶一热，毕竟是两个人一生一世的承诺啊，怎能不令人感动！\n\n正当两人互相发誓不离不弃的当口，我感动得热泪盈眶，突然听见B大声说：这誓我都发过2回了，都是些BULLSHIT？！ 吓得我用眼刀狠狠剜了她一下，看看周围的人好像也没太注意，又恶狠狠地补了一句：姐姐，你就是想介绍离婚两回的经验，今天也不是时候哈！      她才吐了吐舌头住了嘴。\n\n 估计婚礼的场面又撩起离异两次的B 很多伤心事吧，反正从那一刻开始，她就萎靡不振了，而她这一嗓子让我陡然生出许多伤感，浪漫的感动也消失殆尽。\n\n CASINO\nRAMA 竭力把婚礼打造的很有些庄严的样子，从色调到音乐都能让人感受到是下了工夫精心准备的。但是，无论如何，这婚礼和赌场的气氛多少还是不协调。等到婚礼结束，宾客站在大厅里等待就餐的时候，这种不协调就分外明显起来。站着的各路婚礼宾客男的西装革履，女的都踩着高跟袒胸露背还佩戴珠宝；穿梭于大厅里的各路赌客尤其是那些亚洲面孔，各个穿着随意，明显的特点是脚下踩着便鞋（估计是为了鏖战赌场吧）紧紧抱着胸前的包，这还不算，赌客对突然出现的婚礼宾客非常好奇，死盯着女士们的胸看不说，还指指点点，大声评头论足。等待就餐的时间长达2个小时，婚礼宾客们被注视得实在忍无可忍，纷纷拐进赌场下注。我和B好不容易在电子轮盘赌前谋到一个位子，正要摩拳擦掌准备出手的时候，才发现俩人竟然都没有带钱包！ 不知道为什么，脑海竟然里浮出一句中国古话：屋漏更逢连阴雨！  虽然不合时宜，却颇能说明两个单身女人当时的心境。\n\n 晚宴上，Linda 和Jeff的奶奶，父母，邻居，同学，同事等等等等，纷纷上台讲述他们和这对新人的故事，掌声一阵高过一阵，热闹非常。晚宴之后，舞会开始，一对新人表演了缠绵的慢舞。慢舞之后，Linda八十高龄的奶奶竟然第一个冲进舞池，跳起了踢踏，顿时把整个舞会推到了高潮。终于等来了新娘扔花球的那一刻，盼嫁的印度裔女同事P踢飞了高跟鞋，早早就摆出志在必得的架势站在Linda身后，花球却被另一个比她壮 她2倍的西人伴娘从头顶抢走。\n\n 深夜，热闹的婚礼终于结束了，我和P坐在B的车上往家赶，车里的三个单身女人各怀心事，安静得出奇。一场婚礼触动了每个人的心，让没有经历过的的人越发向往，却勾起经历过的人无限伤感。如果女人的生命是一场盛宴，婚礼就是盛宴上最璀璨的礼花，没有几个女人能抵挡暗夜里璀璨的诱惑，在领略了盛宴和礼花之后，还能淡淡之后对自己说一声不过如此的女人，恐怕就少之又少了。", "excerpt": "下一个\n\n上回说到，Linda 获得了CASINO\nRAMA的免费婚礼，价值5万刀。时间定在公元2007年6月3日。\n\n 从Linda获奖开始，办公室里就难见到她的身影。接到她的群发邮件更加频繁，今天要大家参加一个SHOWER， 明天又是一...", "category": "情感"}, {"id": 33, "title": "做人的原则 (转自朋友的博客）", "date": "2007-05-27", "body": "下一个\n\n(在朋友的博客里,看见一段文字, 描写的人竟然是我!\n摘抄过来,纪念生命中艰难的一段时光,庆幸自己有这样的朋友!)\n\n中午急急忙忙的赶到机场，硬是挤出了时间，接远道回家的朋友。不为别的，就是为了她的那份信任。\n\n长途奔波的朋友，见面的时候，明朗的笑着和我打招呼，大家心里都明白的事情就暗暗的压了下来。并没有最热烈的拥抱，其实是怕自己控制不住情绪，先掉下眼泪。\n\n朋友笑着对我说：回家的感觉真好，见到你我的眼泪都要下来了！说得很轻松，眼睛里却分明写着一种无奈。\n\n这个女人，豁达！！经历了桑田沧海，经历了那么大的波折，却轻描淡写的过去了。了解她内心有多少磨砺，能这么说，我也很放心了。\n\n她本是朋友的朋友，和我只是\"淡如水\"。几次见面后，便成为知己的人，用她的话说，她喜欢大气的女人，男人的胸襟、霸气和女人的体贴、细腻融在一起。\n\n安顿好她，看她在属于自己的家里舒心的笑，看孩子在她身边雀跃不已，我却如梗在喉。回来的路上，Roy一只手从方向盘上移下来，握着我的手说：\"我们一定要幸福，给大家做个榜样！\"手指的温度传来，渐渐平复了我的情绪！\n\n晚些时候，这东西又没由来的打扰我的工作情绪，Flora 的电话过来，一股脑的把积怨和担心倒给了她，她的烦恼和不开心也通通的砸给了我。居然聊了将近2个小时，大家都平静了许多，最起码沉淀了坏情绪，有了思考的空间。\n\nFlora 说的对，我们很象的一点是，也会有让别人很不齿一面，但自己会有发泄的方式，发泄完了，回到原来的道路上，做自己要做的那种人，有责任的人。而有些人，自己不齿的想法，一定拎出来，在日光下抖搂抖搂，还要斜视傍边的目光，更有要拖人下水的龌龊行为。\n\n做人，很容易！暴露在天光下的人，有行尸走肉，有麻木不仁，有城府颇深，有圆滑谄媚；还有好的，他们的笑容是阳光，温暖灿烂，他们的眼神是溪水，清澈无痕。总之，在你身边，自然不自然的就分出了亲疏远近，我想这就是\"物以类聚，人以群分\"的古训。\n\n和Flora说，其实如果让我用最精练的话语描述我希望成为朋友的人和希望和我成为朋友的人，只有4个字：豁达、坦荡。\n\n豁达的去看别人，坦荡的面对自己，足亦！不是一路人，就随他去吧！\n\n做人真的很容易，做人也真的很不易！", "excerpt": "下一个\n\n(在朋友的博客里,看见一段文字, 描写的人竟然是我!\n摘抄过来,纪念生命中艰难的一段时光,庆幸自己有这样的朋友!)\n\n中午急急忙忙的赶到机场，硬是挤出了时间，接远道回家的朋友。不为别的，就是为了她的那份信任。\n\n长途奔波的朋友，见...", "category": "生活随笔"}, {"id": 34, "title": "一样的月光", "date": "2007-05-18", "body": "下一个\n\n又一个长周末, 应朋友的邀请去做客, 回家的时候要走一段高速。\n\n高速上车辆稀少，视野开阔。 天空上挂着一弯月牙，\n离月牙不远地方是一颗明亮的星星。\n在深蓝的夜空下，星星和月亮近若比邻，匆匆的一眼望去，\n心中蓦然一动，如此熟悉的月色，曾经在另一个地方，就像今夜这样注视过我......\n\n那年的北京，\n也是这样一个早春的夜晚，为了一个政府扶贫的项目，项目组驱车从北京过张家口一路北上，到达锡林郭勒蒙的首府城市 \n-- 锡林浩特市。\n\n记得草原早春的风光是凛冽而又清丽的，海子和死火山的壮观在白天的旅途中不断令人惊叹。\n一路上，锡盟旅游局长陪同，虽然不过是在帐篷里用刀子切肉吃，却已经是这个贫困地区拿得出手的最高礼遇。在锡盟首府最高级别的宴会厅里与盟领导共进晚餐，观看的蒙古歌舞表演据说当年为新当选的国家总理表演过。\n\n回北京的路上，不得不在一个叫太仆寺旗的小县城过夜。进驻的酒店是当地唯一的三星级，却一没有热水，二没有米饭炒菜。项目组里大大小小的头头脑脑在又一次大块吃肉，大口喝酒之后，开始研究旗里夜生活的去处。终于被告知在旗中心街道上有一个酒吧表演蒙古族民间舞蹈，一行人欣然前往，还美其名曰：考察民情民风。只有我和他没有跟着大家起哄，两个人都推说肉吃多了不舒服跑回各自房间躲起来。等大队人马离开后，扛着照相机，偷偷跳上吉普车往草原深处开去。\n\n在草原深处，静静地注视着我们的就是这样的一轮弯月，和近在咫尺的一颗星星。当车停下来的时候，我和他不约而同地跳下车惊呼，快看月亮！一望无垠的大草原在早春的夜里安静又漆黑地延伸到天的尽头，天空和草原已经无法分辨它们的界限，天空很高很高，而那轮弯月和星星却仿佛触手可及。我们爬上吉普车顶变换角度，想用照相机拍下当时的场景。月亮和星星在草原的天空里行走地比任何地方都快，为了追随月亮，我们不得不开着吉普继续前进直到有牧场的铁丝网拦住去路。月色下，我和他在吉普车顶上坐了很久直到有零星雨点滴落才依依不舍地离去。\n\n离开国内繁忙的工作已经多年，一年有六个月奔波在路上的日子已经远去。在这个美丽的夜晚，锡林浩特颇具特色的城市广场,\n万户牧民的扶贫项目，草原早春的凛冽和清丽，那个夜晚对着一轮弯月的惊叹,\n和在北京工作期间那些日日夜夜,\n仿佛一双双精巧的象牙筷子，把国内繁华而又忙碌的生活从记忆深处轻轻挑起来，挂在我的面前。\n\n以为自己已经习惯了加拿大的寂静和安详，今夜的月色星光却让我心里有了些须忧伤。那些繁华的心情，漫漫而来，月光下，脸上只有淡然的笑意，轻轻对身边的孩子说：把车窗关上，小心着凉。", "excerpt": "下一个\n\n又一个长周末, 应朋友的邀请去做客, 回家的时候要走一段高速。\n\n高速上车辆稀少，视野开阔。 天空上挂着一弯月牙，\n离月牙不远地方是一颗明亮的星星。\n在深蓝的夜空下，星星和月亮近若比邻，匆匆的一眼望去，\n心中蓦然一动，如此熟悉的月...", "category": "生活随笔"}, {"id": 35, "title": "从此恋上我的床", "date": "2007-05-15", "body": "下一个\n\n写下这标题的时候，自己都笑出声了。 暧昧的标题，满不是那么一回事的内容，弄不好会招惹怀着某种心理的人骂娘，呵呵。 \n\n要说的只是买了张新床，自己想夸夸，用本人姐姐的话说：身子底下睡的全是钞票，想说不好都难？！其实，写这东东无非是辩解一下，在经济不宽裕的时候买这么贵的床实属奢侈，但如果从珍惜健康，快乐生活的角度看是物超所值。\n\n新床在翘首等待了2周以后终于送来了，早就准备好了最喜欢的被单和床罩赶忙就铺上去，当天晚上泡了玫瑰泡泡澡，9点不到香喷喷地缩进被窝开始呼呼。\n\n一夜无梦到了早上，豁然发现儿子也蜷在大床另一边上呼噜着呢。这小子不知道什么时候抱了自己的小枕头和大被子来凑热闹。\n\n\"臭小子，什么时候跑来的？！\"\n \" 嗯，老大，别吵好不好，我正享受新床呢？！\"  儿子从上周正式追随几个铁杆哥们姐们改口把他妈称作\"老大\"了。\n\"这是我的床，你快滚回自己床上去！\"\n\"嗯嗯，老大，不要太自私好不好？我昨天晚上还帮你洗碗来着，你连床都不让我睡，太不够意思了。\"  儿子连眼睛都不睁一下， 抱着他的大被子陶醉着。\n\n\"老大，你这新床太舒服了，能不能给我也买一个.......\"\n\n\"臭小子，长大了自己赚钱买去，少算计你家老大.......\"\n\n自从买了这张床，周末的早晨和儿子肯定会有一场类似的对话。\n\n3个星期以来，5000刀的床让一个严重失眠，腰肌劳损的女人每天10点就倒下呼呼，一觉睡到太阳高照不说，平常的腰酸背痛也都消失了。 床的主人除了承认有些吃了葡萄只能说甜的心理作用以外，不得不说说这床到底好在哪里。\n\n 坐上去不忽悠。整体记忆海绵，没有弹簧，人坐上去的时候感觉是坐上了一个大沙包，无论坐在床的什么位置，绝对不会有坐弹跳床以后连心脏都跟着忽悠的感觉。\n\n 硬度非常完美。人躺上去5分钟左右，可以感觉到自由舒展的那种惬意，不是水床漂浮的感觉，而是身体的各个部位被有力支撑着的那种。加上Sleepcountry  随床赠送的一对记忆海绵枕头（标价200刀一个），从颈椎到脚后跟完全放松，难怪可以让象我这样严重失眠的人睡不醒。\n\n 睡了新床10多天以后，每天早上起床不再有腰酸背痛的感觉，身体的反应也跟以前完全不同。以前每天起床都觉得自己很累，现在不觉得累，而是觉得特别想要伸展。这样就开始象2只猫咪学，每天醒来四肢着地跟在猫后面在家里转一圈，然后做各种伸展运动，大概10分钟以后那种轻松的感觉是以前从来没有过的。最明显的效果是腰部已经不再隐隐作疼了。\n\n 有床如此，怎能让人不恋？\n\n *  仅已此文纪念2007年严重负债的疯狂采购行为，绝对没有为某种床作托的意图。", "excerpt": "下一个\n\n写下这标题的时候，自己都笑出声了。 暧昧的标题，满不是那么一回事的内容，弄不好会招惹怀着某种心理的人骂娘，呵呵。 \n\n要说的只是买了张新床，自己想夸夸，用本人姐姐的话说：身子底下睡的全是钞票，想说不好都难？！其实，写这东东无非是辩...", "category": "生活随笔"}, {"id": 36, "title": "大嘴美女 - Linda", "date": "2007-05-07", "body": "下一个\n\nLinda 是老板的助理。芳龄26，苏格兰后裔，有1/16黑人血统，土生土长加拿大人。\n\n按照国人的审美观，Linda应该属于恐龙级，不光身材魁梧，还长手大脚。最有特色的是她的嘴，不笑的时候就不小，但凡一咧嘴就扯到两边耳垂。就这样她的笑还被老板赞为全搂最真诚最热烈的一个，估计老板是按照笑的时候露出来的牙齿个数来算的。国际大美人张曼玉最经典的笑只露出4颗牙齿，大嘴罗伯兹不过也只露了16颗，而Linda美女大笑的时候足足可以露出24颗牙，估计一般人把嘴扯出血也到不了那个程度。 \n\n为什么是助理而不是秘书？原因是Linda是办公室最资深的员工，而老板大半的时间出差在外，Linda美女需要在某些问题上替老板拍拍板，把把关，也正因为这样，老板出差期间她的工资会翻倍。\n\n 不过钱虽然拿了，老板只要一出差，Linda就消失掉，直到老板回来的前一天她才会人模人样坐回办公室。Linda 的缺勤司空见惯，而令人兴奋的事，莫过于看她能编出来的理由是什么。3年当中她流产11次，摔跤无数，狗咬了邻居家不下20个孩子等等....... 最近一次她的借口让所有人大跌眼镜，一只SKUNK跑进她家，不折不扣地放了个大屁，她所有的衣服都臭不可闻......总之人类历史上少有的怪事会重复发生在L美女身上，而且一定是在老板出差期间；而我们办公室的一道风景就是老板出差第二天，全体人民端着咖啡象开例会一样，对Linda群发的缺勤邮件一阵唏嘘，然后热切期待老板的下一次出差.......\n\n 别看Linda美女年龄不大，人家有一个同居了7年的男朋友Jeff。听她说，她和Jeff算是患难之交，因为Jeff曾经被查出癌症，失业过很长时间，她都不离不弃，让我为坚贞的爱情着实感动了一把。一天，另一个部门的老板过来开会，Linda悄悄对我说：知道吗？我跟他好过呢？！ 看我一脸诧异，她接着说：Jeff 一出差，我们就约会，他可有钱呢，床上功夫,一级棒哈！ 不过现在我们已经断了，因为我要和Jeff结婚啦！  我恍然大悟，原来Linda美女的\"缺勤\"是习惯性的，不只对我老板才用。\n\n 自打Jeff去年在美国觅得一份年薪10万的工作，Linda美女就开始在网络上疯狂购物。每天都有快递给她的包裹，从衣服到首饰，从地毯到性玩具，应有尽有，而Linda从来也不避讳。上周三，她邮购了两个假胸，当众装进胸罩里不说，还非要让办公室里的每一个都上去摸摸，再评论一下手感如何。老板可能要保持点老板的风度吧，没有凑那份热闹，Linda干脆又把假胸掏出来，放在他面前，说：那你这么摸，看看是不是和真的一样！ 那天，全办公室人声鼎沸，都在谈论Linda的胸。针对Linda明显夸张的胸,  男同事最后通过一个决议：Linda必须在每天的考勤板上注明她今天是非戴了假胸上班，如果戴了就打一个红对号；如果没戴就打一个绿的，因为他们都想知道效果如何，然后决定是不是买了送自己的老婆当情人节礼物！  他们要是真买了送老婆，十有八九不是贴老婆胸上，而是被老婆甩过来帖在他们自己脸上。\n\n Linda美女另一个特点就是好赌，去CASINO比去她家后院都勤。因为年度涨工资申请没有被老板的老板批准，Linda美女最近郁郁寡欢，去CASINO越发频繁。这一去不打紧，上个周末竟然赢了一个特别机会奖 ----- 价值5万刀，在CASINO举行豪华婚礼，婚礼的时间是2007年6月3日！\n\n 从本周一开始，办公室已经进入史上疯狂的Linda婚礼倒计时阶段。各路人马纷纷上门道贺，包括Linda的前情人，前男友，前邻居，前同事，.....因为有CASINO买单，各种婚礼用品包裹从世界各地象雪片一样飘过来，隔壁的彩印社更厉害，已经用Linda和Jeff的照片合成了巨幅婚纱照贴在了门口当招牌惹了更多的人来观摩准新娘。而我们办公室里打起了了口水仗：以每月工资被前妻们瓜分2/3的Mike为首的一派认为应该先找律师签署婚前协议, 否则婚礼免谈!  全体女性同胞坚定地认为婚前协议是对婚姻纯洁性的亵渎, 要签那个BULLSHIT, 婚礼免谈!   而几个大龄单身, 离异N次的女性已经开始蠢蠢欲动，早起跑步不说，还花了银子上健身房机器猛练起来, 准备婚礼那天一展身手，抢花球了！", "excerpt": "下一个\n\nLinda 是老板的助理。芳龄26，苏格兰后裔，有1/16黑人血统，土生土长加拿大人。\n\n按照国人的审美观，Linda应该属于恐龙级，不光身材魁梧，还长手大脚。最有特色的是她的嘴，不笑的时候就不小，但凡一咧嘴就扯到两边耳垂。就这样...", "category": "生活随笔"}, {"id": 37, "title": "丈母娘也疯狂", "date": "2007-05-04", "body": "下一个\n\n一上MSN，就被国内的两个姐妹\"臭骂\"一顿，单妈MM被迫打开音频又贫了半个小时，笑得稀里哗啦才被放行去上班。\n\n 两个姐妹都是单妈MM的死党，在北京的时候经常一起吃喝玩乐，但是她们两并不认识。 两个人各有一个女儿，和Aiden同学岁数相仿，每次活动的时候，孩子们有了伴，大人们也开心。两个人曾经都开玩笑说要把闺女许配给Aiden，单妈MM看见花姑娘都想给儿子先霸占着，哪有不答应的道理。\n\n谁成想，为了给单妈MM办事，两个姐妹见面了，而且非常投缘。昨天她们一起去单妈MM最喜欢的餐厅腐败，才发现原来两个人都以Aiden同学的丈母娘自居，当场大笑不已，相约着要找单妈MM讨个说法。于是就有了今天早上这一场国际会议，三个女人嘻哈了半天，也没有弄明白到底谁是正宗丈母娘，最后单妈MM被责成再生一个儿子，才能谢罪。\n\n开车上班的路上，单妈MM一阵坏笑：这两个傻女人，她们哪知道Aiden同学最中意的丈母娘其实是住在英国的那个呢？！ 嘻嘻！", "excerpt": "下一个\n\n一上MSN，就被国内的两个姐妹\"臭骂\"一顿，单妈MM被迫打开音频又贫了半个小时，笑得稀里哗啦才被放行去上班。\n\n 两个姐妹都是单妈MM的死党，在北京的时候经常一起吃喝玩乐，但是她们两并不认识。 两个人各有一个女儿，和Aiden同学...", "category": "生活随笔"}, {"id": 38, "title": "周扒皮好可怜啊！", "date": "2007-05-03", "body": "下一个\n\n说这话的不是单妈 MM ，是单妈的儿子 Aiden 同学，当年 5 岁。\n\n无意中翻出小时候的小人书，说的是高玉宝怎么样在周扒皮家当长工，被周扒皮每天假装公鸡叫鸣弄起来顶着月光去干活。单妈\nMM 决定用可怜的高玉宝同学对爱睡懒觉的儿子进行一次忆苦思甜教育。\n\n等单妈 MM 充满激情地念完了那一段，运好了气，正打算开口的时候， Aiden\n同学发话了：妈妈，我觉得周扒皮好可怜啊？！\n单妈晕倒：周扒皮怎么会可怜啊，你想想啊，你要是每天早上 4\n点被妈妈叫起来去干活会什么样啊？ 当然是高玉宝可怜啊！\n\nAiden\n同学满脸狐疑：可是可是，周扒皮要装公鸡叫啊，不是比高玉宝起得更早嘛？\n那他当然更可怜一些啊！ ....\n\n汗 ! 忆苦思甜没成， 单妈信仰了几十年的真理瞬间被颠覆了，世界陷于一片混沌\n....", "excerpt": "下一个\n\n说这话的不是单妈 MM ，是单妈的儿子 Aiden 同学，当年 5 岁。\n\n无意中翻出小时候的小人书，说的是高玉宝怎么样在周扒皮家当长工，被周扒皮每天假装公鸡叫鸣弄起来顶着月光去干活。单妈\nMM 决定用可怜的高玉宝同学对爱睡懒觉的...", "category": "生活随笔"}, {"id": 39, "title": "新床，有胆的来试睡！", "date": "2007-05-03", "body": "下一个\n\n话说单妈MM买了一张价钱不菲的新床，这消息在朋友中一传十，十传十地传开来。结果床还没有到，单妈MM家的电话此起彼伏地响起来。\n\n电话开始的都一样，问候问候，然后就直奔主题：听说你买的床比我家的车都贵呢？！单妈MM开始还能不厌其烦：一点不错! 您就当我一直躺在你家车顶上吧！(一幅超级画面在空中展开，性感女郎躺在一辆巨酷的车上， 晕)  ...... 啊， 你们还想试睡？\n\n电话多了，渐渐也烦了。终于当又一个电话打来的时候，一听是关于床的，单妈MM冲口而出：没错， 我新买了张床，价值5000刀，超过你家那辆二手BMW；想试睡？ 没问题！ 热烈欢迎！不过试睡有三个条件：首先试睡者必须与配偶一起来；其次试睡时间不得低于8小时；然后，床主也就是本人将与试睡者同床共枕以便讲解该床的主要优点....... 接受不？ .......\n\n基本到了这个时候，对方已经笑岔了气， 试睡就没有了下文。", "excerpt": "下一个\n\n话说单妈MM买了一张价钱不菲的新床，这消息在朋友中一传十，十传十地传开来。结果床还没有到，单妈MM家的电话此起彼伏地响起来。\n\n电话开始的都一样，问候问候，然后就直奔主题：听说你买的床比我家的车都贵呢？！单妈MM开始还能不厌其烦：...", "category": "生活随笔"}, {"id": 40, "title": "镇上的楼咋这么高！", "date": "2007-05-03", "body": "下一个\n\n加拿大村里的生活，实在是寂寞，要是没有几个朋友，日子简直就不是人过的。\n好在单妈MM生性豪爽，为人热情，短短一年时间，在村里结交了一帮朋友。无论是国粤语同胞，还是英法文鬼子单妈MM都能打成一片。\n冬日，单妈MM难得不上班，和2位姐妹决定驱车100公里到另一个叫多伦多的镇上去逛逛。因为村子在雪线以北，一年有5个月都被大雪堵门，三个女人出发的时候全副武装，从雪靴到雪帽一件不少。\n到了多伦多镇的MALL里一看，各路美女裙裾飘飘，哪里有女人穿成这样她们那熊样？！三个女人笨重的雪靴和俏丽的和高跟鞋一比，那感觉就象杨子荣厚着脸皮挤进上海十里洋场一样尴尬。\n在镇同胞看民工的白眼中，三个笨重的女人买了几大推车的中国食物从超市出来。把东西往车上搬的时候，听见路边几个女同胞不屑的声音：肯定从北面乡下来的，看那土样！ \n姐妹们这一肚子窝囊气正没有地方出呢，只见单妈MM把食指把嘴角一搭，作弱智状走到她们前面，指着对面的高楼，用标准的东北腔说：妈呀！大姐! 你们镇上的屋子咋能这么高呢，俺们乡下见都没得见哈！\n看得俺眼直晕啊！你们住那上头是不？！ 跳楼忒方便哈，是不！ 啊呀，大姐，别走啊，好不容易找个人唠嗑，别跑呀.....\n看她们避之不及的样子，三个乡下女人笑得眼泪都出来了，镇上的女人哪知道单妈MM北京的家在32层呢！", "excerpt": "下一个\n\n加拿大村里的生活，实在是寂寞，要是没有几个朋友，日子简直就不是人过的。\n好在单妈MM生性豪爽，为人热情，短短一年时间，在村里结交了一帮朋友。无论是国粤语同胞，还是英法文鬼子单妈MM都能打成一片。\n冬日，单妈MM难得不上班，和2位姐...", "category": "生活随笔"}, {"id": 41, "title": "好男人", "date": "2007-05-02", "body": "下一个\n\n春光明媚，单妈 MM 和光棍女友 Ms Connie 一同逛街。\n\n两个没有男人荷包做后盾的女人囊中羞涩，在 MALL\n里狂试各款漂亮的新装却什么也买不起，只好回家。 Ms Connie\n意犹未尽，非要拉着单妈 MM 去二手店再过把瘾。\n\nMs Connie 在旧衣服前流连忘返的时候，单妈 MM\n坐在二手店最昂贵的一套沙发上昏昏欲睡。最后 Ms Connie 排出 15 个大刀买了\n6 件衣服，看着单妈 MM 两手空空，排队付钱的时候不忘记挤兑单妈 MM\n一把：\"嗨，宝贝，春天来了，鸟都换毛了，你也该买新衣服了，说不定能吸引几个好男人呢？！\"\n\n单妈 MM 靠在沙发上连眼皮都没有抬一下，\" Connie ，\n好男人不是就被他老婆霸占了，就是已经变成 GAY\n了，剩下那么稀有的几个，要是凭你那两件二手店里淘来的衣服就能吸引上，八成TASTE也有严重问题，\n我就全部让给你了！\"\n\nMs Connie 和银台小姐一并笑倒....", "excerpt": "下一个\n\n春光明媚，单妈 MM 和光棍女友 Ms Connie 一同逛街。\n\n两个没有男人荷包做后盾的女人囊中羞涩，在 MALL\n里狂试各款漂亮的新装却什么也买不起，只好回家。 Ms Connie\n意犹未尽，非要拉着单妈 MM 去二手店再过...", "category": "生活随笔"}, {"id": 42, "title": "前夫生日", "date": "2007-05-02", "body": "下一个\n\n一年一度，前夫的生日到了。\n\n 前夫的生日有着革命的历史纪念意义，所以分手多年后依然记得。\n\n 前夫的生日是我们正式恋爱的日子。N多年前，前夫是我的大学老师，以开生日晚会为借口邀请我，去了才发现只有我一个人。18岁的小女生，迷上了自己的老师一发不可收拾。\n\n 前夫的生日是我们结婚的纪念日。大学毕业后又是在他生日的那天我们举行了婚礼，10多年间为他生子，节衣缩食和他一起创业，就从那天开始。\n\n 前夫的生日是出轨的纪念日。 N次出轨，都是在他过生日的时候败露，因为他和情人在一起，就不能回家庆祝......\n\n 前夫的生日是离婚后我们铁定要联系的日子， 因为儿子要给爸爸打电话祝贺。\n\n ......\n\n 算好了时间，中国的早上我拨通了前夫的电话，把话筒递给儿子。儿子一声怯怯的\"爸爸生日快乐！\"开场，不知道那边说了些什么，慢慢地听着儿子滔滔不绝起来。\n\n儿子兴奋地跟他爹唠叨，我在厨房滋滋啦啦炒菜。算起来上一个电话应该是去年前夫生日的时候吧。这个当爹的，知道我们的电话，地址，还有电子邮件，却从来没有主动问候过儿子一句，无论是大节小节，谁人生日，都是我主动替儿子把电话拨通，让他们父子说话，前夫还爱理不理，时不时不接电话。大人之间的恩怨与儿子无关，无论儿子将来在哪里生活，我都希望让他和自己的生身父亲保持良好的关系。这么多年，即便前夫为了哄情人开心拒接儿子电话甚至恶语伤人，我也没有放弃让儿子和他保持联系。\n\n 看着儿子满脸兴奋地跟爸爸分享他一点点的成绩，想必电话那边的人多少有些欣慰吧，我的菜也上桌了。突然儿子跑过来，把话筒递给我，说：\"爸爸要跟你说话！\"   \n\n 接过电话，彼此都尴尬了一阵。前夫开始寒暄，听着他那边背景嘈杂，我还以为他又如当年一样在歌厅潇洒，他赶忙解释说\"现在一大早，我在银行办事呢！\"。有一搭没一搭说着，都是些你好我好的话。然后他开始说生意不怎么好，一直都很不景气，语气里满是失落和颓丧。问了问他的父母--我的前公婆，两个老人曾经对我非常好，很高兴地知道他们都还健康。中间不断听见前夫那边唉声叹气，我一边回答儿子的天文问题，一边呵斥脚边抢食的2个猫儿子，听见前夫说\"你好像没有什么变化啊，还是很有活力，听儿子说你们过得挺开心的...\"话音未落，猫打翻了水盆，为了漂亮地毯，我扑过去和两只猫展开搏斗，直到把他们关进卫生间才喘了口气，回头一看，儿子已经把电话挂了.......\n\n 前夫在这个夜晚又浮现在脑海里，10多年的光阴能想起来的只有些片段。 还记得前夫当年站在讲台上凯凯而谈的样子，那个时候远远看见他我就会心跳不已；怕他跟小偷对打吃亏我出手相助，最后我们俩都挂了彩狼狈逃窜；我动员父母拿出养老钱给前夫创业，赚到第一个万元的时候两个人在9平米的新房里高兴地大喊：我们是万元户啦！......一并浮出的还有前夫的N次出轨，N个女主角里我见过的只有第一个，是前夫的秘书，因为在我怀孕的时候她来找我谈判让我让位。最后导致我们离婚的那个女人从来没有见过，听说她很是狂妄了一把，因为前面那么多女人都没有打败的老大---我最后败在她手里；不过最后没能修成正果，据说这女人嫁到了美国，没准正在文学城里开博呢， 呵呵........\n\n前夫和我曾经算过命，一个瞎老头在我们一起的时候说过我们是绝配的夫妻，只要我们夫妻搭档，生意上会所向披靡。老头后来把我支出去，单独和前夫谈。为此我不平衡了好几个月，逼着前夫告诉我实话，这实话最后在我们离婚那天他才说出口。原来瞎老头说我有旺夫相，而前夫命犯桃花，如果他不肯花钱转运，我们最后要离婚，他的生意也会一落千丈，而我则会远行。估计前夫只听了命犯桃花那一段便心中窃喜，哪舍得花钱转那别人求都求不来的桃花运。他桃花连连，我远渡重洋，最终我们离婚，不知道今天听他念生意差的经是不是也应验了老头的话......\n\n 月光下，儿子熟睡的小脸露出笑意。离婚了，和前夫的恩怨在我撒手婚姻的那天就已经释然。儿子，却让我和这个叫前夫的男人在恩怨之外有一丝无奈的联系。\n\n安静的夜晚，独自饮一杯红酒，听一首曼妙的老歌，为生命中走过的那个男人轻轻说一声：生日快乐！\n\n老歌里唱着，失去了牵绊的女人，自由得想要飞.....而我在那一刻，\n已经飞起来......\n\n其实，前夫的生日，只是普通的一天......", "excerpt": "下一个\n\n一年一度，前夫的生日到了。\n\n 前夫的生日有着革命的历史纪念意义，所以分手多年后依然记得。\n\n 前夫的生日是我们正式恋爱的日子。N多年前，前夫是我的大学老师，以开生日晚会为借口邀请我，去了才发现只有我一个人。18岁的小女生，迷上了...", "category": "情感"}, {"id": 43, "title": "买床记 - 2007年4月23日", "date": "2007-04-23", "body": "下一个\n\n周六，迎来了前所未有的好天气。 把儿子扔进国际象棋俱乐部去混4个小时， 然后约了身边唯一的光棍朋友Ms.Connie一起去逛街， 目标不是时装，而是床垫。因为我的工作每天坐着打电脑，后腰总是隐隐作痛，终于打定主意要犒劳自己一把，给自己换个舒服的床垫。\n\n在SLEEPCOUNTRY里，从500刀到9000刀的床一路试睡过去，真的是领略了一分价钱一分货的真谛。连销售员推销的方法都跟着价钱不同起来， 尤其是到了价格高于3000加元的床垫以后，他竟然建议一定要躺够20分钟以后才可以起来，只有那样才能真正体会到高科技的感觉。于是我和CONNIE挑好了一张价值5000刀的床， 扎扎实实地躺了上去。\n\n那床正好放在整个展示厅的正中央，我和Ms.\nConnie躺上去的时候，象足了一对\"同志\"姐妹： 身高170厘米的我，穿的花里胡哨，秀里秀气地拽着裙子并着腿；Ms.\nConnie身高180厘米还多，最起码有200磅，穿得跟个男人一样， 还大仰八叉旁若无人地大声\"WOW\nWOW\" 喊着。我们这边动静不小，引得店里的客人纷纷侧目。 \n\n众目睽睽之下，我们两大模大样地躺了半个小时，销售员终于转回头来搭理我们了。一句 \"女士们，感觉怎么样？\"话音还没有落地， Ms.\nConnie和我几乎异口同声地说：\"我们迫切需要一个老公啊，给我们买这个床！\"  然后我和Ms.\nConnie同声大笑，销售员也笑得弯了腰，说：\"我以为你们就是～～～夫妇呢！\"， 那个关键词他倒是真没有说出口，听他这么一说，我脸上真有点挂不住了，Connie倒是笑得越发厉害了，还过来把我肩膀一搂，对着销售员说：\"我很希望是呢！看看这个东方美人， 哈哈哈哈！\" 。  她这一搂一夸，我的脸腾一下红到了脑门。\n\nMs.\nConnie看我的红脸估计感觉到玩笑开大了点，打发了那个销售员就乖乖跟我开车回家。 一路上我们两都没有说话 ， 我在心里想，莫不成她真的是～～～？  她可是信耶稣的呀，应该不会吧？！要说文化差异，也有些道理，可是这洋人的事情又弄不明白，她都过了40还不结婚，八成真有问题！这么隐私的问题又不好意思问，正寻思着就到了她家，她盛情邀请我一起喝茶，我找借口推辞，开车就跑。\n\n 回到家，SLEEPCOUNTRY里的一幕一直令我很不舒服。正郁闷的时候，Ms.\nConnie的电话追了过来，她说她觉得我好像不高兴了，想问问我到底怎么了。\n\n 既然她来打听，干脆问个清楚吧，于是我说\"今天为个床垫，差点让我连性取向都变了，我是有点不舒服！\" \n Ms. Connie 在那边嘻嘻笑着说\"你是不是还在想，Connie 是不是个～～～呀?\" \n洋人真是直啊, 让我都不好意思说不是,  干脆反问道  \" 那你是不是啊?\"  \n Ms.\nConnie 没有正面回答, 又把球踢过来 \" 我不是怎么样?  我是了, 又怎么样? 你是不是就不愿意再搭理我了?  \"\n这还真把我问住了,  我支支吾吾地说, \" 反正我不是,  我是个正常女人!\"\nMs. Connie 说:\n\" 嗨, 是不是你们中国没有~~~, 或者你压根没有见过~~~~,  谁告诉你~~~ 就不是正常女人啦?! 我就很正常,  我喜欢男人, 我也喜欢女人, 象你这样的, 你知道吗？ 我觉得你的微笑很迷人啊!  我喜欢跟你逛街,  我喜欢听你说有外国口音的英语  ............   不过你不要想到其他的啊, 我当你是朋友, 是真的好朋友啊!  我非常尊重你啊!  ........这是加拿大啊, 同性婚姻是合法的哈, 当然要双方自愿啦!  你要是愿意, 我肯定愿意娶你!  哈哈哈哈哈   ......... 还有啊， 你别忘了，你要是真买了新床垫， 一定邀请我去睡一晚上啊............哈哈哈哈     ........\"\n\n 在电话上跟她扯了一个多小时,  她一句真一句假的,  我到最后还是没有明白她到底是不是~~~~~\n\n 整个周末,  都在郁闷中度过, 还没有办法跟别人说。  不就是想买个床垫嘛!   现在好了， 床垫没有买成不说,  女朋友变成 了嫌疑\"同志\"  ,  还弄得我好像头发长见识短,  完全不具备融入加国文化的能力。\n\n 周一起床腰就开始疼，到了办公室往椅子上一坐， 更疼了。午休的时间， 我终于忍无可忍， 又跑去SLEEPCOUNTRY， 把那里的床垫独自睡了一遍，然后一咬牙，一跺脚，分期付款买了那款5000刀的床垫。咬牙跺脚不是为了银子哗哗地流出去，而是因为我在对自己说： 买床的事情打死也不告诉Connie， 无论如何也不让她睡我的新床！ 嘿嘿.........", "excerpt": "下一个\n\n周六，迎来了前所未有的好天气。 把儿子扔进国际象棋俱乐部去混4个小时， 然后约了身边唯一的光棍朋友Ms.Connie一起去逛街， 目标不是时装，而是床垫。因为我的工作每天坐着打电脑，后腰总是隐隐作痛，终于打定主意要犒劳自己一把，给...", "category": "生活随笔"}, {"id": 44, "title": "虎子", "date": "2007-04-20", "body": "下一个\n\n我10\n岁以前，爸爸被扣着\"反革命\"的帽子修铁路，妈妈带着出生不久的我和哥哥姐姐被下放到一个偏远的山村。作为反革命的狗崽子，遭到村里孩子欺负是家常便饭\n。\n妈妈是方园几十里唯一的医生，经常去其他村子出诊，还要照顾年迈的奶奶，对于我们受到欺负的事无暇顾及，只能任我们在广阔的农村大有作为去了。那时，姐姐已经在乡里上住宿的中学，平常不在家，上小学的哥哥在村里时不时跟别的孩子大打出手，而没学可上的我是他的死党跟屁虫，常常就被捎带着弄得鼻青脸肿。\n\n我刚记事的时候，爸爸部队的老战友辗转来探望我们，送了一只狼狗崽给哥哥，起名叫\n\" 虎子 \" 。\" 虎子 \" 是警犬的后代，妈妈把它当自己的孩子对待,\n经常会跑好几里路地，到镇上带些杂碎什么的回来喂它。\" 虎子 \"\n全身黑色，眼睛上方有棕色的毛，一对又长又大的耳朵，很是威风。 \" 虎子\n\"很凶猛，打败了方圆几个村的狗，不到一年就成了远近闻名的明星。 \" 虎子 \"\n对哥哥绝对顺服，哥哥快放学的时候 ，\" 虎子 \"\n一定会在学校门口等他，然后背着哥哥的书包 跟着他到 处跑 。 哥哥偶尔也会\n让我骑在 \" 虎子 \" 身上在村里串门，坐在 \" 虎子 \" 背上的我威风得一塌糊涂\n。 因为有了\"虎子\"，慢慢地村里的孩子欺负我们的少了。\n\n好景不长，\"虎子\"的名气越来越大，引来了县城里一批小混混，快放暑假的时候他们在学校门口打伤了哥哥抢走了\"虎子\"。哥哥为此大病一场，后来干脆逃学独自到县城里去找他的爱犬。妈妈为了找哥哥，不得不把我扔到老乡家里也去了县城。一个秋天的深夜，妈妈没有找到哥哥，疲惫地回到家，突然听到门外狗吠，哥哥带着虎子出现在门口。哥哥穿着裤衩，为了拴狗他把皮带解了，在凛冽的秋风里牵着狗，拎着裤子，跑了几十里地。听哥哥说，他跟踪了那些混混好长时间，在夜里他蹲在那家院墙外呼唤\"虎子\"，\"虎子\"挣脱了绳子从一人多高的墙上跳了出来，怕人家追，哥哥和\"虎子\"沿着铁路狂奔。\n十二岁的少年风餐露宿，执著地追寻他的爱犬，而\"虎子\"又是怎样的忠实，冲破了重围又回到主人身边，今天想来，越发难得。寒冷的秋夜，少年的哥哥满脸灰尘，光腿拎着裤子，身边站着自己的爱犬，疲惫不堪，脸上却洋溢着无比的快乐，那个场景象电影里的定格永远留在我脑海中。\n\n\"虎子\"回来以后，哥哥的生活终于恢复了正常，但是为了不再被人抢，\"虎子\"不能象以前一样自由自在地在村子里晃了，我也不能骑在它背上威风了，更多的时间，他被拴在院子里。\"虎子\"对小主人的忠诚让它名气大增，到了第二年春天，几乎全村养狗的人家都想养一条象\"虎子\"的狗，一时间哥哥带着\"虎子\"到处给\"结婚\"，到了夏天的时候，村里满地跑的小狗狗多少都能看出点\"虎子\"的模样来，可惜的是\"虎子\"一个也不认得。\"虎子\"死的那年我上小学二年级，可能是吃了村里撒的老鼠药，反正就是吐啊吐的，最后它匍匐在哥哥脚边还挣扎着舔了舔哥哥的手才闭上眼睛。哥哥哭的昏天黑地，我也哭了，不过看着哥哥那么伤心，我还是纳闷，怎么奶奶死的时候也没有见过哥哥这个哭法。后来我还偷偷问哥哥这个问题，直接被哥哥在脑门上给了两个雷子（狠敲）。\n\n2005\n年春节，在全家回到城市二十多年以后，和哥哥一家又回到当年我们生活过的山村里。我们的院子还在，只是已经破旧得没有人住了。我们上过的小学也还在，甚至于那个门楼都没有变，木质的门槛还象当年那么高。哥哥给他儿子讲着当年他的\"虎子\"接他的地方，\n远远地看哥哥坐在门槛上兴奋地笔划，少年和\"虎子\"又浮现在我眼前。有住在隔壁相熟的乡党们认出了哥哥，把我们一行拉进他家吃饭。一进门，我们真的看见了\"虎子\"，哥哥也兴奋地几乎跳起来，原来这家人的狗是\"虎子\"的后代，不过已经是重重重的孙子辈了。\n\n回城的路上，哥哥一直在感慨时间的无情，是啊！当年风尘仆仆的少年，如今已大腹便便。二十多年的光阴化为一瞬间，原以为已经远离的山村生活，因着\"虎子\"又一次重现在我们眼前。在我们远离的这些年里，\"虎子\"的血脉一直在山村延续，无论我们是不是会想起，\"虎子\"的影子都永远留在心里最深的地方，而且会在不经意的时候跳出来，拨动我们的心弦。\n就象今天。无论在国内还是北美，十年的山村经历依然是我和姐姐哥哥少年生活中最浓最重的一笔色彩，它让我们学会了忍耐和执著，在我们面临困境的时候，会在心底为我们点燃一线希望，让我们知道时间会让一切变成过去，只有未来在自己的手中。", "excerpt": "下一个\n\n我10\n岁以前，爸爸被扣着\"反革命\"的帽子修铁路，妈妈带着出生不久的我和哥哥姐姐被下放到一个偏远的山村。作为反革命的狗崽子，遭到村里孩子欺负是家常便饭\n。\n妈妈是方园几十里唯一的医生，经常去其他村子出诊，还要照顾年迈的奶奶，对于我...", "category": "生活随笔"}, {"id": 45, "title": "奶山羊", "date": "2007-04-20", "body": "下一个\n\n和我有关的第一个小动物，是妈妈讲给我听的。那是一只奶山羊，妈妈买回来为了挤羊奶给我喝。那个时候因为爸爸被关进了牛棚，妈妈带着姐姐，哥哥和刚出生的我被下放到一个偏僻的山村里。\n\n生活变故，妈妈的奶水全退了。为了不让我饿死，妈妈花了半个月的工资买了那只山羊。据说那羊也尽衷职守，把我喂得小脸红扑扑跟隔壁的农村孩子一样结实。我不到一岁的时候，有一天早上妈妈发现羊不见了，只有羊头还在树上拴着。村民说，夜里有狼进村，好几家的羊都被吃掉了。这只羊我肯定看见过，可惜那时太小，实在不记得它的样子。妈妈总是怀念那只羊，又经常讲给我听，却不知道一只挂在树上的羊头，双目圆睁，血淋淋的样子早已成了她宝贝闺女童年时最恐怖的想象。\n\n少年的时候，因为有红脸蛋，每每被哥哥姐姐取笑\"红二团\"，心里都有点记恨那只山羊。不过，算来因为这红脸蛋总被人夸神采奕奕，又着实省了一大笔买胭脂的银子，就从心里对那只山羊充满了崇敬。", "excerpt": "下一个\n\n和我有关的第一个小动物，是妈妈讲给我听的。那是一只奶山羊，妈妈买回来为了挤羊奶给我喝。那个时候因为爸爸被关进了牛棚，妈妈带着姐姐，哥哥和刚出生的我被下放到一个偏僻的山村里。\n\n生活变故，妈妈的奶水全退了。为了不让我饿死，妈妈花了半...", "category": "生活随笔"}, {"id": 46, "title": "2007年复活节之宠物篇", "date": "2007-04-20", "body": "下一个\n\n好不容易盼来了复活节的长周末，答应了AIDEN同学的复活节礼物是一个宠物。\n\nAIDEN同学无数次带我参观过爬行宠物店，无数次表达过他想养条蛇的意见，都被我否决了。无论如何也不能想像和一条蛇或者蜥蜴在一起的生活。哪天要是它们从笼子里跑出来，在我酣睡的时候冰冷地KISS我一下，估计下半辈子我就不能正常起床了。\n\n为了这个宠物我费尽了心思，终于找到一家人，他们有2只小猫要送出，说好了复活节的周五可以去接。为了给ANDEN同学一个惊喜，车开到了猫主家门口，也没有告诉他此行的目的。AIDEN看见蹒跚的小猫，如我想像的一样发出了一声惊呼，那一刻我为自己已经战胜了蛇和蜥蜴无比得意。AIDEN跟着小猫咪大呼小叫地兴奋着，我一边向猫主讨教小猫的饲养经验，一边观察着2只小猫的行动，想从中判断出哪只有培养前途。\n\n AIDEN和小猫玩得不亦乐乎，看见一个平日里粗枝大叶到处闯祸鼻涕掉嘴里都懒得擦的小男生竟然会轻手轻脚地跟在小猫后面爬，还会小心翼翼地捧着它们，一丝欣慰油然而生。看来，宠物是孩子的好老师这话真没有错。 到了必须得离开的时候，我告诉AIDEN我比较中意一身黑脖子里有一小撮白毛的小猫，就带它走好了。AIDEN把两只小猫一直捧在胸前，很难取舍得看看这个又看看那个。最后他走过来，仰起小脸，说，\"妈妈，你看！你只有我一个孩子，每天我都很孤单；如果只带一只小猫回去，等我们都不在家的时候，没有伙伴它该多可怜啊？！就象我一样？！\"   说着说着，他眼圈都红了。\n\n猫主也在旁边加油，说你们领两只没有问题，其实猫是很怕孤独的哈！AIDEN仿佛遇到了知音，捧着两只猫就蹭到猫主身边依偎着人家去了。面对儿子和猫主企盼的眼神，我不同意都不行了，只好点头。\n\n 于是2007年的复活节，一不留神我又添了猫儿子,而且一次就添了2个～～～", "excerpt": "下一个\n\n好不容易盼来了复活节的长周末，答应了AIDEN同学的复活节礼物是一个宠物。\n\nAIDEN同学无数次带我参观过爬行宠物店，无数次表达过他想养条蛇的意见，都被我否决了。无论如何也不能想像和一条蛇或者蜥蜴在一起的生活。哪天要是它们从笼子...", "category": "生活随笔"}, {"id": 47, "title": "有关＂朋友＂的感慨", "date": "2007-04-05", "body": "下一个\n\n昨天在MSN上和一个国内的＂朋友＂起了一番争执，心情郁闷，一直到今天早上还不能释怀。\n\n这位＂朋友＂当初人到中年，无一技之长，在单位面临下岗，当时我承包了单位的一个部门，她来求我接纳她，给她个容身之处。我接受了她，当时单位很多人告诉我她是\"滚刀肉\"，我都没有理会，委任她做了我的助理，工资待遇是她原来的３倍，她感激不尽，工作也算扎实。相处的几年当中，我把她当同事，又当朋友，非常信任她。\n\n０５年要来加登陆，怕自己照顾不了，我想把单位承包的工作停掉，她说她想接手承包来保住她的工作。我信任了她，就在走之前把工作委托给她。三个月后我回去，由于她的疏忽，单位的电脑被人偷了，帐目一塌糊涂，影响非常不好，我只好和单位终止了承包合同。\n\n她那个时候又面临下岗，我于心不忍，找关系把她安排在单位一个闲差上，工资不降，工作轻松。对于我来说，总觉得她跟我干了几年，好歹对她有个交代，也算对得起她。\n\n我再次登陆之前，她自己要做一个台湾的什么电子商务公司的业务，说是业余时间做，赚点外快。每天拉着我投资和她合伙，耳根一软就给了她２万块人民币，当时她号称她也投资了１０万块，收益如何高。钱给她的时候，她信誓旦旦，拍着胸脯说，她保证这生意不会差，让我在国外安心等着好消息。\n\n现在一年多过去了，生意没有任何消息，昨天我登陆那公司的网站，竟然已经关闭了。在MSN上碰到她，我问情况，她直接来了句：我不知道！\n再问，她说：我为你做了多少事情，你给过我的报酬太低了！\n然后就开始抱怨生意我从来不过问，现在都赔了，我还来向她问罪，好象我多不地道。最后，她自己腆着脸说，幸运的是她投进去的１０多万都收回来了，而我和其他几位朋友的钱全赔光了，而我们赔钱都是怪我们自己，与她无任何关系。\n\n说实话，钱已经损失了，在千里之外也无能为力，这个事实我已经接受了。\n令人懊恼的是，这样一个号称是你＂朋友＂的人，为了自己的利益，把牵扯进去的朋友全部赔上，她一点不觉得有歉意，相反她觉得还是别人辜负了她？！这都是什么样做人的原则，\n什么样为人的逻辑！\n\n昨天晚上想着我会为这件事情辗转无眠，还好,\n一夜无梦。但是早上一睁眼，这件事情就又开始来烦我，上班的路上我问自己：你为什么烦恼呢？\n为了损失掉的将近3000刀？\n3000刀的确不是个小数目，可以用来买心爱的家具，或者飞回国内度一次假！但是我真的是在为这损失掉的家具或者度假伤心吗？\n还有别的什么让我感到痛心吗？\n终于我明白了，真正让我痛心的是那种信任被人背叛的感觉，那是种让人从心凉到脚尖的感觉，而且无法用金钱来衡量。\n\n从小在军人的家庭里成长，正直的父母是我的好榜样，＂受人点滴之恩当涌泉相报＂是父母教育我们的处人原则。成长的路上，也经历了不少挫折，无论是婚姻上经历变故，还是工作经历失败，自己从来不曾辜负任何人。碰上这样一位曾经当作知己的＂朋友＂辜负自己的信任，甚至于反过来践踏我，真的也不是第一次了，每次都痛心，却好象自己也没有什么长进，\n还会受伤，还会痛心。\n\n上班的时候一直不能集中精力，好在EASTERN前的最后一天，同事们已经吊儿朗当不见了踪影。偷偷登陆MSN，碰上另一个朋友在线，跟她唠叨了半天。这位朋友向来是以理智著称，一直是我们女人圈里的大姐大。\n她听完了，淡淡一笑，把我数落了一顿：首先，钱的问题没有大小，尤其是朋友之间的金钱来往；说白了，你给她钱就是你的错，何况你们之间是没有任何协议！现在钱没有了，朋友也没有了，评估一下你的损失，只怕是那钱就已经小到可忽略不计了吧？\n其次，你之所以受伤，是你亲手给了别人伤害你的利器，至于人性，人性的根本就是在有利益冲突的情况下，把自己的利益凌驾于别人之上，换了你也一样；而恰恰是你自己把这个机会给了那个人，那不是她的错，\n还是你的错！\n最后，你感到受伤，不是坏事情，说明你还是个正常的人，另外你还要感谢那个伤害你的人，她让你知道你还不是个滚刀肉！\n\n如果说＂朋友＂的背叛让我惊讶痛心，那大姐大的话就让我如梦初醒了。\n原来原来原来，原来都是我的错啊.......\n\n**戈壁小花**2007-05-06\n04:55:12\n\nTop of Form\n\nBottom of Form\n\n回复悄悄话曾经也经历过你的遭遇，\"路遥知马力，日久见人心\"，\n还好你才损失几千刀拉，就当\"抚贫\"吧，\n施比受有福这样想就会开心点，小心不要气的脸上起皱皱，，，，，\n\n**SINEAD4273**2007-05-04\n10:58:33\n\nTop of Form\n\nBottom of Form\n\n回复悄悄话施比受有福\n-- 同意！！！\n\n道德渺小的地方时出不了伟人的。 让他去八。\n\n**strangepi**2007-05-03\n11:11:04\n\nTop of Form\n\nBottom of Form\n\n回复悄悄话同情你的遭遇。\n确实，那种背叛的滋味很让人痛苦。可是，还是让我们天真的再一次以为，施比受有福吧。\n不过，吃一堑，还是要长一智。这个\"朋友\"，以后还是躲她躲得越远越好。", "excerpt": "下一个\n\n昨天在MSN上和一个国内的＂朋友＂起了一番争执，心情郁闷，一直到今天早上还不能释怀。\n\n这位＂朋友＂当初人到中年，无一技之长，在单位面临下岗，当时我承包了单位的一个部门，她来求我接纳她，给她个容身之处。我接受了她，当时单位很多人告...", "category": "生活随笔"}, {"id": 48, "title": "儿子起名叫AIDEN", "date": "2007-04-01", "body": "下一个\n\n \n\nAIDEN是我儿子，今年十岁，出生在中国。 他有一个分外拗口又无比难写的大名,\n是他爸爸的爸爸, 一位名牌大学文学教授翻了辞源,\n辞海等等我从来没有念过的书找出来的.\n\n \n\n登录加拿大报名上学的时候，用的是他的大名在学校注册。  这偏僻的小镇上,\n全学校就他一个中国人。儿子的中国大名让班上的大小老外咬掉舌头也发不准,  班主任老师专门找我谈话，\n说为了叫我儿子的名字，她的舌头都疼,  而班上的同学因为发不准,\n已经有人给孩子起外号了。老师怕我儿子英语说不好, 又被同学叫了外号,\n可能会对上学有抵触情绪,  建议我给孩子找一个方便又好听的名字.   \n\n在网络上辞典查了几天,  竟然没有一个让我中意, 不是MIKE太老土,\n就是JACK太野, 本来想叫 BOB, 邻居告诉我那是XXX用品的代号,\n而ADAM一听就让人觉得没穿衣服(在伊甸园)。\n 一个周末的下午，我歪在沙发上看SEX AND CITY,\n女主角众多的男朋友之一当中有一个叫Aiden, 温文尔雅又颇有艺术家的气质,\n令我眼睛一亮.  这名字发音方便而且透着一股清新，\n当我儿子外国符号再合适不过了。\n\n \n\n第二天告诉老师,老师很是赞赏，说:这名字好,按字母排序,　总在最前面!\n而且班上还没有重名!  \n\n \n\nAIDEN随即就在学校叫开了。 转眼到了年底, 　报纸上豁然登了一则消息，\n说AIDEN取代MICHEAL成为北美男孩子最POPULAR的名字,\n我兴奋的拿着报纸到处跟人吹, 看看！ AIDEN的名字多酷,  AIDEN他妈更酷,\n随便给儿子取了个符号,一不留神就成了流行!  当然, 儿子也着实骄傲了一把,\n还拿报纸到学校去臭显了两天.\n\n \n\n新年晚会, AIDEN同学作为唯一的家属参加我公司的年会,\n因为是唯一的亚洲小脸蛋, 倍受关注。  老板和同事以及太太们围着他问东问西,\nAIDEN象个小绅士一样举止得体, 让我这当妈的脸上很是有光。   正得意着呢,\n儿子清脆的英文传过来: 我的名字是妈给我起的,\n还是北美现在流行的男孩名字呢! 酷吧?! 知道我妈怎么起的? \n我妈是看了个电影, 叫什么SEX什么来着的?!  那个女主角有好多男朋友, \n我妈最喜欢里面那个叫AIDEN的，她就给我起了这个名字...... \n\n儿子那小脸蛋洋洋得意地昂着,  老板同事, 和太太们的脸上却表情各异。 \n有人转过来看我,\n竟然还冲我挤眼伸大拇指,  估计他们都在心里想，平日温婉的这个中国女人，竟然热衷ＳＥＸＡＮＤＣＩＴＹ！　那一刻, \n我真希望他的名字随便是什么， 只要不是AIDEN.........", "excerpt": "下一个\n\n \n\nAIDEN是我儿子，今年十岁，出生在中国。 他有一个分外拗口又无比难写的大名,\n是他爸爸的爸爸, 一位名牌大学文学教授翻了辞源,\n辞海等等我从来没有念过的书找出来的.\n\n \n\n登录加拿大报名上学的时候，用的是他的大名在学校注...", "category": "亲情"}, {"id": 49, "title": "关于开博", "date": "2007-04-01", "body": "下一个\n\n开博是为了纪念, 纪念在07年的春天, 我突然明白的很多道理. \n其中的一个是关于再次单身, 另一个是关于孩子.  \n\n再次单身来自英文的\"SINGLE AGAIN\", 听起来是比离异,丧偶要顺耳些,\n好象也更贴切些.  再次单身是我选择的,  爱过, 也恨过,\n最后彼此放弃, 无怨无悔. \n\n孩子也是我选择的, 生他的时候我几乎搭上了性命。养育他的10年中, \n因为工作的缘故, 一直是我父母照顾他, 每年只有假期我们母子才能相聚，\n和孩子在一起的时间不多，孩子却和我一直非常亲近。\n在和孩子的爸爸分手的时候, 他提出的条件是在钱和孩子之间选择一个，我毫不犹豫地选择了孩子，放弃了房子，车子和公司的股份。 \n\n选择了单身, 又选择了孩子, 形成了一个特别的家庭模式. \n因为和孩子在一起的日子充满了乐趣, 也让我学到很多东西, 总怕随着时间流逝,\n孩子在每天的生活里留下的记忆会被淡忘.  自己每天在网络上徜徉,\n读那么多别人的故事, 不如也花点时间, 敲上写文字,\n帮助自己已经开始减退的记忆力吧. 于是就有了这个博客.\n\n因为自己是单身, 又是妈妈, 在博客分类的时候, 真的不知道该怎么选择. \n暂定这里, 如有不妥,日后再说.", "excerpt": "下一个\n\n开博是为了纪念, 纪念在07年的春天, 我突然明白的很多道理. \n其中的一个是关于再次单身, 另一个是关于孩子.  \n\n再次单身来自英文的\"SINGLE AGAIN\", 听起来是比离异,丧偶要顺耳些,\n好象也更贴切些.  再次单身...", "category": "随笔"}];

let currentFilter = 'all';

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return parts[0] + '年' + parseInt(parts[1]) + '月';
}

function bodyToHTML(body) {
  const paras = body.split(/\n{2,}/);
  return paras.map(p => {
    const t = p.trim();
    if (!t) return '';
    return '<p>' + t.replace(/\n/g, ' ') + '</p>';
  }).join('');
}

function showHome() {
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-article').style.display = 'none';
  window.scrollTo(0,0);
}

function showArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  
  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-article').style.display = 'block';
  
  document.getElementById('article-content').innerHTML = `
    <button class="back-btn" onclick="showHome()">← 返回全部文章</button>
    <div class="article-cat">${a.category}</div>
    <h1 class="article-h1">${a.title}</h1>
    <div class="article-meta">${formatDate(a.date)}</div>
    <div class="article-body">${bodyToHTML(a.body)}</div>
  `;
  window.scrollTo(0,0);
}

function filterArticles(cat) {
  currentFilter = cat;
  
  // Update nav buttons
  document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
  const navMap = {'all':'nav-all','亲情':'nav-qinqing','情感':'nav-qinggan','历史记忆':'nav-lishi','生活随笔':'nav-suibi'};
  if (navMap[cat]) document.getElementById(navMap[cat]).classList.add('active');
  
  renderGrid();
}

function renderGrid() {
  const filtered = currentFilter === 'all' 
    ? ARTICLES 
    : ARTICLES.filter(a => a.category === currentFilter);
  
  document.getElementById('article-count').textContent = filtered.length + ' 篇';
  
  const grid = document.getElementById('article-grid');
  grid.innerHTML = filtered.map(a => `
    <div class="card fade-in" onclick="showArticle(${a.id})">
      <div class="card-cat">${a.category}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-excerpt">${a.excerpt}</div>
      <div class="card-date">${formatDate(a.date)}</div>
    </div>
  `).join('');
}

function renderFeatured() {
  const a = ARTICLES[0];
  document.getElementById('hero-featured').innerHTML = `
    <div class="featured-label">最新文章</div>
    <div class="featured-card" onclick="showArticle(${a.id})">
      <div class="fc-title">${a.title}</div>
      <div class="fc-excerpt">${a.excerpt}</div>
      <div class="fc-meta">${formatDate(a.date)} · ${a.category}</div>
    </div>
  `;
}

// Init
renderFeatured();
renderGrid();
</script>
