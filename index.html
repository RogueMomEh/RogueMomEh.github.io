<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李姐加拿大 - 文字档案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #f7f2ea;
  --red: #b5342a;
  --gold: #a07c1a;
  --gray: #7a7060;
  --light: #ede8de;
  --border: #d8d0c4;
  --white: #fdfaf5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  line-height: 1.8;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 clamp(1.5rem, 6vw, 5rem);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 1rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.site-brand { cursor: pointer; text-decoration: none; }
.site-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.3rem; font-weight: 700;
  color: var(--paper); letter-spacing: 0.05em;
}
.site-sub {
  font-family: 'Playfair Display', serif;
  font-size: 0.75rem; font-style: italic;
  color: rgba(247,242,234,0.5);
  margin-left: 0.5rem;
}
.header-links { display: flex; gap: 1.5rem; align-items: center; }
.header-links a {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.78rem; color: rgba(247,242,234,0.6);
  text-decoration: none; letter-spacing: 0.08em;
  transition: color 0.2s;
}
.header-links a:hover { color: var(--paper); }
.header-nav {
  display: flex; gap: 2rem;
  padding: 0.6rem 0;
}
.header-nav button {
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.8rem; color: rgba(247,242,234,0.5);
  letter-spacing: 0.1em; padding: 0;
  transition: color 0.2s;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
}
.header-nav button:hover, .header-nav button.active {
  color: var(--paper);
  border-bottom-color: var(--red);
}

/* ── HOME ── */
#page-home { display: block; }
#page-article { display: none; }

.hero {
  padding: clamp(3rem,6vw,5rem) clamp(1.5rem,6vw,5rem) 2rem;
  border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 5rem;
}
.hero-eyebrow {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem; letter-spacing: 0.25em;
  color: var(--red); margin-bottom: 1.2rem;
  text-transform: uppercase;
}
.hero-title {
  font-size: clamp(2rem,4vw,3rem); font-weight: 700;
  line-height: 1.3; margin-bottom: 1.2rem;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-desc {
  font-size: 0.95rem; color: var(--gray);
  font-weight: 300; line-height: 2; max-width: 38ch;
}
.hero-right {
  border-left: 1px solid var(--border);
  padding-left: 5rem; display: flex;
  flex-direction: column; justify-content: center;
}
.featured-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.68rem; letter-spacing: 0.25em;
  color: var(--gray); margin-bottom: 1rem;
  text-transform: uppercase;
}
.featured-card { cursor: pointer; }
.featured-card:hover .fc-title { color: var(--red); }
.fc-title {
  font-size: 1.4rem; font-weight: 700;
  line-height: 1.45; margin-bottom: 0.7rem;
  transition: color 0.2s;
}
.fc-excerpt {
  font-size: 0.88rem; color: var(--gray);
  line-height: 1.9; font-weight: 300;
}
.fc-meta {
  margin-top: 0.8rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem; color: #b0a898;
}

/* ── FILTER BAR ── */
.filter-bar {
  padding: 1.2rem clamp(1.5rem,6vw,5rem);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0.6rem; flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem; color: var(--gray);
  margin-right: 0.4rem; letter-spacing: 0.1em;
}
.filter-btn {
  background: none; border: 1px solid var(--border);
  cursor: pointer; padding: 0.3rem 0.9rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.75rem; color: var(--gray);
  border-radius: 2px; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.filter-btn.active {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}

/* ── ARTICLE GRID ── */
.articles-section {
  padding: 2.5rem clamp(1.5rem,6vw,5rem);
}
.section-bar {
  display: flex; align-items: center;
  gap: 1rem; margin-bottom: 2rem;
  padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
}
.section-bar-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem; color: var(--gray);
  letter-spacing: 0.2em; text-transform: uppercase; white-space: nowrap;
}
.section-bar-count {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem; color: var(--red);
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem 3rem;
}
.card {
  cursor: pointer; padding-top: 1.2rem;
  border-top: 2px solid transparent;
  transition: border-color 0.2s;
}
.card:hover { border-top-color: var(--red); }
.card:hover .card-title { color: var(--red); }
.card-cat {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.68rem; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.card-title {
  font-size: 1.05rem; font-weight: 600;
  line-height: 1.5; margin-bottom: 0.6rem;
  transition: color 0.2s;
}
.card-excerpt {
  font-size: 0.82rem; color: var(--gray);
  line-height: 1.85; font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-date {
  margin-top: 0.8rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem; color: #b8b0a4;
}

/* ── ARTICLE PAGE ── */
.article-wrap {
  max-width: 780px;
  padding: 3rem clamp(1.5rem,6vw,5rem) 5rem;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.8rem; color: var(--gray);
  cursor: pointer; background: none; border: none;
  margin-bottom: 2.5rem; transition: color 0.2s;
}
.back-btn:hover { color: var(--red); }
.article-cat {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem; letter-spacing: 0.2em;
  color: var(--red); text-transform: uppercase; margin-bottom: 0.8rem;
}
.article-h1 {
  font-size: clamp(1.7rem,3.5vw,2.6rem); font-weight: 700;
  line-height: 1.3; margin-bottom: 1rem;
}
.article-meta {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.75rem; color: var(--gray);
  padding-bottom: 1.8rem; margin-bottom: 1.8rem;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-size: 1.05rem; line-height: 2.1; font-weight: 300;
}
.article-body p { margin-bottom: 1.5rem; }
.article-body p:first-child {
  font-size: 1.12rem; font-weight: 400;
  color: var(--ink);
}

/* ── FOOTER ── */
footer {
  border-top: 2px solid var(--ink);
  padding: 1.8rem clamp(1.5rem,6vw,5rem);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--ink); color: rgba(247,242,234,0.4);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.75rem;
}
footer span { color: rgba(247,242,234,0.6); font-style: italic; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.35s ease forwards; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; gap: 2rem; }
  .hero-right { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 2rem; }
  .grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 580px) {
  .grid { grid-template-columns: 1fr; }
  .header-nav { gap: 1rem; }
}
</style>
</head>

<script>
const ARTICLES = [{"id": -1, "title": "关于父亲", "date": "2022-01-18", "body": "(2022-01-18 12:44:23)\n\n2021年11月，父亲走了，享年91岁。因为疫情，我没有能与他告别。父亲临终的时候，我们通过护工的手机，与他视频，父亲弥留之际，能看见屏幕中的我们，他看起来想跟我们说点什么.......\n\n虽然知道父亲年事已高，每个冬天都要去医院住几周，每每被医生告知做好最坏的准备，每次又都能逢凶化吉，我们过去的几个冬天都过得有惊无险。而这个冬天，被医生言中了，父亲本来只是心衰，已经可以出院了，医生建议再观察稳定一下，决定在医院多住两周，没想到情况急转直下，在医院走了。\n\n父亲住的养老院价格不菲，条件非常好。而父亲一直是养老院里的明星，高寿又健康，每天可以自由去楼下活动。父亲走后，养老院的住户们都跑到父亲的房间去跟哥哥讨要一个父亲用过的物件，因为是老寿星的物件都是带着吉利的气息。两个小时之内，父亲的房间就腾了出来，哥哥的朋友的父母搬进了老寿星的房子。\n\n父亲走后的日子里，我经常落泪，有一天开车到了湖边，悲伤袭来，我哭到不能自已。\n只好把车停在湖边，看着湖上的海鸥，大哭了几个小时。父亲的七七，我折了7只小船，载着自己养的兰花，慢慢送进湖水里。据说，灵魂不需要语言，就能感知，父亲感觉到我对他的祝愿了吗？\n我相信他听到了。\n\n儿子大学毕业了，也找到了心仪的工作。姥爷的去世，对他的冲击很大。在儿子的父亲缺席的那些年里，我的父亲成为了儿子生活中那个父亲的样子。最终不能去跟姥爷告别，让儿子又一次面对死亡的时候显得特别憔悴。他一直没有落泪，让我很担心。直到父亲七七，在湖边跟我一起送小纸船的时候，儿子俊朗的脸上满是晶莹........\n\n儿子的朋友们，一个刚刚毕业，就得到父母的馈赠，在多伦多热门的地段买了豪宅，热情地邀请儿子免费去住；另外一个朋友父亲多金，毕业了也不找工作，因为他的父亲说了不要有压力；在儿子辗转求学的这些年了，总共搬家11次，同屋们要么是父母双双出动，要么就是父亲单挑，而儿子只有我......\n\n早上吃饭的时候，儿子说起他们一起几个朋友想买比特币，问我是不是也愿意借钱给他去投资，我问他别的同学怎么做的呢？他说那么买房子的，他父亲说可以把没有贷款的房子抵押出上百万加币，由朋友自由支配；那个父亲多金的，直接给了他10枚比特币........\n\n我笑了，这么多银子，你妈没有，怎么办呢？\n儿子乐了，说，你只需要借给我5000加币就行了，我自己可以攒钱投资，未来我在5年内还你10倍。早餐结束，当妈的高高兴兴给儿子转了5000加币，收到儿子一封承诺借款并且5年内偿还的邮件。\n\n \n\n下午阳光明媚，邀请儿子一同去湖边走路。\n\n我问儿子，你的朋友们都有父亲慷慨赠与的财富，而你跟这些都无缘，是不是有点小感触呢？\n儿子顿了一下，突然问我：你爸爸走了，给你留了什么吗？\n我一愣：还真没有，所有的财产都给了舅舅。儿子揽了一下我的肩膀，说，那你有什么感触吗？\n 我一时不知道说什么，他笑了：你看，你爸爸也没有给你留什么，我爸爸也没有给我留。\n所以我肯定是你儿子，这次你赖不掉了，你这次就没法说我是在医院抱错的那个了。\n\n儿子接着说，我心里是挺酸的，他们有的，我从来没有；大学的时候，每次搬家，都是你一个人帮我搬，我心里也很难受。\n不过，我特别感激，感激you raise me right!!!\n  我现在想，我一定要改变点什么，我要健康，活得像你的爸爸那么长；我要努力去创造财富，将来我可以让我的孩子有一个让他骄傲的父亲。我低头，眼泪落了下来。\n\n这一天值得铭记，两个失去了父亲的人，关于父亲的对话\\...\\....", "excerpt": "2021年11月，父亲走了，享年91岁。因为疫情，我没有能与他告别...", "category": "亲情"}, {"id": 0, "title": "毛猴的花果山来了两个唐僧", "date": "2017-10-01", "body": "下一个\n\n几个月前，老人家的移民被批准了，忙乎着回国去收拾房子，给老人家订机票。\n\n那个时候只有一个念想------顺利上飞机，活着下飞机！\n\n等一路平安到了家，又开始忙着办证件，对付水土不服，各种适应性社交.........\n\n刚开始的两个月相安无事，直到有那么一天.....\n\n出门去购物，女（Le）人(bu)购(si) 物(shu), 地球人 都懂的.........呵呵\n\n 回来的路上听到老人家带着哭腔的微信留言，说: \n深更半夜不着家，让我们担心的不能睡觉........可是所谓的深更半夜不过晚上9点而已........\n\n又有一天，他们开始谈话，说，如果晚上十点钟以前不能睡觉，会早衰........试图给定个规矩，晚上8点得换好睡衣准备就寝.......\n\n脑门上开始有冷汗渗出，给他们办移民的时候，就没有想到自己不仅仅是送了一个紧箍咒给唐僧，还把唐僧请到花果山里住下了，还一下子来了........两个.......\n\n\n\n一天，阳光灿烂，秋高气爽，无比适合高谈阔论的日子.......\n\n男唐僧开始说，人生这个阶段甚是美好，孩子大了自由飞了，身体健康心情愉快，不过呢，还是要有一个计划........\n\n毛猴懵了，问\"啥计划？你们嫌房子小？\"........\"No, No,\nNo........我是说你还是需要找个伴的计划..........\"\n\n毛猴差点把饭喷了，赶快认真地说\"老爷子，你可知道女人的黄金岁月是几岁？18-25？\n都过去了两轮了哈！咱家邻居，啊，那谁谁来着，比我还年轻呢，找的老干部，那条件杠杠的，就是岁数跟你差不多，对不？ \n \n 就现在的行情，你闺女我现在能找到的也就你这岁数的了，过几年还得给人家擦口水，推轮椅，怕是我愿意，你还不愿意呢！.......\"\n\n男唐僧更认真：\"那是国内的行情，加拿大不是这样的吧，找个年纪相仿的还是可以的吧。\n不过大鼻子就算了哈，说话说不通......你那个闺蜜，不是刚跟大鼻子离婚了吗？为啥来着？\"\n\n\"啊，她发烧了，想吃碗清汤面，结果大鼻子给她烤了个大土豆还抹上黄油，她直接给拽地下了.......然后然后就过不下去了呗.........你放心，你闺女估计直接拽人家大鼻子上了......再说，你闺女也没有单眼皮，不招大鼻子待见.......\"\n\n女唐僧接话了：\"也不是说非要怎么着，就是我们都老了，要是你这么一直单着，我们啊，死不瞑目.........\"\n\n毛猴哈哈大笑 \"哈哈，你们让我八点上床\n睡觉，出门都得汇报行踪，要这么着，估计哈，你们是得一直睁着眼了...........\"\n\n看女唐僧\n有些不悦，毛猴急忙闭嘴，默默无语地扒拉碗里适合老人家口味缺盐少油的饭菜..........自从唐僧来了，毛猴连桃子都得煮了才能吃，因为唐僧们说水果性晾，煮了才有营养.........\n\n那一瞬间，突然想当年的毛猴被压在石头底下五百年，天天盼着他师傅路过救他出来，然后跟着师傅去取经，可真是傻呀！ \n其实那五百年才是猴生最自由的时光啊.........\n\n\n\n男女唐僧看猴子不说话了，以为毛猴听进去了他们的紧箍咒，开始讨论今天的出游路线，然后带着秀恩爱给毛猴看的幸福感，结伴出门晒太阳去了.......\n\n半个小时以后，两个唐僧前后走进家门.........\n气鼓鼓地........拉着毛猴评理：\n\n\"死老头子，非要捡路边一个破书架，我不让他捡，他还骂我...........\"\n\n\"这不讲理的老婆子，书架我都拖回来了放在门口了，她死活不让我弄进屋........\"\n\n毛猴大惊失色，跑到前院一看，真心是一个破书架，破到估计得加倍付垃圾费的那种.......\n\n两个唐僧从客厅吵到餐厅，女唐僧翻出四十年前婆媳恩怨的旧账，男唐僧说他没有自由被压迫了几十年，要立刻回祖国去，女唐僧冷笑着催毛猴赶快买机票，不要误了男唐僧回祖国要去找\"花姑娘\"的好事............\n\n两个唐僧吵架的场景，毛猴再熟悉不过了，包括吵架的套路和最后的结局.......\n\n毛猴年轻的时候，觉得自己家的两个唐僧那是天下的奇葩，\n还就两个唐僧的斗法去请教过一位周易大师。\n\n毛猴跟大师声泪俱下地讨论自己的两个唐僧是不是八字不合，为啥要一边坚守婚姻一边苦斗一辈子？\n\n大师双目微闭的样子毛猴永生不会忘记：他们那是秀恩爱加增强体质，只要他们斗，就一切平安；有朝一日，他们不斗了，那就是其中一个要走了........\n\n毛猴看着两个唐僧在花果山纠缠着，听着他们吵了几十年一陈不变的谷子和芝麻，在心里算着还有几分钟，那个既定的结局就要降临：\n男唐僧忍无可忍甩门而去，女唐僧声泪俱下打开电视找\"养生堂\".........\n\n果然，随着男唐僧甩门而去的声音，客厅里电视准时响起..........\n\n毛猴哼着小调去了花果山后的菜地，收拾秋天的残花败菜，得意洋洋地想，当年给周易大师的200个大毛真心便宜啊，两个唐僧又锻炼了一回身体..........", "excerpt": "下一个\n\n几个月前，老人家的移民被批准了，忙乎着回国去收拾房子，给老人家订机票。\n\n那个时候只有一个念想------顺利上飞机，活着下飞机！\n\n等一路平安到了家，又开始忙着办证件，对付水土不服，各种适应性社交.........\n\n刚开始的两...", "category": "生活随笔"}, {"id": 1, "title": "无助的少年和无助的父母", "date": "2017-02-10", "body": "下一个\n\n20岁高高大大的小伙子在我办公室里落泪，提到和父母的无法达成共识，无法互相理解，以至于他想轻生.....微信的记录里，他对妈妈说，你们再这样逼我，我就跳楼！妈妈回答，你跳吧，反正你跳完，我就跳！....声音中的绝望和决绝让我差点落泪.....\n\n两个小时，安静地听小伙子哭诉所有让他要跳楼的原因，父母的关系不和谐，学业上的困惑，未来的迷茫........只是默默地给他递上纸巾.......在他谈到让他高兴和骄傲的事情的时候，陪他一起笑，然后过一会继续递上纸巾.........\n\n最后的解决方案是给了他一个实习的机会，做他非常喜欢又擅长的一个社交媒体的项目和活动；帮他找到他喜欢的学校和专业，等把父母期待他读完的课程都结束了，去追求自己的梦想.......\n\n离开的时候，一个装在成年人躯壳里的孩子已经破涕为笑，挺直了刚刚弯曲的脊背.....\n\n好想抱抱这个孩子，跟自己儿子几乎同龄的孩子,\n在异乡独自踟躇的孩子，在迷茫和困惑中摸索的孩子......怕他感到不好意思，最终没有拥抱他，只是轻轻地拍了拍他的胳膊说，会好的，随时来找我聊聊啊.......看着他的背影，踩着轻快的步伐离去，自己伤感了一会......\n\n不禁想起去年冬天的日本姑娘，她找到我的时候刚刚失业，脸色苍白，眼神无助，她租住的地方，女房东每天带不同的男友回家，在客厅里情不自禁，让她心惊胆战.........那个冰雨肆虐的早上，开车去她租住的地方帮她搬家，接她到家里的客房小住，送上一杯热茶给她的时候，姑娘哭得止不住，对我说：我觉得活着很艰难........我表示无比同意，然后默默递上纸巾......后来注意到她根本不吃饭，旁敲侧击才知道，姑娘因为失业了怕找不到工作存款无以接济，不敢买吃的......刚好我要出差离开几个月，就告诉姑娘房租不用交了，帮我照顾好我的猫，留给她一个豆浆机教她做豆浆，然后搬出整整一大罐各色豆子，告诉她：要好好的照看猫咪，这些豆子要吃完哦，帮我忙哦，不然要长虫子的哈........出差回来的时候，姑娘已经找到了工作，房租封了信封留给我，在空空的豆子罐里有她手写的英文便条\"谢谢你的豆子，豆浆很好吃！你用豆子告诉我生命的美好，我会永远铭记！\".......\n\n年轻的生命真的太美好，美好得象花儿一样，美好得那么脆弱，一些些如此琐碎细小的挫折也有可能带来无法承受的重压.......脆弱又美好的花儿在凛冽中摇摆抗争的时候，花儿们的父母又何尝不是在经历自己并不知晓的种种危机呢？作为母亲，在一个特殊的时机见证了花儿们的脆弱和无助，尽了微薄之力让几朵小花没有折在风里，可是还有多少花儿在脆弱中颤抖，那里面还有自己亲生的那一朵，不知道他在遇到挫折的时候是不是有人听他诉说，递上纸巾..........", "excerpt": "下一个\n\n20岁高高大大的小伙子在我办公室里落泪，提到和父母的无法达成共识，无法互相理解，以至于他想轻生.....微信的记录里，他对妈妈说，你们再这样逼我，我就跳楼！妈妈回答，你跳吧，反正你跳完，我就跳！....声音中的绝望和决绝让我差点落...", "category": "亲情"}, {"id": 2, "title": "活着才是最好的耳光", "date": "2017-01-16", "body": "下一个\n\n早上跟国内的父母视频，看到爸爸88岁，依然能独立行走，耳朵灵敏到可以偷听我和姐姐在微信上的八卦悄悄话.....\n\n得知爸爸所在的政府机关专门派人来探望爸爸，并且和爸爸照相留念，因为爸爸是这个单位享受老干部离休待遇里为数不多的几位当中年纪最长还能自由行走的那一个......\n\n爸爸的一生历经沧桑，十五岁参加地下党，十七岁跟着王震军团参军赴新疆，中苏边境上冰天雪地里参加\"剿匪\"负伤，为了赴中印边境参战把刚刚出生不久的姐姐哥哥毅然送回老家抚养........这些其实不算什么，爸爸身上纵横的十几道疤痕却是文革时期被关在牛棚毒打留下的........1968年爸爸被打成反革命被迫修了十年铁路，1978年终于冤案平反回家的时候，爸爸患了肺结核肝硬化几乎丧命........\n\n记得爸爸刚刚官复原职回到单位，路遇当年几乎将他置于死地的一个造反派头目，一直以来隐忍的怒火无法平息，他动手打了这个混蛋，自己的手负伤了还被党组织叫去批评了一顿.......爸爸那天回家的时候，我记得妈妈一边给爸爸抹药，一边轻轻跟爸爸说：咱们要好好活着，把前面的十年活回来，还要比那个混蛋再多活很多年才是给他最好的耳光.......\n\n时光过去了将近四十年，爸爸坚持锻炼，饮食全靠做医生的妈妈调理 -\n粗茶淡饭戒烟戒酒......\n\n当年那些英姿飒爽却又丧尽天良的造反派，基本上都比爸爸小十多岁。爸爸虽然退休了之后就没有再见过他们这些 \n\"仇人\"，却时不时听到他们的消息，其中那个被爸爸打了的头目，后来喝酒过头脑溢血暴毙，另外几个也在前几年纷纷过世了..........\n\n爸爸和妈妈，他们为了自己的信仰遭遇一生的颠沛流离，爸爸因为善良的天性反对文革武斗老干部遭遇冤狱十年却不肯对自己的党有任何微词；妈妈被命运抛来甩去，依然乐观坚持，下放到山村依然不忘做医生的职责治病救人，最后赢得百十乡亲送她返城...........\n\n对宗教我还不清楚最终的方向，但我相信这世间真的有因果.......\n\n真是一个令人善感的冬日的早晨，写到这里，不禁回忆起童年那些艰辛的日子，有些泪光浮上来........彼时的磨难，所造成的伤痛或许要穷尽一生尚不能复原；磨难中善良的坚持和不曾放弃的信念，又凝聚成此时的美好........", "excerpt": "下一个\n\n早上跟国内的父母视频，看到爸爸88岁，依然能独立行走，耳朵灵敏到可以偷听我和姐姐在微信上的八卦悄悄话.....\n\n得知爸爸所在的政府机关专门派人来探望爸爸，并且和爸爸照相留念，因为爸爸是这个单位享受老干部离休待遇里为数不多的几位当...", "category": "生活随笔"}, {"id": 3, "title": "开博十年", "date": "2017-01-13", "body": "下一个\n\n今天有点时间，把以前的文章读了一遍，注意到在文学城博客开博的时间是2007年4月。时光真是奇妙了，十年，听起来比抗战都要漫长的日子，就那么快地从眼前飞过。\n\n2007年的4月？ 我在做什么？ 为什么要开博？\n让我好好回忆回忆..............登陆异乡不久的新移民，生活在一个10多万人口的小城市，做一份前台的钟点工.......所以那个时间，有空可以在电脑上码子.......婚姻遇到了问题，又有了中年危机......所以那个时间，有可以抒发的情怀.........\n\n十年，现在的生活很不同了，真的是很不同了，小朋友上了大学，工作很稳定，心情很平静，竟然，就没有可以抒发的感觉了.......\n\n微信象鸦片一样，让每天闲暇的时间都在关注朋友圈的张三李四..........偶尔听一次罗胖子的年终演讲，很是感慨，其实未来的经济模式无非是时间经济，因为无论世界怎样，科技多么发达，每个人的时间都是固定不变的，只有24个小时而已......仔细想来，不寒而栗.......生命其实就是一个有限的储备，几秒种的投入，抑或是十年的投入，都是一种投资，不可逆转，不可重新来过啊.......", "excerpt": "下一个\n\n今天有点时间，把以前的文章读了一遍，注意到在文学城博客开博的时间是2007年4月。时光真是奇妙了，十年，听起来比抗战都要漫长的日子，就那么快地从眼前飞过。\n\n2007年的4月？ 我在做什么？ 为什么要开博？\n让我好好回忆回忆......", "category": "随笔"}, {"id": 4, "title": "前夫的忌日(三）", "date": "2014-06-17", "body": "下一个\n\n抵达北京的第二天，是周一。\n儿子被北京的朋友接走，送进一个全封闭的艺术夏令营去学画画，我开始了忙碌的工作，\n一直到周末才见到儿子。\n儿子看起来情绪稳定，看得出他非常喜欢夏令营里忙碌的生活， \n但是他一直若有所思，隐约着让我感觉他平常很不一样， 我又无法直接去打探。\n几次试图提起一周前的事情，儿子要么沉默，要么跟我说，我不想谈这个。\n\n到北京后的第一个周末，北京的好朋友专程到酒店来探望我们。约我出去走走散散心，儿子不愿意冒着酷暑出门，自己在酒店呆着。\n笃信佛教的好友开车带我去了她经常去的一个寺庙，在离后海不远的地方。\n\n这座寺庙香火很旺，却朴实无华，走进庙门就有一种宁静平和的气息扑面而来。\n炎热的夏日，在青砖与树荫相应下，从心底里会升起一丝舒服的凉意.............我和朋友边走边聊，相知十多年的朋友，经历过生活的大风大浪，生离死别，最喜欢她生命里透出的柔和的光辉.........细细密密地树荫下，她拿过两个蒲团，和我一起坐在大殿外面青石铺成的台阶上..........\n\n离开的时候，她带我去庙门边的一间小屋，告诉我说那里可以办理给亡故的人超度的手续，我的心突地动了一下.......那天是前夫的头七..........\n\n走进那个小屋，一位慈眉善目的北京大姐给我介绍了庙里将在一周后举行的超度，问了问费用，很合理的一个数字........我从包里掏出大表姑给我的信封，交给北京大姐，签了字.........大姐看了看信封里的钱，对我说：多了.........我浅浅地笑了一下：\n捐给庙里吧............ 好友在边上看着，她知道那钱的来历，\n也不多语..........北京大姐收下，给我一个收据，双手合十，轻轻吟了一句：阿弥陀佛...........\n\n那天晚上回到酒店，儿子一直在画一幅素描，是他想象中的一个海湾，阴影很重.........\n我坐下来工作...........房间里只有儿子画笔刷刷的声音，和电脑键盘敲击着................\n\n儿子，我需要跟你谈个事..........嗯.............按照中国的传统，或者佛教的认识，一个人去世了以后，灵魂会不愿意离开，一般要在家里祭奠七个七天，也就是49天，\n然后灵魂才会走............嗯................今天是你爸爸去世的第一个七天，叫头七............嗯...............儿子一直没有停下他涂抹阴影的画笔.................\n\n离开电脑，坐到儿子身边.........儿子停下来画笔，静静地看着我..........妈，\n我知道，我上网查了，这七七四十九天，人的灵魂其实在人间是等着评判，这个评判会决定灵魂去地狱还是去天堂..........我非常意外儿子的反应，原来他一直在网上搜寻..........他说出来的时候，我不知道怎么接他的话.......\n\n哦，你查了，那好的........你爸爸去世的那天是农历的五月十五........农历逢十五，或者初一就是满月的日子，\n这些日子多少有些蹊跷......当然妈妈不是迷信，但是我不认为你爸爸的家人会为他守灵，也不会祭奠，因为实际上你也知道他们已经把你爷爷（孩子爹一直住自己老爸家）的房子给租出去了，遗物都清理了.........嗯,妈妈，你想要做什么呢？..............妈妈今天在庙里登记了，农历的六月初一，是你爸爸的二七，在庙里有一个超度亡灵的法事，妈妈捐了钱，你可以去............\n\n儿子看着我，妈妈，你是把表姑给你的钱给捐了吧...........我看着他愣了，他怎么知道的.........儿子冷冷地说，你和H叔叔去机场的路上说的话，我都听见了，我只是假装睡觉.........\n\n哦，那你知道了，是的，我捐了........全捐了......其实法事不要那么多钱.........我只是觉得那钱还是捐了的好............\n\n妈妈，你是要我去庙里，做那个什么法事？.........是的...........为什么？...........你爸爸也没有其他的亲人了，\n你是他唯一的后代，\n这个事情要做，也就只有你能做了..........那个法事，可以评判爸爸吗...........唔，\n这个我不知道，评判好像不是我们人类能做的吧............应该是上帝吧，神吧，\n中国的神话里，大概是阎王吧.............\n\n沉默了很久，儿子仰面躺在他床上，轻轻说了一句，我不想去...........\n\n为什么？........\n\n妈妈，那天葬礼上，你和H叔叔是所有的人里哭的最伤心的，\n你知道吗？...........\n\n...................\n\n你是不是现在还爱着我爸爸？............不然你为什么哭得那么厉害...........\n\n.................\n\nH叔叔也哭得那么厉害...........我觉得H叔叔那天快要晕过去了，他砸那个墙，手都出血了.........\n\n...................\n\n好吧，儿子，我们来谈谈............既然你去机场的路上没有睡着，听到我和H叔叔所有的谈话，你觉得H叔叔为什么哭得那么厉害呢？...........\n\n我觉得H叔叔很生气，他生气我爸爸糟蹋自己的身体..........我还听到过奶奶给我讲当年你还没有嫁给爸爸就为了爸爸做了很多牺牲，他打群架你去救他被打得骨折了的故事，那天H叔叔不是也提起来当年爸爸跟他发誓说你对爸爸那么好，他要是对不起你就会遭报应吗................H叔叔是生气我爸爸对不起你..............我觉得H叔叔是生气..........他们是同学，H叔叔认识爸爸那么多年，觉得爸爸做了很多不好的事情............\n\n哦............H叔叔哭是生气.........妈妈哭，是爱.............\n\n是啊，\n总不会H叔叔是爱...........H叔叔也是爱我爸爸的，他们是同学朋友那么多年............但是跟妈妈你不一样..........你爱爸爸，\n你自己说的，你们生了我，是因为你们相爱..............\n\n儿子，\n妈妈确实爱过你爸爸，真的是很爱，很爱...........那个时候我们是非常相爱的一对........爸爸让妈妈感动的事情很多很多，妈妈也曾经想过如果有颗子弹要打到爸爸，我会用身体去为他挡子弹的...............只不过，爸爸葬礼上妈妈哭...........其实不是为了爸爸...........妈妈看着你抱着遗像，站在那里...........你从那天就是一个没有父亲的孩子了.........爸爸哪怕不怎么联系你...........可是他或者毕竟你是有爸爸的孩子，\n他走了.................\n\n儿子站起来，拿面巾给我........然后又躺下....................\n\n那么，妈妈，爸爸后来不爱你了，对吧..............他爱上另外的阿姨了，\n哦，那个XXX，\n应该是姐姐...........那些人爱过爸爸吗...........表姑说..........爸爸很幸运，他们都没有想到你会带我回来.........二伯那天说，他们都知道你真的是爱爸爸.............爸爸后来的那些阿姨姐姐没有一个来看过爸爸，也没有一个打电话来问过爸爸的情况................妈妈..........你还是爱爸爸的..............\n\n儿子.........我肯定爱过你爸爸............我和你爸爸分手十年...........今天回来他已然不在了...........你非要问我我是不是爱他...........让我怎么说呢..........我回来是因为你需要我..............我怕你太小了，承担不了这么多事情...............而我爱不爱你爸爸，已然不重要了...........曾经我恨过你爸爸...........现在一点都不恨了...............\n\n妈妈， 你觉得我爸爸爱我吗...............\n\n当然，你是他唯一的孩子， 这还用问吗...........\n\n儿子从床上坐起来，胸脯起伏着，语速也快起来............妈妈，你不要骗我了！\n我告诉你，我知道！\n我爸爸压根不爱我.................我后悔这次回来！.............我觉得你们大人根本就把孩子当玩偶............大人只是想让我爸爸在葬礼上有个儿子给他撑面子...........你可能不是...........我的两个伯伯，我的表姑，我爸爸他们一家人，还有我爸爸的那些同学朋友，都是一样的............我做了...........大人满意了..........可是我也知道了，\n我爸爸他根本不爱我................我在葬礼那天明白了，\n所以我哭不出来...........\n\n我惊骇地从床上蹦了起来，站到儿子面前...........摸摸他的脑门........儿子打掉我的手.......猛地站起来，开始在房间里来回踱步..........\n\n妈妈，你知道为什么我知道我爸爸不爱我了吗.............那天我站在他床前，跟他说话，说了好多话.........他一定听见了..........那个时候我可伤心了............等到后来，表姑和二伯他们拉我过去跟我聊天，然后他们接了很多电话..........我听到他们说我爸爸十年来，那个XXX和她的家人旅行的机票都是我爸爸给出钱给买的...............XXX\n十年前就去美国嫁人了，\n她不是我爸爸的老婆........妈妈，我知道你不想让我知道这些事情................可是我都知道..............每年你送我回来看爸爸，每年我跟他呆在一起，他从来............从来没有给我买过一张机票,\n他的公司就是卖机票的, 他可以给一个已经都走了十年的人全家出钱买机票，\n我呢..........他也从来没有给我买过一件衣服啊，妈妈............他死了..........要我回来，\n我看见你在机场交了那么多钱改我的机票.........妈妈，你还跟我说，他爱我..................他爱我，\n他会让自己活得这么糟糕，让高利贷的人到医院去绑架我...................妈妈，\n你不要骗我了...................你让我去做什么法事.............我！...........不..............去！.......................要去..........你自己去！...........................\n\n..........................\n\n那一晚，儿子在梦里辗转反侧...............我彻夜未眠...............\n\n（未完）", "excerpt": "下一个\n\n抵达北京的第二天，是周一。\n儿子被北京的朋友接走，送进一个全封闭的艺术夏令营去学画画，我开始了忙碌的工作，\n一直到周末才见到儿子。\n儿子看起来情绪稳定，看得出他非常喜欢夏令营里忙碌的生活， \n但是他一直若有所思，隐约着让我感觉他平...", "category": "情感"}, {"id": 5, "title": "前夫的忌日 （二）", "date": "2014-06-10", "body": "下一个\n\n儿子在他爸爸的床前说了很多话，我没有听清楚........记忆中，那个给儿子生命的人，有着我曾经无比熟悉的长长的睫毛，儿子完全遗传了他的眼睛和睫毛.......\n只是那双眼睛始终没有睁开看儿子一眼..........儿子不断呼唤他的时候，他的身体有着比较剧烈的反应.........\n\n..........\n\n从重症室里出来的时候已经不是我拉着儿子，而是儿子扶着我.........我的精神终于在紧绷了几十个小时之后崩溃了...........等侯在走廊的亲友们看到我的样子，急忙把我让到病房不远的阳台上，让我坐下来给我一瓶水...........儿子的表姑把儿子叫走了............\n\n我闭着眼睛在阳台边上靠了几分钟，听得到到儿子的表姑在电话上与什么人争执.........\n\n盛夏午后的太阳有些毒辣，阳台上的空气被烤得令人烦躁，我慢慢站起来想走进楼里去的时候，却隐约听到有嘈杂的声音从走廊另一头的电梯间里传过来，仿佛听到了有男人很大嗓门在喊着一个我熟悉的名字，是儿子他爹的名字.........但是那声音不像是有一丝悲伤在里..........直觉让我加快了脚步，\n我看见儿子的绿色衣服就奔了过去........嘈杂声越来越大...........我本能得把儿子拉到阳台上，然后我看到H脸色凝重地快步走过来对我说：带娃离开这里！.........从阳台楼梯上走下去，不要坐电梯，不要再回医院来!.........\n\n那些嘈杂的声音让整个重症区外面都很乱，我带着儿子从阳台通着的楼梯拾级而下，匆匆离开了医院，步行回到酒店去。\n儿子回到房间说很困，还想睡觉，\n刚安顿他躺下，H告诉我他在大堂里让我下去。H带我去酒店的餐厅要了一个小包间坐下，点了几个小菜，让服务员出去，这才告诉我医院的嘈杂是怎么回事：一群高利贷讨债公司的，据说是儿子爸爸欠了高利贷，要债要到医院去，要找儿子爸爸的家属，还听说我儿子回来了，要扣下我儿子去银行查账..........\n\n在那一刻，我目瞪口呆........十年，\n不过短短十年，儿子的爸爸竟然从一个小老板落到被高利贷追债的地步，\n而他本人在重症病房里没有任何知觉.........仅仅几秒钟我心里感到一种无以名状的恐惧.........如果儿子被他们扣下...........\n\nH的手机响了，H说了句，是娃他二伯！然后只看到他接起电话，那边的声音很大，在给H交代着什么............H很沉重地挂了电话..........然后看着我，轻轻地跟我说了句：\n他.........走了.........\n\n我从椅子上站起来，晃了一下，H上前一步扶住我，说：妹子，想哭就哭吧，不能去医院，那些人还在那里呢...........\n我又坐下..........眼泪如泉水般涌上来.........H把端了菜品进来的服务员打发出去.........坐在边上，静静地看着我............哭................\n\nH把我扶回了房间，告诉了儿子爸爸已经走了..........然后让我们母子好好休息，他赶回医院去处理后事.............\n\n儿子和我躺在各自的床上，房间里静极了............我看得到儿子眼角不断有眼泪流下来，他执拗地不出声..............过了很久，天色暗了.......儿子问我：妈妈，中国的葬礼是什么样的？...........我轻轻地回答：会去一个火葬的地方，然后有一个仪式，朋友们家人去告别，有很悲伤的音乐...........他又问：妈妈，那我需要做什么？...........你，\n可能需要跟很多人握手， 有可能还要说点什么，\n你还要去把骨灰盒领回来...............妈妈，我在网上看到 落里，哀乐响起，要跟遗体告别的时候，我已经哭得没有办法站立.........H握住我的手，陪着我最后一个走过去.......又一次........泪眼间，我看到他........安详地闭着那双曾经熟悉的眼睛..........他的嘴里含着一块玉.........\n\nH\n扶着我走出葬礼现场的时候，我已经哭得几乎虚脱，几位女宾扶我坐在院子里的台阶上，她们试图陪着我，我跟她们说：让我一个人哭一会......她们默默地走开了........突然我听到一个男人嚎啕的声音，从花坛那边传来，仔细一看，\n是 H,\n他扶着花坛的墙角泣不成声.........一边哭，一边用拳头拼命地砸着花坛的墙........\n\n我慢慢走到H的身后，递给他一张面巾纸，他接过去......仰面大哭......我把手搭在他肩膀说，轻声说：老哥.......\nH 大声说：.........我.........\n我真想............把他揪起来，我想好好问问他， 为啥？！！！\n为啥嘛！！........为啥他要这样啊..........他凭什么可以\n这样啊..........我不是哭他啊......... 我是哭，\n这人........这人.........为啥啊.............你和娃............凭啥啊............咱们认识了20多年了，\n20多年啊.......\n我看............我看着你怎么走过来的的啊.........他咋能就走了嘛.............\n\nH的哭声让很多人诧异，大家都呆呆地远远地看着我们两，我看见儿子捧着他爸爸的遗像，跟着两位伯伯到后院去，估计去烧花圈了.........过了一会，儿子又捧着遗像走回来我和H的身边.........H\n看到孩子，一把揽过来孩子的肩膀，哭着说：娃，跟你妈走，今天就走，好好待你妈，你妈不易啊.........儿子脸上没有一丝泪痕，让我很意外...........儿子只是轻声说：叔叔，我知道了...........叔叔，谢谢你.............\n\n去机场将近2个小时的路上遇上堵车，儿子在后座上睡得很沉。\nH和我沉默着，偶尔说一两句话.........H 问我，他们给你钱了没？\n我把前一晚大姐给的信封拿出来给H看，又说了一遍大姐说的XXX的事，\nH狠狠地骂了一句脏话........我沉默.........H又问我，他们做得出来，一分钱都不给孩子？\n.............我把我想了一晚上的话说了出来..........孩子爸最后听说是皈依了佛教了......那就按佛家来说吧，\n可能我和他前世有渊源吧，\n可能我这世就是要来给他生个娃........然后一个人把娃养大........可能这样我就还清了前世的债吧.............我也不知道怎么说...........能怎么样呢？........\nH 沉默了一会， 又骂了一句脏话..........H的眼圈又红了............\n我赶快说： 老哥，都过去10年了， 现在我过得挺好的..........\n \n\nH在机场一直送我们母子俩进入安检，看到他在安检外面又一次失声痛哭，我禁不住泪流满面，转头看到儿子，他表情严肃，揽着我的肩膀，却没有一滴眼泪，我心里不禁一紧，\n为儿子担心起来............\n\n(未完）", "excerpt": "下一个\n\n儿子在他爸爸的床前说了很多话，我没有听清楚........记忆中，那个给儿子生命的人，有着我曾经无比熟悉的长长的睫毛，儿子完全遗传了他的眼睛和睫毛.......\n只是那双眼睛始终没有睁开看儿子一眼..........儿子不断呼唤他...", "category": "情感"}, {"id": 6, "title": "前夫的忌日 (一）", "date": "2014-06-10", "body": "下一个\n\n在电脑上敲出这几个字，用了整整一年的时间.........\n\n很多次在心里已经开始写的文字，始终无法在指尖落下........\n\n记忆当中有太多的细节，无法一一描述，却发现记忆已经随着岁月慢慢变得很不靠谱......匆忙中记下去年6月的一些碎片吧...........转眼间又逢6月，当门前的玫瑰盛开的时候，儿子暑假要回到中国的日子快到了.........\n只不过，今年，儿子见不到父亲了........\n\n世上可能有很多超常的事情，只是我们渺小的人无法解释而已.......\n\n2013年伊始，平日很少做梦的我却不断做着一个一模一样的梦：梦里儿子穿着那件平日他最喜欢的绿色的T恤衫，站在一扇飘着蓝色窗帘的大窗户前面，侧身低头看着什么.........每次我都会从梦里惊醒，一身冷汗........\n有几次我试图不醒来，我想看清楚，儿子到底在看什么.....但是没有这个机会..........2013年的早春，我一直被一种莫名其妙的忧虑笼罩着，这个莫名其妙的梦一直让我担心......\n\n2013年6月19日，去多伦多的客户推介会的路上。筹备了几个月的推介会，我是那天的主角。记得那天阳光明媚，微风习习，开着车在高速上听着音乐哼着小曲，手机突兀地响起吓了我一跳。\n号码0044，\n英国的区号，我心里突然就有一种不详的预感.........电话来自儿子的姑父，\n非常简短：儿子的爹在中国突发脑溢血，已经在重症室抢救.......\n\n等我赶到推介会的现场时，手机显示的邮件和微信又多了几条，来自儿子爹的发小的，来自国内朋友的，传来的消息全部都是同样的内容........会场上几十号人等着我，助理也已经开始向大家介绍我，\n我只能将手机静音按照会议的流程开始我的工作.......手机上显示出当初我们证婚人H的手机号的时候，我明白我不能不接他的电话........\n\n停下了正在进行的演示，聚精会神的客户们有些愕然，我拿起手机，很平静地说：各位，我非常非常抱歉，这个电话我必须接一下，现在我儿子的爹在中国生命垂危，也可能这个电话就是告诉我那个时刻到了.........我10分钟后回来，敬请原谅..........\n\n电话里，H告诉我：孩子爹知道你们计划28日回来很高兴，没想到就差这么10天......糖尿病引起的肾衰竭在医院透析，突发脑溢血，已经没有抢救的必要了，现在是用呼吸机维持生命；孩子的伯伯们在医院守候，要不要带孩子回来看一眼，由你们母子决定.........我只是回答了一句：给我24个小时，我需要跟孩子商量..........收了线........\n\n回到会场的时候，客户们都很安静地坐在会场里等着我，一位女客户关切地走过来问我：喝点水吧？\n递给我一杯温水......... 我坐下来，很安静地有几秒钟.........\n我说：我们离婚10年了，他是我儿子的爹，刚刚50岁而已,\n现在只是时间问题了..........听到会场上有轻轻的叹息........我重新再站起来给大家道歉，再次表达我对他们的宽容的谢意............那天的推介会在几个小时后圆满的结束了.......有几个客户临别是特意过来给我一个拥抱，沉默又温暖，让我很感动..........\n\n那天开车回家的路上，阳光比清晨更加明媚。我把车停在高速的休息站上，给国内打了几个电话，又接了几个孩子爹的发小们从美国中国打过来的电话，再跟旅行社确认改机票的可能性，答案是肯定可以改，只是价格昂贵。到家的时候，门前玫瑰娇艳地绽放着，儿子抱着心爱的大猫在门廊里跟邻居聊天.........恍恍惚惚地，我不知道怎么跟儿子提起，默默地做好晚饭.........看着儿子狼吞虎咽，手机的微信不断叮咚着.........真的只差10天而已，我们的签证都办好了行李也打好了，行李里有儿子特意买个他爹的维生素...............我去出差，儿子探望自己的爹还有我的父母，.......\n\n晚饭后我邀请儿子跟我去散步，完全没有一点感觉的大小伙子，一路上还跟我嘻嘻哈哈说着回中国要去见同学的事情.......可能我的沉默终于让我感到了什么，他停下来看着我：妈妈，怎么了？\n你有事情？.......你爸爸病危........\n这个大男孩一如既往地慢悠悠：什么状况？糖尿病昏迷？我接着说：现在这样说吧，脑溢血........如果明天早上我们赶去机场赶上明天的飞机，你可能看到的是你的爸爸活着但是没有任何反应的样子；如果我们等到28号按照原来的计划回去，你可能看到的是你爸爸的遗体或者他的骨灰，你是他唯一的孩子，你来决定怎么办吧...........孩子沉默了很久，说：我明天决定可以吗........\n\n那夜，我几乎没有合眼。20日早上5点不到，儿子轻轻敲门走进来，\n爬在我旁边的枕头上：妈妈，我想今天回去....我想如果我没有看到爸爸会后悔.........枕套上有一圈水印漫开来，我知道那是儿子不想让我看到的眼泪.......我摸了摸儿子浓密的头发，轻轻说：没问题，儿子，妈妈来安排.......儿子继续把脸埋在枕头里，说：妈妈，你可以陪着我吗？我是说，如果爸爸不在了，到医院，还有可能有葬礼吧，\n你能一直陪着我吗？我知道你们分开了，你都不见他很多年了.......\n我抱了抱他：妈妈陪着你，放心吧，我会一直在你旁边的.......儿子把脑袋挪到我的肩膀上，依然执拗地埋着头沉默着不想让我看到他的眼泪，我的肩膀上有暖暖的潮湿漫开来.........\n\n那天的上午，旅行社的朋友一直在为我们争取座位，先去办公室跟老板做了说明，老板过来给我一个拥抱，说你去吧，把孩子照顾好，其他的事情都不要管，我来处理......儿子去了他的学校，校长给了我电话，等我赶去的时候，老师已经安排好了免掉儿子的期末考试.......家里的钥匙交给赶来送我们去机场的朋友，猫咪由他们家带养，银行需要存进去付房贷的支票和卡一并交给他们......\n\n终于我们赶上了当天的飞机.........\n\n我没有通知年迈的父母,\n 怕他们受到惊吓..........儿子一路上都很沉默，到北京机场继续转机飞回故乡........飞机终于落在故乡的时候，已经是中国22日凌晨2点，H\n在机场接上我们直奔医院，重症监护室的护士额外开恩，体恤儿子的跋涉，让他进去看了爸爸5分钟，而我被挡在门外..........病房外见到儿子的两位伯伯和表姑.......等我们拖着行李入住医院附近的酒店的时候,\n天已经蒙蒙亮了.........\n\n22日早上8点，我们尚在酒店补觉，我接到儿子二伯的电话，说已经在酒店大堂等我。有些意外，我下楼，看到他和前小表姑表情严肃地抱着一个大大的文件夹在等我........找到僻静的茶室角落，二位开口，是来跟我谈儿子他爹的遗产问题.......原来人家笃定我是会先提出这个问题的，所以先来找我谈，而恰恰是我一路狂奔没来得及想的问题..........我静静地听着，大意是说：没有遗产，只有外债；儿子爹的公司已经找人介入去清算了，即便有任何余款也要先偿债..........要我表态是不是要插手公司的清算（我依然是股东之一），清算的时间可不会短........文件夹里的文件是带来给我看的借贷文件，人家不想落个骂名说一笔糊涂账..........\n\n我问了一句：房子呢？\n那边说：没了，被卖了，150万的房子卖了40万......我说：那房子没有还完贷，贷款有我的名字，怎么卖的？ \n那边说：不知道.........我问了一句：怎么会这样？........那边还是一句：不知道...........\n二伯给我讲述了他弟弟最后的这些日子，糖尿病引起的并发症，肾衰竭，后来透析，怀疑是透析的医院用血液稀释药品剂量过大引起的脑溢血，但是没有办法证明是医疗事故；在医院现在用呼吸机维持生命就是烧钱，每天费用大概2000加币.......\n\n约莫午饭前后，儿子微信我说醒了，饿了。在酒店的餐厅，我、儿子的二伯表姑一起刚刚坐下，手机响了，说医院那边要见家属，情况有些危急，只好匆匆扔下菜单，一起赶往医院..........到医院，H已经在那里了，他不放心我和儿子，赶过来看我们。\n医生说这样的状况已经没有维持的必要，要家属定夺是继续烧钱，还是放弃.......\n儿子的小伯把儿子推到医生面前，说，这是他儿子，让他来决定吧。\n H闻声跨了一步，挡在儿子前面说：娃才16岁，你是要让娃背一辈子的阴影吗？\n我一直拉着儿子的手，儿子高高大大地怔怔地站在一群比他个头低不少的大人们中间，\n我突然注意到他竟然就穿着在我梦里出现过很多次的绿色的T恤衫...............H把我和儿子拉出医生办公室，对儿子的二伯厉声说，你们是大人，你们是他兄弟，你们定！不要为难娃！\n\n重症室外全是等侯探视的家属，大家等着3：30分被允许进去探视病人。\n陆续我看到儿子爹的同学同行同事来到，很多老面孔认出了我，自然也认出了儿子，过来跟我们打招呼，有几位年长的看到孩子眼泪就没停。\n更多当年公司的老同事来跟我握手，唏嘘着十年没有我的消息......\n\n二伯过来跟我说，跟医生谈过了，让儿子在允许探视时间之前单独进去监护室跟爸爸告别，之后就要由他们决定怎么办了;\n儿子的大手一直拉着我的手，说了一句：我要跟妈妈一起去....二伯又去跟医生交涉，说孩子未成年，最后得了准许.........\n\n儿子拖着我的手慢慢走近爸爸的病床边的时候，我的泪水已经无法阻挡了.........\n\n那一刻，我看到蓝色的窗帘飘起，儿子绿色的T恤，和他低着头凝视的样子...........\n\n(未完）\n\n [打印 ]\n\n [加入书签 ]\n\n![](media/image1.png){width=\"1.375in\" height=\"0.3645833333333333in\"}\n\n [编辑 ]\n\n [删除 ]\n\nTop of Form\n\n         -=选择论坛=-               \n 房地产经 妙手家园 文城往事 海外原创 书画艺廊 财经频道 网上谈兵 时事述评 我的中国 两岸交流 想唱就唱 移民论坛 难得一笑 脑筋急转 体育看台 大千股坛 奇闻怪谈 星相卜卦 婚姻生活 私房小菜 亲亲宝贝 宠物乐园 健康养生 流行时尚 爱的星空 爱车一族 我爱我家 世界风情 职场生涯 几曾回首 大学春秋 闲趣谜语 文化走廊 品茶小轩 音乐快递 武侠军事 跨国婚姻 影视人生 回国发展 生于70's 法律咨询 人在北美 人在澳新 人在欧洲 人在日本 人在狮城 人在英国 人在法国 人在德国 人在香港 人在韩国 中南美洲 实用电脑 电玩高手 摄影沙龙 子女教育 诗词欣赏 百家杂谈 美语世界 AI\n潮流社 投资理财 人到中年 书香世家 财富智汇 运动健身 科学天文 常青人生 \n    \n\nBottom of Form\n\n阅读 (7153) ┆ 评论 (4)", "excerpt": "下一个\n\n在电脑上敲出这几个字，用了整整一年的时间.........\n\n很多次在心里已经开始写的文字，始终无法在指尖落下........\n\n记忆当中有太多的细节，无法一一描述，却发现记忆已经随着岁月慢慢变得很不靠谱......匆忙中记下去年...", "category": "情感"}, {"id": 50, "title": "六四 青春祭 (1) - 风云初起", "date": "2013-05-29", "body": "下一个\n\n生活像旋转木马一样，按照一定的秩序不停地转着。每天，上班下班，孩子房子车子，照顾后院的菜地，问候远方的父母。偶尔抬头看看蓝天白云，会想起过去二十年的种种，不知觉地在这个季节，想起了89年的那个夏天。\n\n那个时候上大三，学着英国文学，沉浸在莎士比亚，海明威，欧亨利的小说里不能自拔，一边期待着21岁的生日，一边跟自己的老师隐秘地约会，懵懂地琢磨着爱情到底是个什么东西。4月的某一天，学校开始有了大字报，中文系和哲学系的才子们开始辩论。20岁的我，对国家前途，经济改变，民主运动完全处于无知的状态。\n听了半天的辩论，就听明白了1件事，总理姓李，总书记姓赵，实在不明白那些东西跟我自己有什么关系，于是，转天脑子又回到26个字母和那些美妙的小说情节里去了。\n\n再后来，到了5月份的一天，来自美国的外教突然说他的家人要他回国，他必须走，给我们班的同学留下了2大麻袋的英文原著，和很多本圣经，然后满眼泪水地离开了。班上有激进的男生女生去北京串联，同学们乐得不上课每天去参加各种集会和游行，\n用宿舍里一个革命理想主义女生的话说：\"我感觉到一场革命的暴风雨即将来临！\"。\n\n革命的暴风雨是不是要来了，我根本没有感觉，倒是有一个比老师恋人更成熟的男人闯入了我的生活，让我在他和自己秘密恋爱的老师之间徘徊起来，政治依然离我很远。\n\n5月中旬，下课回到宿舍楼下，看到很多人聚会。我们都停下来观看，原来是学生自治联合会在号召大家去参加绝食团，参加绝食团的每个学生都有一个黄色的头带，上面有红色的大字：\"绝食团\n\"。\n用时下的话说，绑在头上来看着挺酷的。同宿舍的女生都去围观，我饥肠辘辘的惦记着那天大食堂供应蒸鸡蛋，径直回了宿舍楼，同宿舍的女生喊我帮她们把饭盒带下来。我们一个女生宿舍住8个人，我年纪最小，经常被按照年龄派出去跑腿。等我拎着8个巨大的饭盆从5楼狂奔下来，楼下冷清了很多，也找不到任何一个我们宿舍的女生，一打听才知道，绝食团已经往政府所在的中心广场去了，而我们宿舍的其他7个女生都宣了誓，头上绑着黄带子跟着绝食团走了。\n\n那一天的食堂里很冷清，一个瘦瘦高高的女生，拎着8个大饭盆，坐在角落里独自吃完了4两米饭，2份蒸鸡蛋。\n那天下午，本来是跟中文系一起上唐宋诗词的大课，大教室里只有不到10个学生。等了半个多小时，老师也没有踪影，有同学进来说让我们别等了，他看见那个坚持认为用陕西土话念唐诗最有韵味的老师脑袋上绑着黄带子跟着绝食团走了。\n我们只好回宿舍。\n\n晚上，同宿舍的女生一个都没有回来，学生自治会在宿舍楼下征集棉衣，军大衣据说要给绝食团的同学送去让他们打地铺。我在架子床之家爬上爬下地把全宿舍的行李箱翻了一遍，把每个女生的棉大衣都綁上布条写上名字给送了过去。那个夜晚，平日热闹的宿舍只有我一个人，安静地有些恐怖。多年以后，翻看那个时候的日记，那天晚上我在日记里写的是\"雪她们得饿成什么样啊？（雪是我们宿舍跟我一样极其好吃的一个青海女生）是不是我不参加绝食，她们回来会不理我啊？\n可是我真的很怕饿，我实在不是能绝食的人啊。算了，还是不去绝食，政治觉悟再高，我也得吃饭啊..........\"\n\n绝食团离开校园后2个晚上，都是我一个人守着空空的宿舍，白天根本没有老师给我们上课，偶尔跟男友到碰不到熟人的地方去散步，然后就是到校园后面的商业街上去溜达。到了第三天，我终于忍受不了对同宿舍女生的思念，从郊区骑着自行车奔中心广场去看她们。到了广场，只看见广场周边的自行车铺天盖地，原来那些收钱看自行车的老头老太太却都不见了。停好车，我在广场里到处飘扬的旗帜里找了半天，终于找到了我们学校的大旗，直奔过去。到近处一看，我们大学的绝食团在广场最中心的地方，黄色的警戒线已经围起来。绝食团的同学们在毒辣的阳光下，一个个东倒西歪，脑袋上依然扎着醒目的黄布条。也不知道怎么了，一看见这景象，我的眼泪就哗啦啦忍不住掉下来。\n绕着警戒线，我泪眼婆娑地一个个地找，希望能找到我们宿舍的女生。\n突然就看见了雪，她脸色蜡黄，眼睛紧闭，无力地靠在另一个同学的肩上。那一瞬间，我终于忍不住了，大喊了一声\"雪呀！你怎么了？\"\n里面的同学被我这么一喊，都看过来，雪那个时候也睁开了眼睛，对着我微微抬了一下手，突然身体往后一仰就倒下去了。警戒线这边的我已经哭的不成体统，旁边有个老太太赶忙过来把我扶住，我爬在她肩上放声大哭。那个时候，我的恐怖特别单纯，我怕她们都饿死了，我们宿舍就剩我一个！\n\n很快，救护车拉着警笛冲过来，电视台摄像机还有学生记者也冲过来。雪被送上了救护车，我因为哭的已经上气不接下气，也被塞进救护车，送回了我们大学的校医院。\n还记得那天的新闻里面，第一次报道了学生因为绝食引起昏厥，被送进有关学校医院。用我们同学的话，第一个进医院的绝食团员，不是被饿晕的，是被外语系的一个女生给哭晕的！以至于后来的很长一段时间，在食堂里会听人说：看！那个就是哭晕绝食团的女生！\n\n而我在过了好几天以后才想起来自行车还在广场上，回去找的时候已经想不起来具体的位置，只好在广场那些无人认领的自行车里随便推了一辆没有锁的回了学校。\n\n父母对我的看管很严格。为了逼我每个周末回家，他们只给我够一周的生活费，这样以来，到了周末，我就必须回家报到领钱，否则下周只有饿肚子。5月底的一个周末，照常回家，和平日一样享用了妈妈烹制的美味佳肴，正要跟高中的好朋友们出去玩，被父亲叫住。父亲表情凝重地问我，在学校有没有参加静坐和绝食。我很老实地回答，我没有。父亲不相信，说：\"你们同学都去了，你怎么不去？\"我的理由其实很简单，我怕饿！\n我挨不了饿啊！饿了我就会晕倒，你又不是不知道？！ 父亲笑了。\n这是我们家一个良好的遗传基因，低血糖，低血压，第一不能熬夜，第二不能挨饿！否则，就会出现晕眩症状。\n父亲当然很清楚。他听我这么说，放心了一些，但还是忍不住要说几句：\"孩子啊，你也知道你老爹被共产党的牛棚关了10年，身上被共产党打得疤比解放战争打仗得疤都多。\n共产党善于秋后算账的，你可千万要吸取教训，任何时候都不要失去冷静，别人做什么热血沸腾的事，你千万不要参与！\"\n\"爸，现在是学生运动，又不是文化大革命，根本不一样！\"\"孩子啊，没有什么不一样的！咱们家在政治上再经不起折腾了，我们这一代经历过了的苦难，可不想我们的孩子再去经历啊。\"\n虽然心里觉得他们挺可笑，我还是使劲地点头，千万个保证，让老爸和老妈放心。\n\n那个时刻，父母和我都没有想到，10多天之后，我离开他们踏上了逃亡之旅。", "excerpt": "下一个\n\n生活像旋转木马一样，按照一定的秩序不停地转着。每天，上班下班，孩子房子车子，照顾后院的菜地，问候远方的父母。偶尔抬头看看蓝天白云，会想起过去二十年的种种，不知觉地在这个季节，想起了89年的那个夏天。\n\n那个时候上大三，学着英国文学...", "category": "历史记忆"}, {"id": 51, "title": "六四 青春祭 (2) - 生命如此脆弱", "date": "2013-05-29", "body": "下一个\n\n2013年2月，在温哥华出差。这是第二次到温哥华，回想起来第一次在温哥华机场过境竟然是十年前的事情，那次旅行的记忆在我落地温哥华的时候鲜活地回到眼前。年轻的时候，十年，是漫长的；人到中年的时候，十年是短暂的，不过是一捧细沙从指尖落下的时间。因为对着十年的感叹，故地重游，一定要去温哥华走走。\n\n繁忙的工作之外，在一个阳光冲破乌云的下午，有幸去了Stanley\nPark。那个环绕着海滨的公园里，满是闲散的游人。依稀有些凛冽的空气里，满是早春的气息。远远望去，温哥华的高楼参差在镶着金边的白云下，云层间有蓝色的天空隐现，海滩上枯木和礁石与渐灰渐蓝的海水呼应，遥远的海面上轮船慢慢地行驶.......,\n很久没有过的感受涌上来........生命其实就是这些吧，可能是自己老了，面对良辰美景，已经感觉不到诗情画意,\n在生活得麻木了很久之后，能感觉到的只有生命的震撼。\n在海滩上挑了棵枯倒的大树坐下，面对着大海，静静地，十年，十年，十年这两个字不断敲击着我的脑袋。十年，面前的景色不会改变，但是我会在哪里？十年，十年前同行的人，已然切断了所有的联系，今天同行的人，十年后又会如何？生命，是如此多变，如此莫测，这就是生命中最精彩的部分？\n\n可能真的是老了，怀旧的情愫很重。在温哥华海滩上的那个下午，记忆蓦然回到了30年前......\n\n1983年的春天，在一个中等城市里，住着一群大院里的孩子。大院是当时中国少有的外资企业的生活区，有医院，有电影院，有学校，有上百座家属楼，有直通大院的专用公路和铁路，甚至于还有一座当时很少见的涉外三星级酒店，在这座酒店里住的都是来自日本和美国的专家们，为了他们酒店里配备着先进的健身房和卡拉OK设备。\n\n生活在这个大院里的孩子们，如果没有特别的需要，根本不需要走出大院，何况孩子们也不愿意走出大院，因为繁华的市区跟这所大院里的建筑比起来，除了拥挤，根本没有任何可以羡慕的地方。83年高中班是大院学校里第一批高中生，我算是高中班里的元老级人物，因为我从80年大院开始破土动工学校开张只有20多个学生的时候，就在那里混了，而其他很多同学都是82年才大批转入大院附中初中班的。\n\n在83级高中班里，有一个男生，叫文，他的妈和我的妈在大院的医院是同事。文的父母都是四川人，爸爸是企业的中层干部，妈妈是医院的药剂师。在那个男女生界线极其清楚的年代，我和文打交道的机会并不多，但是因为我们的妈妈同在一所医院工作，我经常从妈妈的嘴里听到文的事情。\n那个时期的我，文很不入我的眼，因为他总是喜欢把学校里发生的事情，全盘去跟他妈诉说；而我恰恰相反，学校发生天大的事情，正值逆反时期的我，绝对不跟父母说。\n\n初中三年，在大院的初中部，我是出类拔萃的尖子生，却不是老师喜欢的好学生。我爹妈最高兴的事情就是去开家长会，被各路家长围着打听教子之方，那个时候爹妈最得意的一句话就是：\"我们家孩子压根就不学习，在家每天都被我们批评，她真的不学习！\"。我爹妈说的是真的，那个时候我最忙的事情不是学习，而是养猫，养兔子，养蚕，养所有我能找到的东西，包括蜗牛；\n再有跟一群打群架的大院以外在我们学校借读的建筑工人子女打成一团，跟人家搂草为炉拜把子，然后人家去打群架，我在边上看书包；这些工人阶级的子女们喜欢我，是因为她们的作业基本上都是抄我的，尤其是数学；暑假我去大院游泳池当救生员，不要钱的那种，就是为了把这群拜把子姐们在游泳池散场后放进去，我们在里面大闹天宫......\n\n和我的顽劣比起来，文这个男生，虽然学习成绩比不过我，却是一棵老师骄傲并且重点培养的苗子。\n文酷爱做好事，无论该不该他值日，他总是在打扫卫生；但凡年级有个活动，文一定任劳任怨在幕后当英雄。初中三年，文总是被作为优秀干部，三好学生被推到台上去讲话。文的妈妈酷爱在医院宣传她儿子的好人好事，尤其喜欢去跟我妈八卦。每次听到我妈回家来赞扬文，我就知道我妈的潜台词是要希望我能跟文作个\"好学生\"。\n整个初中三年，我和文不是一个班的，文的妈妈八卦的只是文班上的事情，我还能瞒天过海。一想到了高中，文竟然和我一个班，想想我妈和他妈一起八卦，我的脑袋都大了！\n\n高中新班级分班的第一天，个看到文的时候，狠狠地瞪了他一个白眼，弄得他莫名其妙。而我们正式的高中同学生涯就从那个白眼开始了。\n\n高一那一年，我和文相安无事。他继续作老师的红人，我继续当老师眼里的刺头。不过文跟我还算默契的一点是，他并没有把我的八卦传给他的妈，比如恶作剧，比如旷课，比如小考敢交白卷因为那个老师嘴巴有口臭，比如惹怒了老师被撤了学习委员。我爹妈在期末家长会之前，一概不知道。\n\n高一结束的时候，我做了平生最大的一个决定，放弃数理化，改学文科。那个时候的梦想很简单，看新闻联播里外国元首到访的时候总有穿着套裙的女翻译在场，我觉得那职业很是光鲜和高尚；那个时候我沉浸在\"三毛\"的书里无法自拔，三毛的一篇\"西风不相识\"让我对去另外一个国度探险充满了向往。\n于是，考文科-学外语-当翻译-出国去探险貌似很有逻辑地在一个16岁女生的心里生了根。\n在高二下学期结束正式分班的时候，我把课桌搬进了文科班。当时所有的老师都惊讶我的决定，那个年代还是\"学好数理化，走遍天下都不怕\"横行的时候，一个理科班的尖子生，去了文科班\"looser\"们集中的地方，老师们都觉得我疯了。就在我还在思忖怎么跟爹妈说这件事情的时候，我竟然看见文搬着他的书桌也走进了文科班的教室。\n\n那个年代的男生和女生，还没有琼瑶阿姨的熏陶，没有那么多柔情似水地沟通。在文科班的第一天，我满脑子转的都是怎么警告文，不许他告诉他妈我来了文科班的事情，我知道如果爹妈知道了这个决定，会有场灭顶之灾，因为他们一直希望我能象妈妈一样做个好医生。下课的时候，我在教室门口拦住文。还记得当初我是这么说的\"我跟你说啊，不许告诉你妈我在文科班，不然，不然,\n不然.......\"\n我当时语塞了半天，没想出来他要是真说了，我能怎样。还在\"不然。。。\"的时候，文一咧嘴，露出一口好看的白牙，越发衬得他的脸黑了，说\"你先保证不跟你妈说，因为我妈也不知道，他们要是知道了，得揍我一顿！\"我一愣，随即也笑了。\n\n两个少年，在那个时刻起一起守着一个有关彼此的秘密。我们甚至开始给对方打掩护，编出各种故事来糊弄我们的爹妈们。这个秘密在85年12月终于被捅破了，捅破的人是我们的班主任，她去医院拿药，碰上了文的妈妈，三两句话之后，文的妈妈怒发冲冠，直奔学校去了，文在众目睽睽之下被押解回家。那时刻，我基本上已经也知道了自己的命运，忐忑不安地过了一个晚上，第二天下午，果然在班主任的办公室里看到我的爹妈。文的下场是被爹妈一顿臭揍，我的下场是被禁止看电视，一周内禁止跟爹妈说话，爹妈的审判如下：如果当年考不上重点大学，第二年复读必须滚回理科班。\n\n之后的那一周，两个企图瞒天过海的少年见面的时候又笑了。青春真是美好，我们俩那个时候的笑是风雨过后初见彩云的感受，跟喜儿逃离黄世仁家的感觉差不多。因为男生女生界限很清楚，文和我没有更多地交流。今天回忆起来，我在高三的时候无端地经历了很多多愁伤感的情绪，已经完全脱离了初中时代的鲁莽，而那个时候的文在我记忆中，是一个在足球场上又黑又瘦又高还没有长胡子的傻小子。\n\n86年的夏天，在记忆当中无比炎热，无比烦闷。高考后的日子，我一直在估分，算分，自己感觉考得很好，可是不敢跟老师说，怕老师觉得自己太张扬。等估分结束，报志愿的时候，我在志愿栏第一志愿里填上了\"北京大学\"，跟去文科班一样，没有告诉爹妈，不过我告诉了文，因为我知道文也报了北京的另一所大学。班主任大人从文科班分班我敢瞒着爹妈的事情上吸取了长足的教训，直接拿着志愿去了妈妈的办公室。妈妈大人在我的志愿上抹掉了一个字，又添上了一个字，这次，她和班主任也没有告诉我。\n\n高考成绩快要出来的那几天，我一直在大院之外的各个拜把子姐妹的家里溜达，心情时而上了房顶，时而落在沟里，因为偷偷地报考了北京大学，又怕自己估分失误，每天浑浑噩噩，跟着几个初中毕业就辍学在建筑公司混生活的初中死党混，听她们各种谈恋爱，钓男生的故事，还跟着她们喝了几次酒。那个时候的她们，一直象保护妹妹一样保护着我，用她们的话说，她们已然是堕落了，而我是她们品学兼优的旗帜，一定不能让我堕落。三十年前，我那些初中死党的姐妹们，现在已经完全失去了联系，那些日子也已经模糊，当年她们对我的情分一直在心里珍藏着。\n\n高考结束后的日子，我妈下班回来就会对文赞不绝口，因为文在医院里出了点小名气。文的姥姥一直跟文一家人一起生活，年纪大了。就在高考刚结束的那天，文的姥姥脑梗进了医院后来虽然抢救过来却偏瘫了。文为了让父母不要太劳累，一个人在医院的病房里照顾姥姥，一时间在整个医院传为佳话。那个时候我体会不到照顾病人的艰辛，对文的壮举根本不屑一顾，听着父母每天唠唠叨叨地赞扬文，全当是耳旁风。\n\n一个炎热的下午，我从大院外面回来，走到楼下，突然看到文从我家的楼门里走出来，他满头大汗。看见我，没有任何以往的羞涩，他直接冲到我面前，声音都激动得变了，他几乎是喊着对我说\"你是全市第二名，你可以上北大了！\"\n我愣愣地看着他，完全没有反应。他挥舞着手里的一张纸，大声说\"我也过了重点线！我们都可以去北京了！\"。我抢过他手头的纸，看到文科班的名单，和每个人的分数。我的名字后面被重重地打着一个红色的记号。\n\n那个时候后来的记忆已经模糊了，只有一些碎片记载着那天的晚饭。不知道为什么，爹妈还有姐姐哥哥都好像很假，我体会到他们很高兴，可是不知道为什么空气中弥漫着一种紧张，一种虚伪。姐姐和哥哥吃完饭撂下碗筷撒腿就跑了，好像后面有什么可怕的东西在追他们一样。只剩下爹妈和我在家里的时候，那种诡异的感觉更强烈。后来，终于，妈妈拉着我坐下来，说要跟我谈谈。再后来，就是妈妈几乎是带着哭声告诉我，她和班主任两个人擅自改了我的志愿表，我肯定是去不了北大了。妈妈说，她一直不相信我能考上大学，因为直到高考的那天我还在抓兔子玩；她觉得班主任说的很对，能考上北大的都是学习及其用功的孩子，我太贪玩，就是考上了也未必念得出来，就这样她听了班主任的；不过我肯定能上她为我挑的那所也是重点的大学。我当时什么反应，这么多年过去已经不记得了，后来听妈妈说，她和我爹就怕我突然哭喊或者尖叫，但是我没有，只是默默地坐了一会，然后回了自己的房间倒头睡了。\n\n文接到北京那所大学的通知书的时候，又一次来到我家。我们俩第一次去了大院电影院边上的一个时髦咖啡屋。文完全不知道我根本没有任何可能去北大了，他来找我是想商量一起买车票，一起去北京的事情。在那个放着邓丽君歌曲的小小咖啡屋里，有红绿色的彩灯不断在变换着颜色，我在咖啡厅里嚎啕大哭着告诉文我去不了北大的消息，把文吓坏了。现在回想起来，在爹妈面前没有释放的悲愤，在那个时候全部宣泄在文的面前。文一直在说的两句话就是\"你妈怎么能这样？老师怎么能这样？\"。我们俩那天在咖啡店里一直呆到店主要关门，文送我回家。到楼下的时候，文说\"那我自己去北京了。走的那天，你别来送我。如果将来你到北京玩，我一定会好好招待你。\"\n\n文走的那天，我真就没有去送他。那个时候我已经接到了妈妈给我选择的大学的通知书，爹妈在庆幸最小的闺女可以在家门口上大学的时候，我在心里已经把那张通知书唾弃了几千次。\n\n上大学的三年里，不断接到文来自北京的信件。可能因为文远离了故乡，而我还在家门口转悠；也可能是因为我与北大失之交臂，文对我充满了同情，文给我写信非常频繁。大二的时候，我几乎每隔一周就能收到文的信件，同宿舍的女生都认为我和文会成为异地恋人，我自己却很清楚，文和我之间是纯得没法再纯的哥们姐们关系，因为那个时候文跟我探讨的最多的是，他怎么才能追到那个他心仪的师妹。\n\n文那个时候上的一所和政治紧密挂钩的大学，他大二的时候就入了党。中学同学们在去外地上大学的同学回来的时候，在一起聚会过几次。文每次都是大家的中心，被同学们起了个外号，叫\"文书记\"，因为他根红苗正，未来肯定是个当官的料。\n89年4月份开始，\"文书记\"给我的信件没有以前的频繁，话题也不再是那个师妹，而是更多的关于国家的前途，关于自己的前途。89年的5月，那个时候我忙着跟老师谈着恋爱，又被另一个比老师还要成熟的男人吸引着，漫天遍地的大字报，旷日持久的游行，绝食，我的生活被各种从未有过的惊奇与新鲜包围着，\"文书记\"竟然很久没有给我写信的事情，我根本就没有注意到。\n\n89年的6月4日，在北京发生了什么，到底发生了什么，我并不知道。到今天我还是不知道，直到20多年后当年天安门广场上的女英雄那段知名的视频被曝光，我在惊讶她当年的世故的时候，还在思忖，那天的广场上到底发生了什么？\n\n我只是知道，\"文书记\"在那天凌晨失去了年轻的生命。", "excerpt": "下一个\n\n2013年2月，在温哥华出差。这是第二次到温哥华，回想起来第一次在温哥华机场过境竟然是十年前的事情，那次旅行的记忆在我落地温哥华的时候鲜活地回到眼前。年轻的时候，十年，是漫长的；人到中年的时候，十年是短暂的，不过是一捧细沙从指尖落...", "category": "历史记忆"}, {"id": 52, "title": "六四 青春祭 （3） - 广场上的记忆", "date": "2013-05-29", "body": "下一个\n\n89年的6月4日，电视播放着的是正义的人民军队镇压暴徒，短波收音机\"美国之音\"里听到的是坦克车进入首都的一场屠杀。远在几千公里之外的大学校园里，上万名学子宁愿相信VOA的报道，也不会相信一国总理的义正言辞。6月5日，我所在的大学，以及临近的几所大学上万名学生们抬着几具棺材上街，那是89年4月以来最大规模的一次游行。很多年轻的黑发绑上了敢死队的黄色布条，那是我记忆最深刻的一次游行。将近10个小时，上万人的队伍沉默地走着，没有往日的口号，没有喧闹。沿途的民众比往日更多，记得我看到过很多泪流满面的老人家，还有表情凝重的叔叔阿姨。游行队伍通过的地方，还有一些已经工作了的师哥师姐在给我们发放传单，传单上是他们从传真机上收到的北京被屠杀学生的尸体照片，香港媒体的文字报道。\n\n6月6日，大学封了校门，不允许任何没有学生证的人员出入，我们被堵在校园内不得外出。在那天，我不知道爸爸和妈妈是怎么进来的，但是他们竟然出现在我宿舍的门口，他们太担心我了，在那个时刻，决定要冲破一切阻力把我带回家。\n妈妈帮我收拾好行李，带我离开的时候，同宿舍其他的几位女生都很沉默地看着我，因为本来那天的晚上，被堵在校园里的同学们要在校内举行更大的聚会，而我的离开简直就是一种背叛。可是爸爸威严地站在宿舍门口，根本没有给我任何可以商量的余地。我只好跟着爸爸妈妈往校门口走。\n\n到校门口的时候，我才知道整个市区的公共交通都中断了，各个十字路口都横着公交司机们自发开过去的公交车，道路已经完全不通了。爸爸妈妈和我在公交车站茫然的时候，我看到了杨\n--\n那个非常吸引我的比我的老师男友更加成熟的男人，他在校门边试图说服门卫让他进去。他也看见了我，当然他也看见我的爸爸妈妈，那个聪明的男人，没有走过来跟我打招呼，只是很远地冲我做了一个V的手势。最后爸爸决定步行走出城区，再想其他的办法回家。我只好跟着父母离开，回头看到杨推着自行车一直目送着我们。\n\n认识杨的时候，他已经毕业工作很多年了。\n我只知道他比我大8岁，他是回到母校投身火热的学生运动，帮助同学们写大字报调短波收音机的来的，因为他的专业是无线电。杨很文弱，个子高我一头，总是收拾得很清爽的样子。怎么认识杨的，已经不记得了，只是因为认识了杨，他来过我们宿舍几次，我们宿舍的女生都非常非常喜欢他。舍友们都在跟我说，我和杨站在一起的时候很般配，而我的那位老师男友个子上并不匹配我的高度。杨从一开始他就知道我有男朋友，他经常过来给舍友们干点杂活，有时候看我们游行结束累了，他会买点小吃来\"慰问革命小将\"，所以我很懵懂地认为他就是跟我们有交情的大师哥而已，可是明眼的舍友们都在跟我说，杨是冲着我来的，因为杨总是背着我跟她们打听我和男朋友的事情。\n\n89年春天的那几个月，我的老师男友在忙着研究生论文答辩，他的父亲，一位饱受共产党磨砺的老教授对他再三警告不得参与学生运动，所以他很忙，很少来找我，也绝对不会和我一起去参与任何游行聚会绝食。杨从舍友们那里了解了我的行踪，总是在我单独行动的时候出现在我的视野范围，很温和地让我跟着他。因为杨从来没有试图表达过任何亲密的言辞，我就堂而皇之地和他在各种游行集会演讲中晃着，自己跟自己说，我们就是革命同志，绝对跟爱情无关。\n\n6月6日夜色降临的时候，我和爸爸妈妈才辗转回到大院的家里。到家的时候，文的妈妈在我们家焦急地等着我们。文的妈妈是来看看我是不是有文的消息，因为文已经有将近一周没有联系他们了，没有信件，也没有电话，文的爸爸办公室有部电话，文懒得写信的时候会给爸爸打电话。看到我并没有文的消息，文妈妈更着急。看着她的样子，我的心里有种很不安的情绪弥漫起来。\n\n文妈妈走了以后，我跟妈妈说我要去找在值夜班的姐姐，既然回到家了，妈妈很放心我在大院里晃荡，我一路小跑奔姐姐的办公室去了。姐姐那个时候在那所唯一的涉外酒店工作，她工作的地方是电话交换站。我要去看姐姐的目的，是我知道姐姐那里可以打长途。我想去给文打个电话，明天告诉文妈妈，让她不要那么担心。\n\n以前我在姐姐工作的地方和文通过电话，所以姐姐很容易就拨通了文所在大学宿舍楼门房的电话。以前接电话的是个带着河北口音的老大爷，只需要告诉他宿舍号和姓名，他就会去叫文来。\n我听到电话接通了，按照惯例马上说：大爷，你好! 麻烦你帮我找一下XX房的文！\n那边传来一个很年轻很严肃的声音，问\"你是谁？\"，我愣了一下，说\"我是他同学，我打的是长途。\"\n电话那边沉默了一下，紧接着变成了忙音。我不甘心，过了一个小时，又让姐姐拨通了一次，这次是那个老大爷接的，我又说了一遍，那个老大爷好像很为难地说犹豫了一会，说\"闺女，你不要再打了。\"我不明就里，只好说\"大爷，以前你帮我找过他的，你记得吗？\"，大爷又沉默了几秒钟，语气很沉重地说了一句\"闺女，他不在啦！\"就挂了我的电话。\n姐姐和我对大爷最后的这句话，完全没有领会，但是大爷语气的沉重，让我和姐姐都感到害怕。姐姐说，是不是文出事了？\n我一下子跌坐在椅子上，嘴里说着，不会，不会，他不会的，他不会的............\n\n那天晚上我一直陪着姐姐值完夜班然后一起回家，到家的时候爸爸妈妈还没有睡，炎热的天气，中央台和\"美国之音\"相互矛盾的报道，让全家人都感到一种恐惧。爸爸感叹着说研究生已经毕业的哥哥在部队里，应该不会跟学生们上街，而我已经被他们领回了家，多事之秋，家人平安才是最重要的啊。妈妈看着我和姐姐一起回来，长舒了一口气，告诉我从现在开始不许回学校，不许离开大院。我和姐姐心里对文有很多的担心，就跟妈妈说了我们打电话去找文的事情，妈妈说我们肯定听错了，文可能是搬到其他宿舍去住了，文是那么听话的孩子，肯定不会有事的；末了，妈妈还来了一句，\n你小子要是当初去了北京念大学，估计这次肯定被枪子崩了，现在想想老天有眼，让我改了你的志愿！\n\n6月7日，8日，9日，不记得那些天我干什么了。姐姐在上班的时候又试着打过几次电话，文宿舍楼的电话却从未再有人接起过。姐姐把这些消息带给我，可是我不敢去跟文妈妈说。\n\n6月10日的上午，家里热得要命，我在房里昏睡，突然听到楼下有人叫我的名字。探头一看，是一群没有考上大学留在大院已经上班的同学，还有两个陌生的面孔，但是是学生的样子，总共大概有10多个。\n我赶忙下楼，大家好像都很严肃，只是说让我跟他们一起去趟文的家。\n那两个学生模样的年轻人看起来很疲惫，表情很严肃，衣衫有些凌乱，我对他们的到来隐约感到些什么，却说不明白。到了文家楼下，才发现那里已经聚了另外一拨中学同学，大家都很沉重的样子。\n\n大概大家到的差不多了，才有文的一个最要好的朋友开始说话，他介绍说，那两位学生样子的陌生人是文的大学同班同学，从北京来，是给文家人报信的。来的时候才知道，文的父母被公安处通知说文病重，要他们去北京，文的父母已经赶去北京。这两位同学到了之后四处打听文的中学同学们，终于找到了我们。轮到这两位同学开始讲话的时候，声音沙哑，眼睛已经红得分不出是疲劳还是悲伤，大家为了听清他们的话，就往前凑，我站得比较靠后，没有听到完整的情况，却看见有几个女同学已经开始痛哭，男生也都开始咬住嘴唇变得很沉默。\n终于我明白，文真的已经不在了！\n他作为学生团支部书记，受命去广场说服本校的学生撤退，却被子弹击中.........\n\n不记得我是怎么回到家的，文就这么走了？ 就这么走了？\n我在那个时候没有掉眼泪，只是在心里并不相信这一切都是真的，或许，文真的只是病了？\n\n中午，爸爸妈妈下班回来的时候，也带回来了文妈妈已经去了北京的消息，他们听说的是文病重。\n我跟爸爸妈妈说了文的同学告诉我们的消息，爸爸和妈妈开始为文的这两位同学担心起来，让我赶快去问问其他同学，看这两位北京来的学生是不是有地方住有地方吃，不然就接他们到家里来。正说着的时候，楼下又听到有人叫我的名字，爸爸妈妈跟着我一起下了楼。\n到楼下一看，是几个同学叫我一起去离家里不远的广场上，他们说同学们都已经在那里集合了。\n爸爸妈妈也顾不上吃饭，就跟着我们一起奔广场上去了。到了广场，看到文的毕业照放大了，两位男同学捧着，周围的几个女同学在给大家发放白色的胸花。\n同学们要给文开追悼会，而为了给文家人报信来的那两位北京的学生已经离开，他们还需要去另外的一位死难同学家里报信。\n陆陆续续地，有中学低年级的同学送来了花圈，有曾经教过我们的老师们送来了花圈，还有和文一起踢球的年轻的工人们送来了花圈，广场上的人越聚越多。下午的时候，同学们决定捧着文的遗像，带着文在大院里他曾经驻足过的地方，让文再看一眼他生活学习过的地方。\n\n纪念文的游行队伍就这样出发了，男生们捧着放大的毕业照、花圈，女生们默默地佩戴者白花，轻轻地啜泣着，跟在后面.........我们走过学校，走过足球场，走过电影院，走过那间我和文曾经去过的咖啡屋........我们走过的地方，有认识我们和文的爷爷奶奶，叔叔阿姨，哥哥姐姐，弟弟妹妹们陆续地加入进我们的队伍............\n\n很多年以后，因为父母还住在那里，我不得不经常回到大院里去，每每走在大院里，\n89年那个炎热的下午，\n几十个20岁刚出头的年轻人，没有任何人的鼓动与组织，没有哀乐，没有言语，\n只是几十个年轻的生命沉默地走着,\n不时地有人们赶来佩戴着白花，加入这支年轻的队伍，那个场景就会浮现在我面前。在我们的队伍里，有着我们的父母，兄弟姐妹，老师和学弟学妹们，那个时候加入队伍的人们都沉浸在悲伤中，为了一个孩子，一个兄弟，一个学生的离去，沉浸在最质朴，最自然的悲伤当中........\n\n当游行队伍回到广场上的时候，有年轻的工人们在广场上支起了一个平台，放上了扩音器。\n广场上聚集着多少人，爸爸妈妈那个时候已经不在我身边了，扩音器里播放着哀乐，同学们和老师们都聚集在文的遗像周围，\n老师们在跟周围的人讲述文曾经是多么优秀的一个学生，他们为他感到骄傲，\n同学们在跟大家一起回忆文和我们一起的时光...........不知道是谁提了一个建议，说\"大家说几句吧，纪念文，让来的人都知道发生了什么！\"\n文的好朋友第一个拿过了话筒，简单介绍了一下情况，有几位老师也自愿拿过话筒，用他们最真实的语言向每一位在场的人介绍了文的中学生活，\n最后，话筒传递到了我手里，文的好朋友说\"你一定要说几句，上了大学以后文跟你的联系是最多的！\"我接过了话筒..........\n\n20多年过去了，我真的不记得自己在那个场合具体说了什么，好像我回忆了和文一起学习的点点滴滴，他对爷爷奶奶的孝顺，他和我通信的内容，他那懵懂的初恋.........我也不记得我说了多久..........很多年以后，爸爸曾经跟我一起回忆过那个时刻，爸爸说我在最后结束演讲的时候说的那几句话让他永远不会忘记，他为那句话为自己的闺女感到无比的骄傲，那个时候是哭着说的\n\"在场的爸爸妈妈，叔叔阿姨，哥哥姐姐，老师同学们，无论发生了什么，文在我心目中都是一个快乐向上的好同学；无论什么人来告诉我，我都不会相信他是暴徒中的一个；无论历史将来怎样被人描述，文今天的逝去都会向我们证明这个世界上有罪人，而这个罪人一定会被惩罚的，因为文是如此美好的一个人，夺取他生命的人企图夺走我们生命中最美好的东西，这恰恰是任何一个正直的人不能接受的！\"\n\n记得演讲结束的时候，我已经泣不成声，悲伤在我心里弥漫着，那个在足球场上驰骋，那个黑色脸庞，跟我讨论初恋的男生，就这样永远从大院里消失了，消失得如此惨烈，如此悲壮...........\n\n沉浸在悲哀中的我，\n恍惚中听得到周围有口号声，看到有穿着便衣，剃着小平头的人在向我们围绕在文遗像周围的人群里冲过来，一阵嘈杂中，我被两双温暖的手拖着从人群里冲了出来，转头一看，是爸爸和姐姐，他们奋力冲出人群，拉着已经哭得不成体统的我，爸爸一边走一边说\"公安来了，孩子，快跑！\".........", "excerpt": "下一个\n\n89年的6月4日，电视播放着的是正义的人民军队镇压暴徒，短波收音机\"美国之音\"里听到的是坦克车进入首都的一场屠杀。远在几千公里之外的大学校园里，上万名学子宁愿相信VOA的报道，也不会相信一国总理的义正言辞。6月5日，我所在的大学，...", "category": "历史记忆"}, {"id": 53, "title": "六四 青春祭 （4） - 午夜的逃亡", "date": "2013-05-29", "body": "下一个\n\n回忆20多年前的那段经历，并不是一件轻松愉快的事情。这篇系列的文字，在我心里存放了很多年。\n当回忆到某一个瞬间的时候，我会落荒而逃，不能继续，因为其中的很多感受不是一些文字能描述的。\n\n2013年2月，从温哥华出差回来，因为身体不适，不得不放下工作在家静养。静养的时候，有很多空闲的时间，白天黑夜地颠覆者，因为天气的寒冷，会在梦里渴望炎热的夏天。\n那个炎热的下午就这样自然而然地回到我的面前，文在照片里微笑着看着我们，还有一次我梦到文抱着一个可爱的小姑娘跟我说那是他的宝贝女儿.........\n我知道，无论如何，我需要给这段回忆安个家，在文学城小小的角落里，为文和我们那个时代的记忆，安一个小小的家.......\n\n6月10日的那个夜晚，那座大院到处是杂乱的脚步和混乱。\n爸爸和姐姐把我从人群中拖出来之后，聪明的爸爸没有回家，而是和姐姐一起拖着我，绕进大院楼群里，径直跑进姐姐上夜班的那个电话站 -\n坐落在有保安站岗的涉外酒店院子里一个安静的角落的水泥房。\n依稀听得到大院远处有高音喇叭刺耳的声音，要围观的人群尽快散开...........爸爸嘱咐姐姐照顾好我，转身离开了。\n我和姐姐坐在值班室里，安静极了，听得到我们两个人的心跳。\n我问姐姐，\"他们会怎么样？会抓我吗？\"姐姐很沉默，一直不说话。\n她不断地走到窗户边，往外面眺望，期间还接到几个她的好友的电话，都是来问我的情况，姐姐只是说，\"不知道啊，我在上班！\"我听得出姐姐的声音有些颤抖，感觉姐姐很害怕。\n不知道那个时候几点了，姐姐拉来几把木椅子给我搭了一个简易的铺，实在是太累了，刚躺上去我就睡着了.........\n\n沉睡中，听到妈妈的声音叫我，还有妈妈的手在推我。\n睁开眼睛的时候，看到旁边除了爸爸妈妈姐姐，还有一个不认识的的叔叔。我一下惊醒，跳了起来，\"干嘛？\"叔叔看我醒了，很短促地说了一声\"别拖拉，快走！\"，转身他先径自离开了。\n我这次看到爸爸手里拎着他出差时用的旅行袋，妈妈手里拎着一袋子各种包装的食物。妈妈给我披了件外套，拉着我就往外走，爸爸在后面跟着，姐姐手里拿着自行车的钥匙。我们悄悄地从酒店院子的偏门出去，离开了大院。\n\n爸爸骑着自行车带着妈妈，姐姐骑另一辆带着我，一家四口人朝着火车站的方向去。炎热的夏夜仍然有些凉意，我禁不住拉紧了妈妈给我披上的外套。看得出爸爸刻意挑着偏僻的街道穿行，我不知道几点了，路上几乎没有行人，连往日乘凉的人都散去了。\n爸爸一路上小声跟我交代着，在我演讲结束之前，一直站在人群外面的他和姐姐已经注意到有便衣的警察在集结，慢慢包围着开追悼会的人群，军人出身的爸爸意识到一场危险正在靠近浑然不觉的我。\n他就带着姐姐开始向我靠近，在我还没有撂下话筒的时候，他们已经站在我身后，及时地把我带出了人群。我急切地问他们，那我那些同学呢？爸爸说，他再回去广场的时候，听说已经逮捕了几个男同学，还有几个煽动罢工的年轻工人，\n文的遗像还有花圈都被警车拉走了，我们的几位发言的老师也被请去公安处写情况了。爸爸说，他和妈妈回到家的时候，便衣已经在等在我们家楼下，他们拦住爸爸妈妈问我是不是\"高自联\"的，并且还跟着爸爸妈妈回了家搜查我。爸爸妈妈跟他们说我根本没回来，便衣说，只要我回家了，务必马上带我去大院的公安处报到。妈妈接着说，刚才那个离开的那个叔叔，正是去家里搜捕我的人。\n他带着手下离开后，又转回头来跟妈妈通风报信，让妈妈无论如何送我离开，走得越远越好。\n妈妈引用叔叔的话\"这个时间抓进去，连判都不给判，不知道要关多久！赶快送孩子走，避过这个风头再回来，也许就能混过去啊！毕竟是个女娃子，进去了，可怎么办啊！\"我莫名其妙地看着妈妈，问：\"他不怕人家抓他？来通风报信？\"爸爸说，\"\n你记得吗？\n你妈妈值夜班的时候曾经给一个一出生就断了气的男婴做按摩4个小时，硬把那个孩子救活了？\"\n这个事情，我记得，那个男孩子的爸爸妈妈在孩子满月那天来我们家，一句话没说，\n进门两口子就给妈妈跪下，把我吓了一大跳。\n别的医生已经认定已经死了，扔在一边的孩子，愣是被值夜班的医生妈妈起死回生，而那家人几代单传就等这个男孩子呢！妈妈说：\n\"是的，那个男婴的舅舅，就是今天来的公安。他姐姐因为生了那个男孩子，才保住了婚姻，不然公公婆婆逼着要两口子离婚的！\n他到咱们家楼下的时候，认出了我！\n当年是他陪着孩子的父母来咱家谢恩的，他说他们一家人都不知道怎么感谢，因为我救了那个孩子，就救了他姐姐一家人。\n今天总算给了他一个机会，他冒着风险还送了100块钱，让我们不要回家，最快的速度送你走。\"\n.........\n\n夏夜安静的街道，两辆自行车上载着一家人，细细碎碎的爸爸和妈妈声音在耳边，我把脑袋靠在姐姐的背上，姐姐一直都很沉默。我们一家人已经很久没有这样出行了，路灯把我们的影子一会变得很长，一会又消失了，爸爸和妈妈好像在说把钱装在哪里安全，我恍恍惚惚地，觉得我们只是去看了场电影，现在散场了一起回家而已.........\n这时候，听见姐姐细细的嗓子问了一句\"爸，那咱们把妹妹送到车站了，她到底去哪呢？\"，爸爸和妈妈沉默了。\n我扭头看着爸爸，爸爸的脸上没有表情，妈妈看着我，好久爸爸只是沉默地蹬着自行车，一下，一下.......\n最后，妈妈轻声说，\"到了车站再说吧........\"\n\n深夜的车站，候车厅里灯光昏暗，横七竖八地躺着一些等夜车的人们。爸爸把行李交给姐姐和妈妈，去了售票处。妈妈和姐姐把我带到候车室一个僻静的角落，开始给我交代行李。我在那个时候还懵懂着，感觉就好象每次我要会学校的时候，妈妈给我交代行李一样，可是姐姐站在边上已经开始撇着嘴快哭了。看着妈妈把挎包里的身份证，学生证，一件件拿出来给我看，又体贴地给挎包里装了一包面巾纸，我还没有什么反应。最后妈妈拿出来了一沓钱，背过身子跟我说，\"这是600块钱，我们把能借的，能凑的都凑了，半夜三更的银行也不开门，也不知道你要走多久，够不够用啊？\"那一刻，我突然意识到，我真的要离开爸爸妈妈和姐姐了，因为他们从来没有给过我那么多钱，这么多钱，这是要我去多远的地方啊？\n一种无以言状的恐惧，在心里突然地升起来，我往妈妈跟前凑了凑，说：\"妈，我没干什么呀，我非得走吗？\"妈妈踮起脚把书包带绕我的头，斜挎在我胸前，抓着我的胳膊说，\"孩子，咱们还是听那个叔叔的，先躲躲，听话，\n啊？！\"我转过身，求救似地看着姐姐，姐姐走过来，低着头，替我整了整外套，她眼里里有闪亮亮的东西在闪烁.........\n妈妈递给我一双厚的棉袜子，又递过来一双运动鞋，让我把凉鞋脱下来。\n我说，\"太热了，捂脚！\"妈妈很低沉又严厉地说，\"换上！\"等我换好了袜子，要穿鞋的时候，妈妈把那600块钱分成2沓，弯下腰，把钱塞进了袜子里，然后才让我穿上鞋........\n\n爸爸回来的时候手上举着一张车票，嘴里说：\"快快，车要进站了，只停6分钟！\"手上拎起行李就往进站口跑，我背着随身的书包跟着他们跑，能感觉到那两沓钱在鞋里面硌着我.......\n跑到站台上的时候，列车刚好进站，掠过一阵凉风。\n站台上没有几个人，爸爸轻轻说了一句，\"真的是多事之秋啊，没人敢出门，咱们还买了张坐票呢。\"我们跟着\n列车跑，找到自己的车厢，几个没睡醒的列车员从车门里走出来，稀稀拉拉下来了几个乘客。\n爸爸妈妈和姐姐簇拥着我，爸爸跟列车员讨好地说，\"我送孩子上去找好座位就下来！\"列车员眼睛都没抬一下，说\"不行，马上要开了。\"我站在车厢门口，眼睛直直地盯着爸爸，爸爸把行李袋交给我，抬手帮我把一掠头发撩上去，在肩膀上推了我一下，说\"那就上去吧。\"\n\n一切都太快了，太快了。\n我走进车厢，车厢里空荡荡的，好几个人横躺在双人的硬座上，找到自己的座位，我赶忙把车窗打得更大些。\n那个时候的列车，没有空调，车窗都是那种两边一提，就可以落下来的哐哐铛铛的样子。\n我看见爸爸妈妈在车外面踮着脚跟着我，想找到我的座位，看到我打开车窗，他们一起跑过来。\n姐姐已经泪流满面了，紧紧地咬着嘴唇，手扶着妈妈；我看得出妈妈满脸的紧张，他们都不敢对我说什么，那个时刻，我的学生身份恐怕是他们最怕暴露的.........爸爸踮起脚看了看车厢里面，说\"还行，人不多，千万小心，能不睡觉就别睡啊！\"我在那个时候，想哭，想大声哭，可是我知道我不能哭，估计脸上的表情一定一定很怪异，爸爸的脸和我离得很近的时候，我伸出胳膊搂住爸爸的头，在他耳边说了一句\"爸，我不是高自联的，我真的不是！让我回家吧，爸！\"说那句话的时候，我已经带着哭腔了。爸爸把我的手从他的耳边拿开，握在他手里说，\"我知道，我知道！听话，过些日子就回来了，啊.....\"........铃响了，列车开始慢慢地启动，爸爸拉着我的手先是跟着列车缓缓地走，接着开始跑，姐姐和妈妈也跟着列车跑，妈妈哭着，大声喊\"多小心哪！\"\n听到妈妈这一嗓子，我的泪水再也忍不住了，趴在车窗边上拼命想看清楚他们，开始嚎啕大哭；列车越开越快，爸爸的脸越来越模糊，爸爸一直跟着列车跑到站台最边上，撕心裂肺地大喊了一声\"我的孩子啊！！！\n....\" 然后我看见爸爸举起双手捂住自己的脸，突然蹲在站台上..............\n\n那一年，我20岁；那一天，爸爸妈妈不得不放开我的手，送我踏上了逃亡的路。", "excerpt": "下一个\n\n回忆20多年前的那段经历，并不是一件轻松愉快的事情。这篇系列的文字，在我心里存放了很多年。\n当回忆到某一个瞬间的时候，我会落荒而逃，不能继续，因为其中的很多感受不是一些文字能描述的。\n\n2013年2月，从温哥华出差回来，因为身体不...", "category": "历史记忆"}, {"id": 54, "title": "六四 青春祭 （5） - 青岛！青岛！", "date": "2013-05-29", "body": "下一个\n\n小的时候，写作文都是件让我赶到愉悦的事情；后来有了网络，码字可以让我化解很多压力；再后来，把码好的字放到网上，任人评说，已然成了一种很文艺的生活方式，让每天的柴米油盐变得不那么令人不堪。\n\n码完上篇\"午夜的逃亡\"那些字的时候，文艺的生活方式完全变了味道，变成了一种折磨。冬日难得一个阳光灿烂的下午，我蜷缩在沙发上，泪流满面；为了码字不得不唤起的那些记忆如同涨潮的海浪一样，一波一波地袭来，让我的心一次一次地紧缩，一阵一阵地痛。好几次，我不得不停下来，让泪水滑落，深呼吸，再回到电脑上；电脑键盘的每一次敲击都仿佛敲在自己的心......在跟一位同样热爱码字的知己聊天的时候，我跟她发誓，码完这个系列我一定戒掉码字的爱好，因为实在是太痛苦了..........\n\n痛苦，并不是89年6月的那个夜晚，深夜逃亡20岁的瘦瘦高高的女生的感受。关于那个夜晚，记忆中只有恐惧，那种无边无际黑暗无比看不到任何希望的恐惧。恐惧中的女生，紧紧抱着自己的挎包，经历了一个漫长的夜晚，经历了一个饥饿和干渴交织着的白天，又经历了一个几乎无眠的夜晚，列车抵达了终点站\n-- 青岛。\n青岛曾经是自己向往的地方，阳光下的海滩是20岁所能期待的最浪漫的去处，自己曾经无数次梦想着有一天能跟自己爱的男人一起在海滩上散步，没成想梦想这么快成了真，而成了真的梦想竟然跟着我一起在逃亡。\n走下火车的时候，看到站台上大大的\"青岛\"两个字，我发了一阵呆，\n20岁的脑袋瓜被将近30个小时的旅行和恐惧占据着，梦想和逃亡这两个词一直在我脑子里纠结，。\n\n记得走出青岛车站的时候，天刚刚蒙蒙亮，车站上没有太多的人。我拎着行李，走出火车站，跟着人流来到站外的公车站，却不知道自己要去哪里。隐约听到有警车犀利地呼啸声，车站附近有警察在抽查身份证。排队等车的人低声说话的声音不时传进我的耳朵，原来是据传说，那位广场上知名的柴姓女英雄逃亡到了青岛，警察正在搜捕她。说话的人警惕性很高地四处打量，当目光扫到我的时候，我自己先心虚起来，赶忙装作仰着脖子找站牌避开他们的眼睛。那个时候的我，留着和女英雄一模一样的发型，估计掩饰不住满脸的学生气，让那几个低声嘀咕的人不断回头打量我，我的心紧张得快要跳出来了。正在这个时候，一辆公交车进站，我赶忙头也不回地上了车，车启动的时候，我从余光里看到那几个人并没有上车，却一直在打量我，我掩饰着内心的恐惧和紧张故作平静地把眼睛盯着前方，脖子一直很僵硬地端着。公车开出去好几站，我才长出了一口气。\n\n公车开出去的时候沿着海滨的一条路，太阳升起来了，平生第一次看到蓝色的大海，美丽的景色吸引了我，有几分钟，我几乎忘记了自己是在逃亡，贪婪地趴在车窗边上注视着大海。突然，有拉着警铃的警车从对面的马路上驶来，刺耳的声音和公车擦身而过，把我从短暂的快乐中拉回现实里，我转身目送着疾驰而去的警车，不得不面对一个严峻的现实，我到底要去哪里？\n\n公交车晃晃悠悠地走着，售票员用青岛口音的普通话报着站名，我跟自己说，如果听到一个顺耳的站名，而那个地方又离大海不算远，我就下车。正想着，突然听见售票员说\"下一站，鲁迅公园\"。鲁迅？\n那个也爱码字的留着滑稽的胡子的文学家？那个最革命的要救中国的文学家？\n这个亲切的名字让我感到一种无名的安全，我跟自己说，就这里了。\n\n从公交车上下来的我，眼睛在那个时候是直勾勾的。那个时刻，我的眼里只看到了海，那个在文学家笔下描写的无比美妙，让我梦想了无数次的蔚蓝的大海，让我忘记了所有的忧虑。\n而且我闻到了海的味道，平生第一次闻到了海的味道，那种咸咸涩涩的味道。在很多年之后无论是在三亚的海滩上，还是在古巴的海滩上，这种味道都会把我回到青岛，带回到那个时刻，挣扎着想要逃脱恐惧，疲惫不堪，却又不肯停下奔往大海的脚步.........", "excerpt": "下一个\n\n小的时候，写作文都是件让我赶到愉悦的事情；后来有了网络，码字可以让我化解很多压力；再后来，把码好的字放到网上，任人评说，已然成了一种很文艺的生活方式，让每天的柴米油盐变得不那么令人不堪。\n\n码完上篇\"午夜的逃亡\"那些字的时候，文艺...", "category": "历史记忆"}, {"id": 7, "title": "找个伴吧，过家家 （七） - 网络征婚 之 \"莎士比亚再世\"", "date": "2013-02-08", "body": "下一个\n\n原创:单身妈妈日记(北美)\n\n加拿大夏天的时候，漫天遍野都有一种野花，白色星点的小花形成一个\n莲蓬一样形状的花朵，在花朵的中间有一个黑色的小花。\n整个夏天，加拿大到处都是这样的花，普通又别具特色。从Chris那里，DM知道了这种花的名字，也了解到这种野花有个别名叫\"女王花\"和与它有关的悲伤的故事 -\n那朵黑色的小花，是一个女王，围绕在女王周围的其实是她的卫士，卫士们为了保护女王都牺牲了，他们变成了小小的白花依然围绕在女王的身边。\n\n那年9月份的一天，在办公室里忙碌的DM收到了一大束玫瑰花，深枣红色的玫瑰花！在玫瑰花周围点缀着的不是平日常见的满天星，而是这种\"女王花\"。花束的到来，在办公室里引起一阵躁动，因为DM一直以来的生活都平淡如水，突然出现的花束让好事的女同事开始追着DM要花边新闻的最新稿。\nDM只好抱着花束高喊说，到圣诞节就知道啦，\npatience!。花束里有一个心形的卡片，上面写着\"With all my love! Happy\nBirthday!\"\n虽然没有落款，DM知道这束玫瑰来自Chris。卡片上那个Love的字眼并无特别，却让DM发了一会呆。\n\n那个周末，恰恰是DM的生日，而DM 和Chris之间的交往已经快半年了。\nChris依然每个周末会到DM的城市里，在酒店住2个晚上，和DM徜徉在湖光山色中，品美食，谈诗歌，一切都美好得有些虚幻。可是Chris从未有过任何亲近的举动，更没有任何Love的表达。正是这些细微的感受，让这个小小的卡片上的Love在DM眼里显得有些突兀。DM在等待Chris到来的那个下午，手里握着那张生日卡片，心情很复杂。Love\n这个词，年轻的时候听到，充满了诱惑和美好。记得当年和孩子爹约会不到2周的时候，Love就已经成了两个人每天嚼在嘴里的泡泡糖。20年过去，再见到这个词的时候，感觉已经满目疮痍，虽然诱惑与美好依稀，却有很多疑问和压力。\n\n这天的傍晚，Chris按时赴约，一袭长款的风衣，让他更显得更加清瘦高挑。两个人一起用完晚餐，散步去了湖边。秋天的夜晚，湖边很有凉意。Chris很体贴地从后备箱里拿出一件大毛衣，裹在DM身上，握着DM的手一路走着。Chris和DM总是有很多的话题，从文学到风俗，从历史到天文，每次的见面，DM都感觉到很惬意。这个夜晚也一样，两个人一路聊着，一路笑着，很开心。\n\n不知不觉走到了湖的另一边，天色已经暗了下来，两个人找了个长椅坐了下来。DM裹着的大毛衣在夜风里不够御寒，两手冰凉。\nChris感觉到了，他打开自己的风衣，把DM的双手捂在自己的胸口，这个动作让DM心里超级温暖，脑子有点犯晕。暗暗的天色里，DM的脸离Chris的下巴很近，DM又闻到Chris身上散发出来那种淡淡的干净的男人味，Chris下巴上青色的胡茬充满了诱惑，让DM想伸出手去摸摸，可惜自己的手在Chris的手里。静静地坐着，一切都变得很安静，DM很清楚地感觉到Chris的呼吸越来越重了，DM在那个时候，突然有了一种冲动的勇气。\n\nDM轻声说，\"Chris，a question.\"\n\nChris 轻声\"hmm.\" DM 盯着Chris的眼睛，用非常柔的声音问到\"Do you know how\nto kiss?\"\n\nChris 的眼睛睁大了，看着DM，没有说一句话。\n慢慢爬上来的月亮，照在Chris的脸上，让DM看得清他每一丝表情的变化。\nChris的眼睛里有快乐，有惊异，还有一些DM看不明白的东西。\n\nDM站起身，因为双手还在Chris的手里，Chris也不得不站起来。DM没等Chris回答自己的问题，凑在Chris的身边，轻轻说了一句\"If\nyou don't, I do!\"\n\nDM\n从Chris的手里抽出自己的双手，轻轻捧在Chris的两颊青色的胡茬上，闭上眼睛，慢慢踮起脚尖，吻上Chris的嘴唇........DM感觉得到Chris的回吻越来越强烈，Chris很体贴地把风衣两侧握在手里，在背后把DM紧紧地裹在风衣里，让DM的身体和自己紧紧地贴在一起。这一吻，DM没有计算大概有多长时间，因为身体被Chris紧紧地拥抱在风衣里，DM很明确地感觉到Chris身体有强烈的变化，虽然他在极力掩饰身体上膨胀起来的尴尬，DM依然感觉到了。DM的心里有一丝小
